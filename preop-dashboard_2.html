<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJR Hub · PAC / Pre-Op Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--card:#0d0d0d;--bdr:#1a1a1a;
  --tx:#e0e0e0;--dm:#5a5a5a;--mt:#3a3a3a;
  --gn:#2a6b3f;--gnB:rgba(42,107,63,0.10);--gnS:#3a8b5f;
  --yw:#8a6d2b;--ywB:rgba(138,109,43,0.08);
  --rd:#8b2d2d;--rdB:rgba(139,45,45,0.10);--rdS:#cf6b6b;
  --kn:#3b82f6;--hp:#a855f7;
  --m:'DM Mono',monospace;--s:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--s);min-height:100vh}
.top{padding:20px 24px 16px;border-bottom:1px solid #141414;display:flex;justify-content:space-between;align-items:flex-end}
.top-sub{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.15em;text-transform:uppercase;font-family:var(--m);margin-bottom:4px}
.top-title{font-size:20px;font-weight:700}
.top-date{font-size:12px;color:#4a4a4a;font-family:var(--m);margin-top:2px}
.top-r{display:flex;gap:16px;align-items:center}
.legend{padding:10px 24px;display:flex;gap:20px;border-bottom:1px solid #0f0f0f;background:rgba(255,255,255,0.008);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#5a5a5a;font-family:var(--m)}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lh{margin-left:auto;font-size:10px;color:#3a3a3a;font-family:var(--m);font-style:italic}
.jd{width:8px;height:8px;border-radius:2px;display:inline-block}
.cards{padding:16px 24px;display:flex;flex-direction:column;gap:10px}

/* Patient card */
.pc{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--bdr);transition:border-color .3s}
.pc.hi{border-color:rgba(139,45,45,0.3)}.pc.rdy{border-color:rgba(42,107,63,0.4)}
.ph{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .2s}
.ph:hover{background:rgba(255,255,255,0.02)}.ph.op{background:rgba(255,255,255,0.015);border-bottom:1px solid var(--bdr)}
.jb{width:4px;height:48px;border-radius:2px;flex-shrink:0}
.pt{text-align:center;min-width:52px;flex-shrink:0}
.pt-t{font-size:17px;font-weight:700;font-family:var(--m);line-height:1.1}
.pt-b{font-size:10px;color:var(--dm);font-family:var(--m);margin-top:2px}
.pi{flex:1;min-width:0}
.pn{font-size:15px;font-weight:600}
.ptg{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pjt{font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--m);font-weight:700}
.pat{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--rdB);color:var(--rdS);font-family:var(--m);font-weight:700;border:1px solid rgba(139,45,45,0.15)}
.pd{font-size:11px;color:var(--dm);font-family:var(--m);margin-top:3px}
.rw{position:relative;width:48px;height:48px;flex-shrink:0}
.rt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--m);color:#8a8a8a}
.rt.rg{color:var(--gn)}
.pb{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;font-family:var(--m);text-transform:uppercase;letter-spacing:.05em;border:1px solid #2a2a2a;min-width:80px;text-align:center;flex-shrink:0;background:rgba(255,255,255,0.03);color:#6a6a6a}
.pb.rg{background:var(--gnB);color:var(--gn);border-color:rgba(42,107,63,0.3)}
.aw{font-size:12px;color:#4a4a4a;transition:transform .2s}.aw.op{transform:rotate(180deg)}
.bd{padding:6px 16px 16px;display:none}.bd.op{display:block}
.ab{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--rdB);border:1px solid rgba(139,45,45,0.3);border-radius:6px;margin:6px 0;font-size:12px;font-weight:700;color:var(--rdS);font-family:var(--m)}

/* Phase header */
.phh{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;margin-top:6px;border-bottom:1px solid #161616}
.phl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--m);color:#6a6a6a}
.phl.dn{color:var(--gn)}.phl.is{color:var(--rd)}
.phc{font-size:10px;font-family:var(--m);font-weight:600;color:#4a4a4a;padding:2px 8px;border-radius:8px}
.phc.dn{color:var(--gn);background:var(--gnB)}.phc.is{color:var(--rd);background:var(--rdB)}

/* Checklist item */
.cl{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:6px;transition:background .15s}
.cl.ck{cursor:pointer}.cl.ck:hover{background:rgba(255,255,255,0.03)}
.cl.na{opacity:.35}.cl.ex{background:rgba(255,255,255,0.025)}
.ci{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:var(--m)}
.cc{flex:1;min-width:0}
.cr{display:flex;justify-content:space-between;align-items:center;gap:8px}
.cla{font-size:13px;font-weight:500;font-family:var(--s)}
.cb{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--m);font-weight:600;white-space:nowrap;flex-shrink:0}
.cs{font-size:11px;color:#5a5a5a;margin-top:2px;font-family:var(--m);line-height:1.4}
.cs.fl{color:#8a8a8a}
.ck-lnk{font-size:10px;color:#4a6a5a;margin-top:2px;font-family:var(--m);font-style:italic}
.cinp{padding:0 12px 10px 36px}

/* Clinic detail panel */
.cdp{margin:4px 0 8px 36px;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid #1e1e1e;border-radius:8px}
.cdp-title{font-size:10px;font-weight:700;color:#6a6a6a;font-family:var(--m);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.cdp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 12px}
.cdp-grid.c2{grid-template-columns:1fr 1fr}
.cdp-grid.c1{grid-template-columns:1fr}
.cdp-item{padding:4px 0}
.cdp-k{font-size:9px;color:#555;font-family:var(--m);text-transform:uppercase;letter-spacing:.04em}
.cdp-v{font-size:13px;font-weight:600;color:var(--tx);font-family:var(--m);margin-top:1px}
.cdp-v.hi{color:var(--rdS)}.cdp-v.lo{color:var(--yw)}.cdp-v.ok{color:var(--gnS)}
.cdp-v.sm{font-size:11px;font-weight:400;color:#8a8a8a}
.cdp-note{font-size:10px;color:#6a6a6a;font-family:var(--m);margin-top:8px;padding-top:6px;border-top:1px solid #1a1a1a;line-height:1.5}
.cdp-flag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:4px;font-family:var(--m);font-weight:600;margin-top:6px}
.cdp-flag.ok{background:var(--gnB);color:var(--gnS);border:1px solid rgba(42,107,63,0.2)}
.cdp-flag.warn{background:var(--rdB);color:var(--rdS);border:1px solid rgba(139,45,45,0.2)}
.cdp-flag.info{background:rgba(59,107,143,0.1);color:#5a9abf;border:1px solid rgba(59,107,143,0.2)}
.vfy-btn{margin-top:10px;padding:7px 16px;border-radius:5px;font-family:var(--m);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--gnS);background:var(--gn);color:#fff;transition:all .15s}
.vfy-btn:hover{background:var(--gnS)}

/* Buttons */
.ob{padding:5px 10px;font-size:11px;font-family:var(--m);border-radius:4px;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#7a7a7a;transition:all .15s}
.ob.sg{border-color:var(--gnS);background:var(--gnB);color:var(--gnS)}
.ob.sr{border-color:var(--rdS);background:var(--rdB);color:var(--rdS)}
.ob.sy{border-color:#8a6d2b;background:var(--ywB);color:#8a6d2b}
.ob.sn{border-color:var(--gnS);background:var(--gnB);color:var(--gnS)}
.il{font-size:10px;color:#8a8a8a;margin-bottom:2px;font-family:var(--m)}
.il2{font-size:11px;color:#8a8a8a;margin-bottom:4px;font-family:var(--m)}
.fi{width:100%;padding:6px 8px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;color:var(--tx);font-size:13px;font-family:var(--m);outline:none;box-sizing:border-box}
.fi:focus{border-color:#3a3a3a}
.sb{width:100%;padding:8px;border-radius:4px;font-family:var(--m);font-size:12px;cursor:default;border:1px solid #2a2a2a;background:#1a1a1a;color:#555;transition:all .15s}
.sb.ok{background:var(--gn);color:#fff;border-color:var(--gnS);cursor:pointer}
.sb.dng{background:var(--rd);color:#fff;border-color:var(--rdS);cursor:pointer}

/* Sign-off */
.so{margin:16px 0 8px;padding:14px 16px;border-radius:8px;border:1px solid var(--bdr);background:rgba(255,255,255,0.02)}
.so.rts{border-color:rgba(42,107,63,0.3);background:rgba(42,107,63,0.05)}
.so.sgn{border-color:rgba(42,107,63,0.3);background:var(--gnB)}
.sot{font-size:11px;font-weight:700;color:#7a7a7a;font-family:var(--m);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.soe{font-size:11px;color:var(--rdS);font-family:var(--m);margin-bottom:10px;padding:6px 10px;background:var(--rdB);border-radius:4px;border:1px solid rgba(139,45,45,0.15)}
.sog{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.sof{display:grid;grid-template-columns:2fr 1fr;gap:6px}
.sob{padding:8px 20px;border-radius:6px;font-family:var(--m);font-size:12px;font-weight:600;white-space:nowrap;cursor:default;border:1px solid #2a2a2a;background:#1a1a1a;color:#555}
.sob.ok{background:var(--gn);color:#fff;border-color:var(--gnS);cursor:pointer}
.soa{font-size:10px;color:#4a4a4a;font-family:var(--m);margin-top:8px;line-height:1.5}
.sobd{font-size:12px;color:#8a8a8a;font-family:var(--m);line-height:1.8;padding-left:32px}
.sonm{margin-top:8px;color:var(--gn);font-weight:600}

/* Handoff */
.ho{margin-top:16px;padding:14px 16px;background:var(--gnB);border:1px solid rgba(42,107,63,0.3);border-radius:8px}
.hot{font-size:12px;font-weight:700;color:var(--gn);font-family:var(--m);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.hob{font-size:12px;color:#8a8a8a;font-family:var(--m);line-height:1.8}.hob span{color:#5a5a5a}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:3px}
</style>
</head>
<body>

  <div class="top-r">

    <div style="width:1px;height:32px;background:var(--bdr)"></div>
    <div style="display:flex;gap:12px"><div class="li"><span class="jd" style="background:var(--kn)"></span>Knee</div><div class="li"><span class="jd" style="background:var(--hp)"></span>Hip</div></div>

  <div class="lh">tap item to view clinic data · structured inputs for assessments</div>
</div>
<div class="cards" id="cards"></div>

const IC={complete:"✓",pending:"○",issue:"✕",na:"—"};

function cI(pid,iid,det){ST[pid].comp[iid]={time:tn(),detail:det||null};ST[pid].exp=null;ST[pid].det=null;render()}
function tE(pid,iid){ST[pid].exp=ST[pid].exp===iid?null:iid;ST[pid].det=null;render()}
function tD(pid,iid){ST[pid].det=ST[pid].det===iid?null:iid;ST[pid].exp=null;render()}
function tP(id){openPt=openPt===id?null:id;render()}
function doSign(pid){const n=document.getElementById(`sn-${pid}`);const c=document.getElementById(`sc-${pid}`);if(!n||!n.value.trim())return;ST[pid].so={name:n.value.trim(),creds:c.value,time:`${td()} ${tn()}`};render()}

// ═══ Render clinic detail panel ═══
function renderCDP(pid,itemId){
  const ck=CLINIC_KEY_MAP[itemId];if(!ck)return"";
  const data=CLINIC[pid]?.[ck];if(!data)return"";
  const gc=data.grid==="c2"?"c2":data.grid==="c1"?"c1":"";
  let h=`<div class="cdp"><div class="cdp-title"><span>📋 ${data.title}</span><span style="font-size:9px;color:#4a4a4a;cursor:pointer" onclick="tD(${pid},'${itemId}')">✕ close</span></div>`;
  h+=`<div class="cdp-grid ${gc}">`;
  data.items.forEach(it=>{
    const stCls=it.st==="hi"?" hi":it.st==="lo"?" lo":it.st==="ok"?" ok":it.st==="info"?" sm":"";
    h+=`<div class="cdp-item"><div class="cdp-k">${it.k}</div><div class="cdp-v${stCls}">${it.v}${it.u?" "+it.u:""}</div></div>`;
  });
  h+=`</div>`;
  if(data.flags){h+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">`;data.flags.forEach(f=>{h+=`<div class="cdp-flag ${f.c}">${f.t}</div>`});h+=`</div>`}
  if(data.note)h+=`<div class="cdp-note">${data.note}</div>`;
  // Verify button for day-of items that aren't yet verified
  const st=ST[pid];const cl=bCL(PTS.find(p=>p.id===pid));const item=cl.find(i=>i.id===itemId);
  if(item&&gS(item,st.comp)==="pending"&&item.src==="c"&&!item.inp){
    h+=`<button class="vfy-btn" onclick="cI(${pid},'${itemId}')">✓ Verify & Confirm</button>`;
  }
  h+=`</div>`;return h;
}

// ═══ Input state + generators ═══
const HS={},MR={},NAA={};

function mkVitals(pid){const fs=[{k:"sbp",l:"SBP",p:"120"},{k:"dbp",l:"DBP",p:"80"},{k:"hr",l:"HR",p:"72"},{k:"temp",l:"Temp°F",p:"98.6"},{k:"spo2",l:"SpO2%",p:"98"},{k:"rr",l:"RR",p:"16"}];return`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px">${fs.map(f=>`<div><div class="il">${f.l}</div><input class="fi" type="number" placeholder="${f.p}" id="v${pid}${f.k}"></div>`).join("")}<div style="grid-column:1/-1;margin-top:4px"><button class="sb" onclick="svV(${pid})">Record Vitals</button></div></div>`}
function svV(pid){const g=k=>(document.getElementById(`v${pid}${k}`)||{}).value||"";if(!g("sbp")||!g("dbp")||!g("hr")||!g("spo2"))return;cI(pid,"vitals",`${g("sbp")}/${g("dbp")} HR:${g("hr")} T:${g("temp")||"—"} SpO2:${g("spo2")} RR:${g("rr")||"—"}`)}
function mkIV(pid){return`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px"><div><div class="il">Gauge</div><select class="fi" id="ig${pid}"><option value="">—</option><option>18g</option><option>20g</option><option>22g</option></select></div><div><div class="il">Site</div><select class="fi" id="is${pid}"><option value="">—</option><option>R Hand</option><option>L Hand</option><option>R AC</option><option>L AC</option><option>R Forearm</option><option>L Forearm</option></select></div><div><div class="il">Attempts</div><select class="fi" id="ia${pid}"><option>1</option><option>2</option><option>3</option></select></div><div style="grid-column:1/-1;margin-top:4px"><button class="sb" onclick="svI(${pid})">Record IV Access</button></div></div>`}
function svI(pid){const g=document.getElementById(`ig${pid}`).value,s=document.getElementById(`is${pid}`).value,a=document.getElementById(`ia${pid}`).value;if(!g||!s)return;cI(pid,"iv",`${g} ${s}, ${a} attempt${a>1?"s":""}`)}
function mkNPO(pid){return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px"><div><div class="il">Last Solids</div><input class="fi" type="time" id="nf${pid}"></div><div><div class="il">Last Clear Liquids</div><input class="fi" type="time" id="nc${pid}"></div><div style="grid-column:1/-1;margin-top:4px"><button class="sb" onclick="svN(${pid})">Confirm NPO</button></div></div>`}
function svN(pid){const f=document.getElementById(`nf${pid}`).value,c=document.getElementById(`nc${pid}`).value;if(!f&&!c)return;cI(pid,"npo",`Solids: ${f||"denied"} | Clears: ${c||"denied"}`)}
function mkPreg(pid){return`<div style="display:flex;gap:4px;margin-top:8px">${["Negative","Not indicated","Positive — STOP"].map(o=>`<button class="ob" style="flex:1${o.includes("STOP")?";border-color:var(--rdS);color:var(--rdS)":""}" onclick="cI(${pid},'pregnancy','${o}')">${o}</button>`).join("")}</div>`}

function mkHS(pid){if(!HS[pid])HS[pid]={};const h=HS[pid];const qs=[{id:"symptoms",l:"New symptoms since last visit?",os:["None","Cough/cold","Fever","Chest pain","SOB","Other"]},{id:"exposure",l:"COVID / illness exposure?",os:["No","Yes — tested neg","Yes — not tested"]},{id:"changes",l:"Medication or health changes?",os:["No changes","New medication","ER/hospital visit","Other"]}];let r=`<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">`;qs.forEach(q=>{r+=`<div><div class="il2">${q.l}</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;q.os.forEach(o=>{const s=h[q.id]===o;const f=o===q.os[0];r+=`<button class="ob${s?(f?" sg":" sr"):""}" onclick="hsS(${pid},'${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`});r+=`</div></div>`});const ad=qs.every(q=>h[q.id]);const an=h.symptoms==="None"&&h.exposure==="No"&&h.changes==="No changes";r+=`<button class="sb${ad?(an?" ok":" dng"):""}" onclick="svHS(${pid})">${ad&&!an?"⚠ Flag & Record":"Record Screening"}</button></div>`;return r}
function hsS(pid,k,v){if(!HS[pid])HS[pid]={};HS[pid][k]=v;render()}
function svHS(pid){const h=HS[pid];if(!h?.symptoms||!h?.exposure||!h?.changes)return;const an=h.symptoms==="None"&&h.exposure==="No"&&h.changes==="No changes";cI(pid,"healthscreen",an?"No new symptoms, exposures, or changes":Object.entries(h).map(([k,v])=>`${k}: ${v}`).join(" · "))}

function mkMR(pid,pt){if(!MR[pid])MR[pid]={};const m=MR[pid];let r=`<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px"><div><div class="il2">AM medications taken as instructed?</div><div style="display:flex;gap:4px">`;["Yes — all AM meds","Partial — some missed","No — none taken"].forEach(o=>{const s=m.am===o;r+=`<button class="ob${s?(o[0]==="Y"?" sg":" sr"):""}" style="flex:1" onclick="mrS(${pid},'am','${o.replace(/'/g,"\\'")}')">${o}</button>`});r+=`</div></div><div><div class="il2">Held medications confirmed? (${pt.pac.hd||"none"})</div><div style="display:flex;gap:4px">`;["Confirmed — all held","Issue — took held med","N/A — no holds"].forEach(o=>{const s=m.hold===o;const ok=o[0]==="C"||o[0]==="N";r+=`<button class="ob${s?(ok?" sg":" sr"):""}" style="flex:1" onclick="mrS(${pid},'hold','${o.replace(/'/g,"\\'")}')">${o}</button>`});r+=`</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div><div class="il">Last dose of held med</div><input class="fi" placeholder="e.g. Eliquis — Tue 8pm" id="mrl${pid}" value="${m.ld||""}"></div><div><div class="il">Notes</div><input class="fi" placeholder="e.g. Took metoprolol with sip" id="mrn${pid}" value="${m.n||""}"></div></div>`;const ok=m.am&&m.hold;r+=`<button class="sb${ok?" ok":""}" onclick="svMR(${pid})">Confirm Medication Reconciliation</button></div>`;return r}
function mrS(pid,k,v){if(!MR[pid])MR[pid]={};MR[pid][k]=v;render()}
function svMR(pid){const m=MR[pid];if(!m?.am||!m?.hold)return;const ld=(document.getElementById(`mrl${pid}`)||{}).value||"";const n=(document.getElementById(`mrn${pid}`)||{}).value||"";MR[pid].ld=ld;MR[pid].n=n;const p=[m.am,m.hold];if(ld)p.push(`Last dose: ${ld}`);if(n)p.push(n);cI(pid,"meds",p.join(" · "))}

function mkNA(pid){if(!NAA[pid])NAA[pid]={};const n=NAA[pid];let r=`<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px"><div><div class="il2">Skin integrity at surgical site</div><div style="display:flex;gap:4px">`;["Intact — no issues","Rash/irritation","Open wound/lesion"].forEach(o=>{const s=n.skin===o;r+=`<button class="ob${s?(o[0]==="I"?" sg":" sr"):""}" style="flex:1" onclick="naS(${pid},'skin','${o.replace(/'/g,"\\'")}')">${o}</button>`});r+=`</div></div><div><div class="il2">Mobility / baseline</div><div style="display:flex;gap:4px">`;["Independent","Cane/walker","Wheelchair","Non-ambulatory"].forEach(o=>{const s=n.mob===o;r+=`<button class="ob${s?" sn":""}" style="flex:1" onclick="naS(${pid},'mob','${o}')">${o}</button>`});r+=`</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div><div class="il2">Mental status</div><div style="display:flex;gap:4px">`;["Alert & oriented","Confused/anxious"].forEach(o=>{const s=n.mental===o;r+=`<button class="ob${s?(o[0]==="A"?" sg":" sr"):""}" style="flex:1" onclick="naS(${pid},'mental','${o.replace(/'/g,"\\'")}')">${o}</button>`});r+=`</div></div><div><div class="il2">Fall risk</div><div style="display:flex;gap:4px">`;["Low","Moderate","High"].forEach(o=>{const s=n.fall===o;r+=`<button class="ob${s?(o==="Low"?" sg":o==="High"?" sr":" sy"):""}" style="flex:1" onclick="naS(${pid},'fall','${o}')">${o}</button>`});r+=`</div></div></div>`;const ok=n.skin&&n.mob&&n.mental&&n.fall;r+=`<button class="sb${ok?" ok":""}" onclick="svNA(${pid})">Record Nursing Assessment</button></div>`;return r}
function naS(pid,k,v){if(!NAA[pid])NAA[pid]={};NAA[pid][k]=v;render()}
function svNA(pid){const n=NAA[pid];if(!n?.skin||!n?.mob||!n?.mental||!n?.fall)return;cI(pid,"nursingassess",`Skin: ${n.skin} · Mobility: ${n.mob} · Mental: ${n.mental} · Fall risk: ${n.fall}`)}

const INP={vitals:mkVitals,iv:mkIV,npo:mkNPO,preg:mkPreg,hs:mkHS,mr:mkMR,na:mkNA};

// ═══ RENDER ═══
function render(){
  document.getElementById("tD").textContent=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})+" · Total Joint Specialists Centers";
  let html="";
  PTS.forEach(pt=>{
    const s=ST[pt.id],cl=bCL(pt),co=s.comp,isO=openPt===pt.id;
    const jc=pt.joint==="Hip"?{a:"var(--hp)",bg:"rgba(168,85,247,0.08)",b:"rgba(168,85,247,0.2)"}:{a:"var(--kn)",bg:"rgba(59,130,246,0.08)",b:"rgba(59,130,246,0.2)"};
    const act=cl.filter(i=>!i.na),dn=act.filter(i=>{const x=gS(i,co);return x==="complete"||x==="na"}),iss=act.filter(i=>gS(i,co)==="issue");
    const pct=Math.round(dn.length/act.length*100),hI=iss.length>0;
    let cur="PAC";for(const p of["PAC","CHECKIN","PREOP","ANESTHESIA"]){const pi=cl.filter(i=>i.ph===p&&!i.na);if(!pi.every(i=>{const x=gS(i,co);return x==="complete"||x==="na"})){cur=p;break}if(p==="ANESTHESIA")cur="READY"}
    const rdy=cur==="READY",sc=rdy?"var(--gn)":hI?"var(--rd)":"var(--yw)";

    html+=`<div class="pc${rdy?" rdy":hI?" hi":""}"><div class="ph${isO?" op":""}" onclick="tP(${pt.id})">`;
    html+=`<div class="jb" style="background:${jc.a}"></div><div class="pt"><div class="pt-t">${pt.or}</div><div class="pt-b">${pt.bay!=="—"?pt.bay:"No Bay"}</div></div>`;
    html+=`<div class="pi"><div class="ptg"><span class="pn">${pt.ln}, ${pt.fn}</span><span class="pjt" style="background:${jc.bg};color:${jc.a};border:1px solid ${jc.b}">${pt.lat} ${pt.joint}</span>${pt.allergies.length?`<span class="pat">ALLERGY</span>`:""}</div><div class="pd">${pt.surgeon} · ${pt.proc} · ${pt.age}${pt.sex} · ${pt.wt}kg · MRN ${pt.mrn}</div></div>`;
    html+=`<div class="rw"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="#1a1a1a" stroke-width="3"/><circle cx="24" cy="24" r="20" fill="none" stroke="${sc}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${(pct/100)*125.6} 125.6" transform="rotate(-90 24 24)" style="transition:stroke-dasharray .5s"/></svg><div class="rt${rdy?" rg":""}">${rdy?"✓":`${pct}%`}</div></div>`;
    html+=`<div class="pb${rdy?" rg":""}">${rdy?"● Ready":PHL[cur]||cur}</div><div class="aw${isO?" op":""}">▼</div></div>`;

    html+=`<div class="bd${isO?" op":""}">`;
    if(pt.allergies.length)html+=`<div class="ab"><span>⚠</span>&nbsp;ALLERGIES: ${pt.allergies.join(" · ")}</div>`;

    ["PAC","CHECKIN","PREOP"].forEach(ph=>{
      const items=cl.filter(i=>i.ph===ph);const d=items.filter(i=>{const x=gS(i,co);return x==="complete"||x==="na"}).length;
      const hi=items.some(i=>gS(i,co)==="issue"),ad=d===items.length;
      html+=`<div class="phh"><span class="phl${ad?" dn":hi?" is":""}">${PHL[ph]}</span><span class="phc${ad?" dn":hi?" is":""}">${d}/${items.length}</span></div>`;
      items.forEach(i=>{
        const st=gS(i,co),scc=SCC[st],cp=co[i.id],isCl=i.src==="c",hasClinic=!!CLINIC_KEY_MAP[i.id]&&!!CLINIC[pt.id]?.[CLINIC_KEY_MAP[i.id]];
        const ne=st==="pending"&&i.inp&&INP[i.inp],ct=st==="pending"&&!ne&&!hasClinic;
        const isDet=s.det===i.id,isExp=s.exp===i.id;
        const lt=st==="complete"?(isCl&&!cp?"From Clinic":(cp?.time||"Done")):st==="pending"?(i.tp==="verify"?"Tap to View":"Needs Input"):st==="issue"?(i.iss||"Action Needed"):"N/A";

        // Click logic: clinic items open detail panel; assess items open input; events tap-complete
        let oc="";
        if(st==="na")oc="";
        else if(ne)oc=`onclick="tE(${pt.id},'${i.id}')"`;
        else if(hasClinic&&isCl)oc=`onclick="tD(${pt.id},'${i.id}')"`;
        else if(ct)oc=`onclick="cI(${pt.id},'${i.id}')"`;
        else if(st==="complete"&&hasClinic)oc=`onclick="tD(${pt.id},'${i.id}')"`;

        const clickable=oc?"ck":"";
        const viewHint=hasClinic&&(st==="complete"||st==="issue")&&!cp?" — tap to view data":"";

        html+=`<div class="cl ${clickable}${st==="na"?" na":""}${isDet||isExp?" ex":""}" ${oc} style="border-left:3px solid ${scc.c}"><div class="ci" style="background:${scc.bg};color:${scc.c};border:1px solid ${scc.c}40">${IC[st]}</div><div class="cc"><div class="cr"><span class="cla" style="color:${st==="complete"?"#8a8a8a":"#d0d0d0"}">${i.lb}</span><span class="cb" style="background:${scc.bg};color:${scc.c};border:1px solid ${scc.c}25">${lt}</span></div>`;
        if(i.sb||cp?.detail)html+=`<div class="cs${cp?.detail?" fl":""}">${cp?.detail||i.sb}</div>`;
        if(isCl&&st==="complete"&&!cp&&hasClinic)html+=`<div class="ck-lnk">↳ synced from clinic${viewHint}</div>`;
        html+=`</div></div>`;

        // Detail panel
        if(isDet&&hasClinic)html+=renderCDP(pt.id,i.id);
        // Input panel
        if(isExp&&i.inp){const fn=INP[i.inp];if(fn)html+=`<div class="cinp">${fn(pt.id,pt)}</div>`}
      });
    });

    // Sign-off
    const preA=cl.filter(i=>["PAC","CHECKIN","PREOP"].includes(i.ph)&&!i.na);
    const apd=preA.every(i=>{const x=gS(i,co);return x==="complete"||x==="na"});
    const iN=preA.filter(i=>gS(i,co)==="issue").length,pN=preA.filter(i=>gS(i,co)==="pending").length;
    if(s.so){
      html+=`<div class="so sgn"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:24px;height:24px;border-radius:50%;background:var(--gnB);color:var(--gn);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:1px solid rgba(42,107,63,0.3)">✓</div><span style="font-size:12px;font-weight:700;color:var(--gn);font-family:var(--m);letter-spacing:.06em;text-transform:uppercase">Pre-Op Nurse Review Complete</span></div><div class="sobd"><div>I have reviewed this patient's chart, verified all pre-operative items, performed assessments, reconciled medications, and confirm readiness for anesthesia evaluation.</div><div class="sonm">${s.so.name}, ${s.so.creds} — ${s.so.time}</div></div></div>`;
    }else{
      html+=`<div class="so${apd?" rts":""}"><div class="sot">Pre-Op Nurse Sign-Off</div>`;
      if(!apd){let m="";if(iN)m+=`${iN} issue${iN>1?"s":""} need resolution. `;if(pN)m+=`${pN} item${pN>1?"s":""} still pending.`;html+=`<div class="soe">${m}</div>`}
      html+=`<div class="sog"><div class="sof"><div><div class="il">Nurse Name</div><input class="fi" style="font-size:12px" placeholder="e.g. Jessica Martinez" id="sn-${pt.id}"></div><div><div class="il">Credentials</div><select class="fi" style="font-size:12px" id="sc-${pt.id}"><option>RN</option><option>BSN, RN</option><option>LPN</option><option>CRNA</option></select></div></div><button class="sob${apd?" ok":""}" onclick="${apd?`doSign(${pt.id})`:""}">Sign &amp; Attest</button></div><div class="soa">By signing, I attest that I have reviewed this patient's chart, verified all pre-operative items, performed assessments, reconciled medications, and confirm readiness for anesthesia evaluation.</div></div>`;
    }

    // Anesthesia
    const ai=cl.filter(i=>i.ph==="ANESTHESIA");const ad2=ai.filter(i=>{const x=gS(i,co);return x==="complete"||x==="na"}).length;const aa=ad2===ai.length;
    html+=`<div class="phh"><span class="phl${aa?" dn":""}">${PHL.ANESTHESIA}</span><span class="phc${aa?" dn":""}">${ad2}/${ai.length}</span></div>`;
    ai.forEach(i=>{const st=gS(i,co),scc=SCC[st],cp=co[i.id],ct=st==="pending";const lt=st==="complete"?(cp?.time||"Done"):"Required";
      html+=`<div class="cl${ct?" ck":""}" ${ct?`onclick="cI(${pt.id},'${i.id}')"`:""} style="border-left:3px solid ${scc.c}"><div class="ci" style="background:${scc.bg};color:${scc.c};border:1px solid ${scc.c}40">${IC[st]}</div><div class="cc"><div class="cr"><span class="cla" style="color:${st==="complete"?"#8a8a8a":"#d0d0d0"}">${i.lb}</span><span class="cb" style="background:${scc.bg};color:${scc.c};border:1px solid ${scc.c}25">${lt}</span></div>${i.sb?`<div class="cs">${i.sb}</div>`:""}</div></div>`});

    if(rdy)html+=`<div class="ho"><div class="hot">● Ready for OR — Handoff Summary</div><div class="hob"><div><span>Patient:</span> ${pt.ln}, ${pt.fn} · ${pt.age}${pt.sex} · ${pt.wt}kg · MRN ${pt.mrn}</div><div><span>Procedure:</span> ${pt.proc} — ${pt.surgeon}</div><div><span>Allergies:</span> ${pt.allergies.length?pt.allergies.join(", "):"NKDA"}</div>${co.vitals?`<div><span>Vitals:</span> ${co.vitals.detail}</div>`:""}${co.iv?`<div><span>IV:</span> ${co.iv.detail}</div>`:""}${co.npo?`<div><span>NPO:</span> ${co.npo.detail}</div>`:""}${co.nursingassess?`<div><span>Assessment:</span> ${co.nursingassess.detail}</div>`:""}<div><span>Pre-Op Meds:</span> ${pt.orders}</div></div></div>`;
    html+=`</div></div>`;
  });
  document.getElementById("cards").innerHTML=html;
}
render();
</script>
</body>
</html>
