<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TJR Hub — Pre-Anesthesia Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e8f0;
  --t1:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;
  --blue:#2563eb;--blueL:#eff6ff;--blueD:#1d4ed8;
  --green:#16a34a;--greenL:#f0fdf4;--greenB:#dcfce7;--greenD:#15803d;
  --yellow:#d97706;--yellowL:#fffbeb;--yellowB:#fef3c7;
  --red:#dc2626;--redL:#fef2f2;--redB:#fee2e2;
  --purple:#7c3aed;--purpleL:#f5f3ff;
  --orange:#ea580c;--orangeL:#fff7ed;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:13px;}
::selection{background:var(--blue);color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-l{display:flex;align-items:center;gap:8px;}
.logo{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#6d28d9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:9px;}
.topbar-t{font-weight:700;font-size:14px;}
.topbar-s{font-size:10px;color:var(--t3);}
.topbar-r{display:flex;align-items:center;gap:6px;}
.search-wrap{position:relative;}
.search-wrap input{width:180px;padding:6px 8px 6px 26px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--t1);}
.search-wrap input:focus{outline:none;border-color:var(--blue);}
.search-wrap::before{content:"🔍";position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:11px;}
.flt{padding:5px 8px;border-radius:6px;border:1px solid var(--border);font-size:10px;font-family:inherit;color:var(--t2);background:#fff;cursor:pointer;}

.main{padding:10px 12px 40px;}

.stats{display:flex;gap:8px;margin-bottom:10px;}
.stat{background:var(--card);border-radius:8px;padding:10px 14px;box-shadow:var(--shadow);border-left:3px solid transparent;flex:1;}
.stat-n{font-size:22px;font-weight:800;line-height:1;margin-bottom:1px;}
.stat-l{font-size:10px;color:var(--t3);font-weight:500;}

/* TABLE */
.pac-t{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;}
.pac-t thead th{padding:8px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:#fafbfc;white-space:nowrap;}
.pac-t thead th:first-child,.pac-t thead th:nth-child(2){text-align:left;}
.pac-t tbody td{padding:0;border-bottom:1px solid #f1f5f9;vertical-align:top;}
.pac-t tbody tr:last-child td{border-bottom:none;}
.pac-t tbody tr.dtr td{padding:0;background:#fafbfc;border-bottom:1px solid var(--border);}

.pt-c{padding:8px 8px;display:flex;align-items:center;gap:6px;min-width:160px;}
.rd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rd.ready{background:var(--green);}.rd.pending{background:var(--yellow);}.rd.not-ready{background:var(--red);}
.pn{font-weight:700;font-size:12px;white-space:nowrap;}
.ps{font-size:9px;color:var(--t4);}

.proc-c{padding:8px 6px;min-width:90px;}
.ptag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;display:inline-block;}
.ptag-tka{background:var(--blueL);color:var(--blue);}.ptag-tha{background:var(--purpleL);color:var(--purple);}
.sd{font-size:10px;font-weight:700;color:var(--t1);margin-top:2px;}
.scd{font-size:9px;font-weight:700;}

/* STATUS CELL */
.sc{padding:6px 4px;text-align:center;cursor:pointer;transition:background .1s;min-width:70px;position:relative;}
.sc:hover{filter:brightness(.97);}
.sc-g{background:var(--greenL);}.sc-y{background:var(--yellowL);}.sc-r{background:var(--redL);}
.sc-i{font-size:14px;line-height:1;}
.sc-lb{font-size:8px;font-weight:700;margin-top:1px;text-transform:uppercase;letter-spacing:.2px;}
.sc-g .sc-lb{color:var(--green);}.sc-y .sc-lb{color:var(--yellow);}.sc-r .sc-lb{color:var(--red);}
.sc-s{font-size:8px;color:var(--t4);}

/* Caregiver cell */
.cg-c{padding:6px;min-width:90px;cursor:pointer;}
.cg-c:hover{background:#fafbfc;}
.cg-name{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.cg-rel{font-size:8px;color:var(--t4);}
.cg-conf{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;display:inline-block;margin-top:1px;}
.cg-y{background:var(--greenB);color:var(--green);}.cg-n{background:var(--redB);color:var(--red);}

/* ACT */
.ac{padding:6px 4px;text-align:center;white-space:nowrap;}

/* DETAIL PANEL */
.dp{display:none;padding:14px 16px;}
.dp.open{display:block;}
.dp-t{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.dp-x{background:none;border:none;font-size:13px;cursor:pointer;color:var(--t4);padding:2px 6px;border-radius:4px;}
.dp-x:hover{background:#e5e7eb;}

.ck{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.ck:last-child{border-bottom:none;}
.ci{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.ci.g{background:var(--greenB);color:var(--green);}.ci.r{background:var(--redB);color:var(--red);}.ci.y{background:var(--yellowB);color:var(--yellow);}
.ct{flex:1;min-width:0;}
.ct strong{display:block;font-size:11px;}.ct span{font-size:9px;color:var(--t4);}
.cf{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.cf-abn{background:var(--redB);color:var(--red);}.cf-ok{background:var(--greenB);color:var(--green);}

.gate{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;margin-bottom:5px;font-size:11px;font-weight:600;}
.gate-p{background:var(--greenB);color:var(--green);}.gate-f{background:var(--redB);color:var(--red);}

.btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .12s;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.btn:hover{background:var(--blueL);border-color:var(--blue);color:var(--blue);}
.btn.p{background:var(--blue);color:#fff;border-color:var(--blue);}.btn.p:hover{background:var(--blueD);}
.btn.s{padding:2px 6px;font-size:9px;border-radius:4px;}
.btn.ro{border-color:#fecaca;color:var(--red);}.btn.ro:hover{background:var(--redL);}
.btn.rm{border:none;background:none;color:var(--t4);font-size:12px;padding:2px 4px;}.btn.rm:hover{color:var(--red);background:var(--redL);}

.dp-ft{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}

/* Med table */
.mt{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px;}
.mt th{padding:4px 6px;text-align:left;font-size:8px;font-weight:700;color:var(--t4);text-transform:uppercase;border-bottom:1px solid var(--border);background:#f8fafc;}
.mt td{padding:5px 6px;border-bottom:1px solid #f5f5f5;}
.mt tr:last-child td{border-bottom:none;}
.ab{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;white-space:nowrap;}
.ab-mt{background:var(--greenB);color:var(--green);}.ab-c{background:var(--blueL);color:var(--blue);}
.ab-h{background:var(--yellowB);color:var(--yellow);}.ab-s{background:var(--redB);color:var(--red);}
.ab-ps{background:var(--orangeL);color:var(--orange);}.ab-rv{background:#f1f5f9;color:var(--t3);}
.hs{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;}
.hs-s{background:var(--greenB);color:var(--green);}.hs-a{background:var(--blueL);color:var(--blue);}.hs-n{background:var(--redB);color:var(--red);}

/* Consent */
.con-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.con-row:last-child{border-bottom:none;}
.cs{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;}
.cs-y{background:var(--greenB);color:var(--green);}.cs-n{background:var(--redB);color:var(--red);}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;}
.mo.open{display:flex;}
.md{background:#fff;border-radius:14px;max-width:560px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:mi .2s;max-height:88vh;overflow-y:auto;}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:none;}}
.md-h{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.md-h h3{font-size:13px;font-weight:700;}
.md-x{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--t3);display:flex;align-items:center;justify-content:center;}
.md-x:hover{background:#f1f5f9;}
.md-b{padding:16px;}
.md-b p{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px;}
.md-f{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px;position:sticky;bottom:0;background:#fff;}
.field{margin-bottom:10px;}.field label{display:block;font-size:10px;font-weight:600;color:var(--t3);margin-bottom:2px;}
.field input,.field select,.field textarea{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--t1);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);}

/* H&P Modal - full width */
.hp-modal{max-width:900px;width:96%;}
.hp-section{margin-bottom:16px;}
.hp-section h4{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.hp-field{margin-bottom:8px;}
.hp-field label{font-size:10px;font-weight:600;color:var(--t4);display:block;margin-bottom:2px;}
.hp-field textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;font-family:inherit;resize:vertical;min-height:40px;color:var(--t1);}
.hp-field textarea:focus{outline:none;border-color:var(--blue);}
.hp-pre{background:#f8fafc;padding:8px 10px;border-radius:6px;font-size:11px;color:var(--t2);border:1px solid var(--border);line-height:1.5;}

/* ═══════ PROTOCOL SETTINGS ═══════ */
.proto-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.proto-btn:hover{background:var(--purpleL);border-color:var(--purple);color:var(--purple);}
.proto-btn svg{width:12px;height:12px;}

.proto-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;}
.proto-ov.open{display:flex;}
.proto-md{background:#fff;border-radius:14px;width:100%;max-width:880px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:mi .2s;display:flex;flex-direction:column;max-height:calc(100vh - 48px);}
.proto-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.proto-hd h2{font-size:15px;font-weight:800;color:var(--t1);}
.proto-hd-sub{font-size:9px;color:var(--t4);font-weight:500;margin-top:1px;}
.proto-body{display:flex;flex:1;overflow:hidden;min-height:0;}
.proto-side{width:200px;border-right:1px solid #f1f5f9;overflow-y:auto;flex-shrink:0;background:#fafbfc;}
.proto-side-btn{width:100%;text-align:left;padding:10px 14px;font-size:11px;font-weight:500;color:var(--t2);border:none;background:none;cursor:pointer;border-bottom:1px solid #f1f5f9;border-left:3px solid transparent;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .1s;}
.proto-side-btn:hover{background:#f1f5f9;}
.proto-side-btn.active{background:#fff;font-weight:700;color:var(--purple);border-left-color:var(--purple);}
.proto-side-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;display:none;}
.proto-side-btn.changed .dot{display:block;}
.proto-rules{flex:1;overflow-y:auto;padding:16px 20px;}
.proto-rule{padding:12px 14px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:#fff;transition:all .15s;}
.proto-rule.changed{border-color:var(--yellow);background:var(--yellowL);}
.proto-rule-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.proto-rule-label{font-size:11px;font-weight:700;color:var(--t1);}
.proto-rule-note{font-size:9px;color:var(--t4);margin-top:1px;}
.proto-rule-input{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.proto-rule-input .comp{font-size:9px;font-weight:700;color:var(--t4);background:#f1f5f9;padding:2px 6px;border-radius:4px;font-family:'DM Sans',monospace;}
.proto-rule-input input[type="number"]{width:80px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'DM Sans',monospace;text-align:right;font-weight:700;color:var(--t1);}
.proto-rule-input input[type="number"]:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.12);}
.proto-rule-input input[type="text"]{width:240px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;color:var(--t1);}
.proto-rule-input input[type="text"]:focus{outline:none;border-color:var(--purple);}
.proto-rule-input .unit{font-size:9px;color:var(--t4);min-width:30px;}
.proto-rule-diff{margin-top:6px;font-size:9px;display:flex;align-items:center;gap:4px;}
.proto-rule-diff .old{color:var(--red);text-decoration:line-through;font-family:monospace;font-weight:600;}
.proto-rule-diff .arrow{color:var(--t4);}
.proto-rule-diff .new{color:var(--green);font-family:monospace;font-weight:700;}
.proto-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fafbfc;}
.proto-ft-l{font-size:10px;color:var(--yellow);font-weight:600;}
.proto-ft-r{display:flex;gap:6px;}

/* Confirm panel */
.proto-confirm{padding:14px;background:var(--yellowL);border:1px solid #fbbf24;border-radius:8px;margin-bottom:12px;}
.proto-confirm h4{font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:6px;}
.proto-confirm-item{font-size:10px;color:var(--t2);padding:2px 0;font-family:monospace;}
.proto-confirm-item .lbl{font-family:'DM Sans',sans-serif;font-weight:600;}
.proto-confirm-name{display:flex;align-items:center;gap:8px;margin-top:8px;}
.proto-confirm-name input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;}
.proto-confirm-name input:focus{outline:none;border-color:var(--purple);}

/* History modal */
.hist-entry{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.hist-entry-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hist-entry-who{font-size:11px;font-weight:700;color:var(--t1);}
.hist-entry-when{font-size:9px;color:var(--t4);}
.hist-entry-item{font-size:10px;color:var(--t2);padding:2px 0;display:flex;gap:6px;align-items:center;}
.hist-entry-item .lbl{font-weight:600;min-width:120px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-l">
    <div class="logo">PAC</div>
    <div><div class="topbar-t">Pre-Anesthesia Clinic</div><div class="topbar-s">Surgical Readiness · Protocol <span id="protoVer">Q4 2025</span></div></div>
  </div>
  <div class="topbar-r">
    <button class="proto-btn" onclick="openProtoHistory()" title="Change History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      History
    </button>
    <button class="proto-btn" onclick="openProtoSettings()" style="background:var(--purpleL);border-color:var(--purple);color:var(--purple);" title="Protocol Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
      Protocol
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>
    <div class="search-wrap"><input id="qInput" placeholder="Search patient, MRN…" oninput="render()"></div>
    <input type="date" class="flt" id="dateFilter" onchange="render()" title="Surgery Date">
    <select class="flt" id="locFilter" onchange="render()"><option value="all">All Locations</option><option value="Cumming">Cumming</option><option value="Gwinnett">Gwinnett</option><option value="Cherokee">Cherokee</option><option value="Sandy Springs">Sandy Springs</option></select>
    <select class="flt" id="readFilter" onchange="render()"><option value="all">All</option><option value="not-ready">🔴 Not Ready</option><option value="pending">🟡 Pending</option><option value="ready">🟢 Ready</option></select>
    <select class="flt" id="provFilter" onchange="render()"><option value="all">All Surgeons</option><option value="DeCook">Dr. DeCook</option><option value="Smith">Dr. Smith</option></select>
  </div>
</div>

<div class="main" id="main"></div>
<div class="mo" id="modalOv" onclick="if(event.target===this)closeModal()"><div class="md" id="modal"></div></div>

<!-- Protocol Settings Overlay -->
<div class="proto-ov" id="protoOv" onclick="if(event.target===this)closeProto()">
  <div class="proto-md" id="protoMd"></div>
</div>

<!-- History Overlay -->
<div class="proto-ov" id="histOv" onclick="if(event.target===this)closeHist()">
  <div class="proto-md" id="histMd" style="max-width:640px;"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// PROTOCOL CONFIGURATION — Q4 2025 (from TJS Standardized Care Protocol)
// All thresholds are editable via the Protocol Settings panel
// ═══════════════════════════════════════════════════════════════════════════════
const PROTO_DEFAULT = {
  version: "Q4 2025",
  lastModified: "2025-10-01T00:00:00Z",
  modifiedBy: "",
  cats: {
    obesity: {
      label: "Obesity / BMI",
      icon: "⚖️",
      rules: [
        {id:"bmi_non_dm",label:"BMI limit (non-diabetic)",val:47,type:"num",unit:"",comp:"<",note:"Exception form required if proceeding above limit"},
        {id:"bmi_dm",label:"BMI limit (diabetic)",val:40,type:"num",unit:"",comp:"<",note:""},
      ]
    },
    diabetes: {
      label: "Diabetes / Glycemic",
      icon: "🩸",
      rules: [
        {id:"a1c_trigger",label:"HbA1c — trigger fructosamine draw",val:7.5,type:"num",unit:"%",comp:">",note:"If above, draw serum fructosamine"},
        {id:"fruct_clear",label:"Fructosamine — clearance limit",val:292,type:"num",unit:"µmol/L",comp:"≤",note:"≤ this = cleared to schedule"},
      ]
    },
    smoking: {
      label: "Nicotine Cessation",
      icon: "🚭",
      rules: [
        {id:"nic_pre_wk",label:"Weeks nicotine-free before surgery",val:4,type:"num",unit:"wk",comp:"≥",note:"All nicotine products"},
        {id:"nic_post_wk",label:"Weeks nicotine-free after surgery",val:4,type:"num",unit:"wk",comp:"≥",note:""},
      ]
    },
    timing: {
      label: "Surgical Timing Delays",
      icon: "⏱️",
      rules: [

let PROTO = JSON.parse(JSON.stringify(PROTO_DEFAULT));
let PROTO_HISTORY = [];

// Load from storage
(async function loadProto(){
  try{
    const r=await window.storage.get("tjr-pac-proto");
    if(r&&r.value)PROTO=JSON.parse(r.value);
  }catch(e){}
  try{
    const r=await window.storage.get("tjr-pac-proto-history");
    if(r&&r.value)PROTO_HISTORY=JSON.parse(r.value);
  }catch(e){}
  document.getElementById("protoVer").textContent=PROTO.version;
  render();
})();

async function saveProto(){
  try{await window.storage.set("tjr-pac-proto",JSON.stringify(PROTO));}catch(e){}
  try{await window.storage.set("tjr-pac-proto-history",JSON.stringify(PROTO_HISTORY));}catch(e){}
}

// Helper to get a proto value
function pv(catId,ruleId){
  const cat=PROTO.cats[catId];if(!cat)return null;
  const r=cat.rules.find(x=>x.id===ruleId);
  return r?r.val:null;
}

// ═══════ HELPERS ═══════
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function bmi(p){return+(p.wt_lb/((p.ht_in/39.37)**2)).toFixed(1);}
function goalWt(p){const g=getBMIGate(false);const ht_m=p.ht_in*0.0254;return Math.floor(g*ht_m*ht_m*2.205);}

// ═══════ READINESS ═══════
function readiness(p){
  let h=0,s=0;
  const today=new Date(),sd=new Date(p.surgDate+"T00:00:00");
  const d=Math.ceil((sd-today)/864e5);
  if(p.a1c&&p.a1c.val>=A1C_GATE)h++;
  if(bmi(p)>=BMI_GATE)h++;
  if(!p.cg)h++;
  ["cbc","bmp","ptinr","ua","ts"].forEach(k=>{if(!p.labs[k]?.done)s++;});
  if(!p.ekg?.done)s++;
  if(p.ekg?.abn&&p.ekg.cardiacClr===null)s++;
  Object.values(p.clrs).forEach(c=>{if(c.need&&!c.done)s++;});
  Object.entries(p.medH).forEach(([k,v])=>{if(!v.sent||!v.ack)s++;if(v.sp===false)s++;});
  Object.values(p.cons).forEach(c=>{if(!c.signed)s++;});
  if(p.cls?.st!=="done")s++;
  if(!p.npo?.conf)s++;
  if(p.hp?.st!=="signed")s++;
  let st="ready";
  if(h>0)st="not-ready";else if(s>0&&d<=7)st="not-ready";else if(s>0)st="pending";
  return{st,h,s,d};
}

function labSt(p){const k=["cbc","bmp","ptinr","ua","ts"];const dn=k.filter(x=>p.labs[x]?.done).length;const ab=k.filter(x=>p.labs[x]?.abn).length;if(dn===k.length&&!ab)return{c:"g",i:"✓",lb:`${dn}/${k.length}`,s:""};if(ab)return{c:"y",i:"⚠",lb:`${dn}/${k.length}`,s:`${ab} abn`};return{c:"r",i:"✕",lb:`${dn}/${k.length}`,s:`${k.length-dn} miss`};}
function ekgSt(p){if(!p.ekg?.done)return{c:"r",i:"✕",lb:"Not Done",s:""};if(p.ekg.abn&&p.ekg.cardiacClr===null)return{c:"y",i:"⚠",lb:"Abnormal",s:"Review"};if(p.ekg.abn&&p.ekg.cardiacClr!==null)return{c:"g",i:"✓",lb:"Reviewed",s:""};return{c:"g",i:"✓",lb:"Normal",s:p.ekg.date};}
function clrSt(p){const n=Object.values(p.clrs).filter(c=>c.need);if(!n.length)return{c:"g",i:"✓",lb:"None",s:""};const d=n.filter(c=>c.done).length;if(d===n.length)return{c:"g",i:"✓",lb:`${d}/${n.length}`,s:""};return{c:"r",i:"✕",lb:`${d}/${n.length}`,s:`${n.length-d} need`};}
function conSt(p){const k=Object.keys(p.cons);const s=k.filter(x=>p.cons[x].signed).length;if(s===k.length)return{c:"g",i:"✓",lb:`${s}/${k.length}`,s:""};return{c:"r",i:"✕",lb:`${s}/${k.length}`,s:`${k.length-s} unsign`};}
function clsSt(p){if(p.cls?.st==="done")return{c:"g",i:"✓",lb:"Done",s:p.cls.date||""};if(p.cls?.st==="scheduled")return{c:"y",i:"📅",lb:"Sched",s:p.cls.date||""};return{c:"r",i:"✕",lb:"None",s:""};}
function medSt(p){const h=Object.entries(p.medH);if(!h.length)return{c:"g",i:"✓",lb:"No Holds",s:`${p.meds.length} meds`};const ok=h.every(([k,v])=>v.sent&&v.ack&&v.sp!==false);if(ok)return{c:"g",i:"✓",lb:"Conf'd",s:`${h.length} holds`};return{c:"y",i:"⚠",lb:"Pending",s:`${h.length} holds`};}
function bmiSt(p){const b=bmi(p);if(b<BMI_GATE)return{c:"g",i:"✓",lb:b+"",s:""};return{c:"r",i:"✕",lb:b+"",s:`Goal: ${goalWt(p)}lb`};}
function cgSt(p){if(!p.cg)return{c:"r"};return{c:"g"};}
function hpSt(p){if(p.hp?.st==="signed")return{c:"g",i:"✓",lb:"Signed",s:p.hp.date||""};if(p.hp?.st==="draft")return{c:"y",i:"✏",lb:"Draft",s:""};return{c:"r",i:"✕",lb:"None",s:""};}

// ═══════ FILTER ═══════
let openPn={};

function getF(){
  const q=(document.getElementById("qInput")?.value||"").toLowerCase();
  const rf=document.getElementById("readFilter")?.value||"all";
  const pf=document.getElementById("provFilter")?.value||"all";
  const lf=document.getElementById("locFilter")?.value||"all";
  const df=document.getElementById("dateFilter")?.value||"";
  return P.filter(p=>{
    if(pf!=="all"&&p.prov!==pf)return false;
    if(lf!=="all"&&p.loc!==lf)return false;
    if(df&&p.surgDate!==df)return false;
    const r=readiness(p);if(rf!=="all"&&r.st!==rf)return false;
    if(q&&!`${p.f} ${p.l} ${p.mrn}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{const ra=readiness(a),rb=readiness(b);const o={"not-ready":0,pending:1,ready:2};if(o[ra.st]!==o[rb.st])return o[ra.st]-o[rb.st];return new Date(a.surgDate)-new Date(b.surgDate);});
}

// ═══════ RENDER ═══════
function render(){
  const pts=getF();
  const all=P.map(p=>readiness(p));
  const rN=all.filter(r=>r.st==="ready").length,pN=all.filter(r=>r.st==="pending").length,nN=all.filter(r=>r.st==="not-ready").length;

  let h=`<div class="stats">
    <div class="stat" style="border-left-color:var(--blue);"><div class="stat-n" style="color:var(--blue);">${P.length}</div><div class="stat-l">Upcoming Surgeries</div></div>
    <div class="stat" style="border-left-color:var(--green);"><div class="stat-n" style="color:var(--green);">${rN}</div><div class="stat-l">🟢 Ready</div></div>
    <div class="stat" style="border-left-color:var(--yellow);"><div class="stat-n" style="color:var(--yellow);">${pN}</div><div class="stat-l">🟡 Pending</div></div>
    <div class="stat" style="border-left-color:var(--red);"><div class="stat-n" style="color:var(--red);">${nN}</div><div class="stat-l">🔴 Not Ready</div></div>
  </div>`;

  h+=`<table class="pac-t"><thead><tr>
    <th style="text-align:left;">Patient</th><th style="text-align:left;">Procedure</th>
    <th>BMI</th><th>Labs</th><th>EKG</th><th>Clearances</th><th>Consents</th><th>Class</th><th>Meds</th><th>Caregiver</th><th>H&P</th><th>Act</th>
  </tr></thead><tbody>`;

  pts.forEach(p=>{
    const r=readiness(p);
    const sd=new Date(p.surgDate+"T00:00:00");
    const sdS=sd.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const cdL=r.d<=0?"TODAY":r.d===1?"TMRW":`${r.d}d`;
    const cdC=r.d<=3?"var(--red)":r.d<=7?"var(--yellow)":"var(--t4)";

    const ls=labSt(p),es=ekgSt(p),cs=clrSt(p),cos=conSt(p),cls2=clsSt(p),ms=medSt(p),bs=bmiSt(p),hs=hpSt(p);

    h+=`<tr>`;
    h+=`<td><div class="pt-c"><div class="rd ${r.st}"></div><div><div class="pn">${esc(p.l)}, ${esc(p.f)}</div><div class="ps">${esc(p.mrn)} · ${p.age}yo · ${esc(p.loc)}</div></div></div></td>`;
    h+=`<td><div class="proc-c"><span class="ptag ${p.proc==='tka'?'ptag-tka':'ptag-tha'}">${p.side} ${p.proc.toUpperCase()}</span><div class="sd">${sdS} <span class="scd" style="color:${cdC};">(${cdL})</span></div></div></td>`;

    // BMI
    h+=`<td><div class="sc sc-${bs.c}" onclick="togglePn(${p.id},'bmi')"><div class="sc-i">${bs.i}</div><div class="sc-lb">${bs.lb}</div>${bs.s?`<div class="sc-s">${bs.s}</div>`:''}</div></td>`;

    // 6 status cols
    [["labs",ls],["ekg",es],["clrs",cs],["cons",cos],["class",cls2],["meds",ms]].forEach(([k,s])=>{
      const act=openPn[p.id]===k;
      h+=`<td><div class="sc sc-${s.c}" onclick="togglePn(${p.id},'${k}')" style="${act?'box-shadow:inset 0 -2px 0 currentColor;':''}"><div class="sc-i">${s.i}</div><div class="sc-lb">${s.lb}</div>${s.s?`<div class="sc-s">${s.s}</div>`:''}</div></td>`;
    });

    // Caregiver
    const cgs=cgSt(p);
    h+=`<td><div class="cg-c" style="background:${cgs.c==='g'?'var(--greenL)':cgs.c==='y'?'var(--yellowL)':'var(--redL)'};" onclick="editCg(${p.id})">`;
    if(p.cg){
      h+=`<div class="cg-name">${esc(p.cg.name)}</div><div class="cg-rel">${esc(p.cg.rel)} · ${esc(p.cg.phone)}</div>`;
    } else {
      h+=`<div style="font-size:9px;font-weight:700;color:var(--red);">NONE</div>`;
    }
    h+=`</div></td>`;

    // H&P
    h+=`<td><div class="sc sc-${hs.c}" onclick="${hs.c==='r'?`startHP(${p.id})`:`togglePn(${p.id},'hp')`}"><div class="sc-i">${hs.c==='r'?'<span style="font-size:16px;cursor:pointer;">＋</span>':hs.i}</div><div class="sc-lb">${hs.lb}</div>${hs.s?`<div class="sc-s">${hs.s}</div>`:''}</div></td>`;

    // Actions
    h+=`<td class="ac"><button class="btn s" onclick="sendReminder(${p.id})" title="Remind">📱</button> <button class="btn s" onclick="showMsg(${p.id})" title="Message">💬</button></td>`;
    h+=`</tr>`;

    if(openPn[p.id]){
      h+=`<tr class="dtr"><td colspan="12"><div class="dp open">${renderPn(p,openPn[p.id])}</div></td></tr>`;
    }
  });
  h+=`</tbody></table>`;
  document.getElementById("main").innerHTML=h;
}

function togglePn(id,k){if(openPn[id]===k)delete openPn[id];else openPn[id]=k;render();}

// ═══════ PANELS ═══════
function renderPn(p,k){
  const fn={bmi:pnBMI,labs:pnLabs,ekg:pnEKG,clrs:pnClrs,cons:pnCons,class:pnClass,meds:pnMeds,hp:pnHP};
  return(fn[k]||function(){return"";})(p);
}

function pnBMI(p){
  const b=bmi(p);const pass=b<BMI_GATE;
  let h=`<div class="dp-t">BMI Assessment <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  h+=`<div class="gate ${pass?'gate-p':'gate-f'}">${pass?'✓':'✕'} BMI: <strong>${b}</strong> ${pass?`(< ${BMI_GATE})`:`≥ ${BMI_GATE} — SURGERY HOLD`}</div>`;
  h+=`<div style="font-size:11px;color:var(--t2);margin-top:6px;">Height: ${Math.floor(p.ht_in/12)}' ${p.ht_in%12}" · Weight: ${p.wt_lb} lbs</div>`;
  if(!pass){
    h+=`<div style="margin-top:8px;padding:10px;background:var(--yellowB);border-radius:6px;font-size:11px;font-weight:600;color:var(--yellow);">
      🎯 Goal weight for BMI < ${BMI_GATE}: <strong>${goalWt(p)} lbs</strong> (need to lose ${p.wt_lb-goalWt(p)} lbs)
    </div>`;
  }
  if(p.a1c){
    const ap=p.a1c.val<A1C_GATE;
    h+=`<div class="gate ${ap?'gate-p':'gate-f'}" style="margin-top:8px;">${ap?'✓':'✕'} A1c: <strong>${p.a1c.val}%</strong> ${ap?`(< ${A1C_GATE})`:`≥ ${A1C_GATE} — SURGERY HOLD`}</div>`;
  }
  return h;
}

function pnLabs(p){
  let h=`<div class="dp-t">Labs <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  ["cbc","bmp","ptinr","ua","ts"].forEach(k=>{
    const lb=p.labs[k];
    if(!lb||!lb.done){h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>${LAB_N[k]}</strong><span>Pending</span></div></div>`;return;}
    const flag=lb.abn?`<span class="cf cf-abn">⚠ ABN</span>`:`<span class="cf cf-ok">NL</span>`;
    h+=`<div class="ck"><div class="ci ${lb.abn?'y':'g'}">${lb.abn?'⚠':'✓'}</div><div class="ct"><strong>${LAB_N[k]}</strong><span>${esc(lb.date)} · ${esc(lb.vals||'')}</span></div>${flag}</div>`;
  });
  if(p.a1c&&p.labs.hba1c?.done){
    h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>HbA1c</strong><span>${esc(p.labs.hba1c.date)} · ${esc(p.labs.hba1c.vals)}</span></div><span class="cf cf-ok">NL</span></div>`;
  }
  return h;
}

function pnEKG(p){
  let h=`<div class="dp-t">EKG <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  if(!p.ekg?.done){
    h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>EKG not completed</strong></div></div>`;
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();uploadEKG(${p.id})">📷 Upload EKG Photo</button></div>`;
  } else {
    const flag=p.ekg.abn?`<span class="cf cf-abn">⚠ ABNORMAL</span>`:`<span class="cf cf-ok">Normal</span>`;
    h+=`<div class="ck"><div class="ci ${p.ekg.abn?'y':'g'}">${p.ekg.abn?'⚠':'✓'}</div><div class="ct"><strong>EKG — ${esc(p.ekg.date)}</strong><span>${esc(p.ekg.note)}</span></div>${flag}</div>`;
    if(p.ekg.abn&&p.ekg.cardiacClr===null){
      h+=`<div style="margin-top:10px;padding:12px;background:var(--yellowB);border-radius:8px;border:1px solid #fbbf24;">
        <div style="font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:8px;">⚠ Abnormal EKG — Does this require cardiac clearance?</div>
        <div style="display:flex;gap:8px;">
          <button class="btn p" onclick="event.stopPropagation();setEKGClr(${p.id},true)">Yes — Require Cardiac Clearance</button>
          <button class="btn" onclick="event.stopPropagation();setEKGClr(${p.id},false)">No — Clearance Not Required</button>
        </div>
      </div>`;
    } else if(p.ekg.abn&&p.ekg.cardiacClr!==null){
      if(p.ekg.cardiacClr){
        h+=`<div style="margin-top:6px;font-size:11px;color:var(--yellow);font-weight:600;">→ Cardiac clearance required and added to Clearances</div>`;
      } else {
        h+=`<div style="margin-top:6px;font-size:11px;color:var(--green);font-weight:600;">✓ Reviewed — Cardiac clearance not required</div>`;
      }
    }
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();uploadEKG(${p.id})">📷 Replace EKG Photo</button></div>`;
  }
  return h;
}

function pnClrs(p){
  let h=`<div class="dp-t">Clearances <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  Object.entries(p.clrs).forEach(([k,c])=>{
    if(!c.need)return;
    if(c.done){
      h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>${CLR_N[k]||k}</strong><span>${esc(c.date||'')}${c.note?' · '+esc(c.note):''}</span></div>
        <button class="btn s" onclick="event.stopPropagation();">📎 View</button>
        <button class="btn rm" onclick="event.stopPropagation();rmClr(${p.id},'${k}')" title="Remove">✕</button></div>`;
    } else {
      h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>${CLR_N[k]||k}</strong><span>${c.note?esc(c.note):'Not received'}</span></div>
        <button class="btn s" onclick="event.stopPropagation();uploadClr(${p.id},'${k}')">📷</button>
        <button class="btn s" onclick="event.stopPropagation();sendClrReq(${p.id},'${k}')">📱 Send</button>
        <button class="btn rm" onclick="event.stopPropagation();rmClr(${p.id},'${k}')" title="Remove">✕</button></div>`;
    }
  });
  h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();addClr(${p.id})">+ Add Clearance</button>
    <button class="btn p" onclick="event.stopPropagation();sendAllClr(${p.id})" style="margin-left:auto;">📱 Send All Missing</button></div>`;
  return h;
}

function pnCons(p){
  let h=`<div class="dp-t">Consents <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  const unsigned=[];
  Object.entries(p.cons).forEach(([k,c])=>{
    h+=`<div class="con-row"><div class="ci ${c.signed?'g':'r'}">${c.signed?'✓':'✕'}</div><strong style="flex:1;font-size:11px;">${CON_N[k]||k}</strong>`;
    if(c.signed){
      h+=`<button class="btn s" onclick="event.stopPropagation();viewConsent(${p.id},'${k}')">📄 Open</button><span class="cs cs-y">✓ Signed</span>`;
    } else {
      unsigned.push(k);
      h+=`<button class="btn s" onclick="event.stopPropagation();viewConsent(${p.id},'${k}')">📄 Open</button><span class="cs cs-n">Unsigned</span>`;
    }
    h+=`</div>`;
  });
  if(unsigned.length){
    h+=`<div class="dp-ft"><button class="btn p" onclick="event.stopPropagation();sendCons(${p.id})">📱 Text ${unsigned.length} Consent${unsigned.length>1?'s':''} for E-Signature</button></div>`;
  }
  return h;
}

function pnClass(p){
  let h=`<div class="dp-t">Pre-Op Education <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  if(p.cls?.st==="done"){
    h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>Completed</strong><span>${esc(p.cls.date||'')}</span></div></div>`;
  } else if(p.cls?.st==="scheduled"){
    h+=`<div class="ck"><div class="ci y">📅</div><div class="ct"><strong>Scheduled: ${esc(p.cls.date)}</strong><span>Not yet completed</span></div></div>`;
  } else {
    h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>Not scheduled</strong></div></div>`;
  }
  h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();schedCls(${p.id})">📅 Schedule</button>
    <button class="btn p" onclick="event.stopPropagation();shareVid(${p.id})">🎥 Share Video</button></div>`;
  h+=`<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);"><div style="font-size:10px;font-weight:700;color:var(--t4);margin-bottom:4px;">NPO INSTRUCTIONS</div>`;
  if(p.npo?.conf) h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>Sent & Confirmed</strong></div></div>`;
  else if(p.npo?.sent) h+=`<div class="ck"><div class="ci y">⚠</div><div class="ct"><strong>Sent — not confirmed</strong></div></div>`;
  else h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>Not sent</strong></div><button class="btn s" onclick="event.stopPropagation();P.find(x=>x.id===${p.id}).npo={sent:true,conf:false};render();">📱 Send</button></div>`;
  h+=`</div>`;
  return h;
}

function pnMeds(p){
  let h=`<div class="dp-t">Medications (${p.meds.length}) <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  h+=`<table class="mt"><thead><tr><th>Medication</th><th>Class</th><th>Action</th><th>Pre-Op</th><th>Hold Status</th><th>Restart</th><th></th></tr></thead><tbody>`;
  const sorted=[...p.meds].sort((a,b)=>{const o={stop:0,per_specialist:1,must_take:2,hold:3,continue:4,review:5};return(o[mInfo(a).ac]||5)-(o[mInfo(b).ac]||5);});
  sorted.forEach(med=>{
    const m=mInfo(med);
    const acMap={must_take:["ab-mt","MUST TAKE"],continue:["ab-c","CONTINUE"],hold:["ab-h","HOLD"],stop:["ab-s","STOP"],per_specialist:["ab-ps","PER SPEC"],review:["ab-rv","REVIEW"]};
    const[acC,acL]=acMap[m.ac]||["ab-rv","REVIEW"];
    const mh=p.medH[med];
    let hsH='<span style="color:var(--t4);font-size:8px;">—</span>';
    if(mh){
      if(!mh.sent) hsH=`<span class="hs hs-n">Not Sent</span>`;
      else if(!mh.ack) hsH=`<span class="hs hs-s">Sent</span>`;
      else hsH=`<span class="hs hs-a">✓ Ack</span>`;
      if(mh.sp===true) hsH+=` <span class="hs hs-a">✓ Bridge</span>`;
      else if(mh.sp===false) hsH+=` <span class="hs hs-n">Bridge TBD</span>`;
    }
    h+=`<tr>
      <td style="font-weight:600;">${esc(med)}</td>
      <td style="font-size:9px;color:var(--t3);">${esc(m.cls)}</td>
      <td><span class="${acC}" style="padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;">${acL}</span></td>
      <td style="font-size:9px;">${esc(m.pre)}</td>
      <td>${hsH}</td>
      <td style="font-size:9px;color:var(--t3);">${esc(m.restart||'—')}</td>
      <td style="text-align:right;"><button class="btn s" onclick="event.stopPropagation();editMed(${p.id},'${esc(med)}')" title="Edit">✏️</button><button class="btn rm" onclick="event.stopPropagation();removeMed(${p.id},'${esc(med)}')" title="Remove">✕</button></td>
    </tr>`;
  });
  h+=`</tbody></table>`;
  h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();addMed(${p.id})">+ Add Medication</button>
    <button class="btn p" onclick="event.stopPropagation();sendMedInstr(${p.id})" style="margin-left:auto;">📱 Send Medication Instructions</button></div>`;
  return h;
}

function pnHP(p){
  let h=`<div class="dp-t">History & Physical <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  if(p.hp?.st==="signed"){
    h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>H&P Signed — ${esc(p.hp.date||'')}</strong><span>Within 30 days of surgery ✓</span></div></div>`;
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();startHP(${p.id})">📄 View / Edit</button></div>`;
  } else if(p.hp?.st==="draft"){
    h+=`<div class="ck"><div class="ci y">✏</div><div class="ct"><strong>Draft — not signed</strong></div></div>`;
    h+=`<div class="dp-ft"><button class="btn p" onclick="event.stopPropagation();startHP(${p.id})">✏ Continue H&P</button></div>`;
  } else {
    h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>H&P not started</strong><span>Required within 30 days of surgery</span></div></div>`;
    h+=`<div class="dp-ft"><button class="btn p" onclick="event.stopPropagation();startHP(${p.id})">＋ Start H&P</button></div>`;
  }
  return h;
}

// ═══════ ACTIONS ═══════
function findP(id){return P.find(p=>p.id===id);}

function setEKGClr(id,need){
  const p=findP(id);if(!p)return;
  p.ekg.cardiacClr=need;
  if(need&&!p.clrs.cardiac){p.clrs.cardiac={need:true,done:false,note:"Added from abnormal EKG"};}
  else if(need&&p.clrs.cardiac){p.clrs.cardiac.need=true;}
  render();
}

ont-size:14px;font-weight:700;">${esc(p.l)}, ${esc(p.f)}</div><div style="font-size:10px;color:var(--t4);">${esc(p.mrn)} · ${p.age}yo · ${p.side} ${p.proc.toUpperCase()} · Surgery: ${p.surgDate}</div></div></div><div class="hp-section"><h4>HPI</h4><div class="hp-field"><textarea rows="3">${esc(hpi)}</textarea></div></div><div class="hp-section"><h4>PMH</h4><div class="hp-field"><textarea rows="2">${esc(pmhText)}</textarea></div></div><div class="hp-section"><h4>Medications</h4><div class="hp-pre">${esc(medList).replace(/\n/g,'<br>')}</div></div><div class="hp-section"><h4>Labs & Studies</h4><div class="hp-pre">${esc(labSummary).replace(/\n/g,'<br>')}<br>${esc(ekgText)}</div></div><div class="hp-section"><h4>Clearances</h4><div class="hp-pre">${esc(clrSummary).replace(/\n/g,'<br>')}</div></div><div class="hp-section"><h4>Assessment</h4><div class="hp-field"><textarea rows="2">${esc(assessment)}</textarea></div></div><div class="hp-section"><h4>Plan</h4><div class="hp-field"><textarea rows="3">${esc(plan)}</textarea></div></div>`,[{l:"Cancel",action:`closeModal();document.getElementById('modal').className='md';`},{l:"Save Draft",action:`doSaveHP(${id},'draft')`},{l:"Sign & Lock",p:true,action:`doSaveHP(${id},'signed')`}]);}

// PROTOCOL SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════════════════════
let protoCat = null; // active category key
let protoDraft = null; // working copy during editing

function openProtoSettings(){
  protoDraft = JSON.parse(JSON.stringify(PROTO));
  protoCat = Object.keys(protoDraft.cats)[0];
  renderProtoSettings();
  document.getElementById("protoOv").classList.add("open");
}
function closeProto(){
  document.getElementById("protoOv").classList.remove("open");
  protoDraft = null;
}

function protoChanges(){
  // Returns array of {catId, ruleId, label, oldVal, newVal}
  if(!protoDraft)return[];
  const changes=[];
  Object.entries(protoDraft.cats).forEach(([catId,cat])=>{
    cat.rules.forEach(rule=>{
      const orig=PROTO.cats[catId]?.rules.find(r=>r.id===rule.id);
      if(orig && String(rule.val)!==String(orig.val)){
        changes.push({catId,ruleId:rule.id,label:rule.label,oldVal:orig.val,newVal:rule.val});
      }
    });
  });
  return changes;
}

function catHasChanges(catId){
  if(!protoDraft)return false;
  return protoDraft.cats[catId]?.rules.some(rule=>{
    const orig=PROTO.cats[catId]?.rules.find(r=>r.id===rule.id);
    return orig && String(rule.val)!==String(orig.val);
  });
}

function renderProtoSettings(){
  const el=document.getElementById("protoMd");
  const changes=protoChanges();
  const cats=Object.entries(protoDraft.cats);

  let sidebar='';
  cats.forEach(([k,cat])=>{
    const active=protoCat===k;
    const changed=catHasChanges(k);
    sidebar+=`<button class="proto-side-btn ${active?'active':''} ${changed?'changed':''}" onclick="protoCat='${k}';renderProtoSettings()">
      <span style="font-size:13px;">${cat.icon||'📌'}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cat.label)}</span>
      <span class="dot"></span>
    </button>`;
  });

  const activeCat=protoDraft.cats[protoCat];
  let rules='';
  if(activeCat){
    activeCat.rules.forEach(rule=>{
      const orig=PROTO.cats[protoCat]?.rules.find(r=>r.id===rule.id);
      const changed=orig && String(rule.val)!==String(orig.val);
      rules+=`<div class="proto-rule ${changed?'changed':''}">
        <div class="proto-rule-top">
          <div>
            <div class="proto-rule-label">${esc(rule.label)}</div>
            ${rule.note?`<div class="proto-rule-note">${esc(rule.note)}</div>`:''}
          </div>
          <div class="proto-rule-input">
            ${rule.comp?`<span class="comp">${esc(rule.comp)}</span>`:''}
            ${rule.type==='num'
              ?`<input type="number" step="any" value="${rule.val}" onchange="updateProtoRule('${protoCat}','${rule.id}',this.value,'num')">`
              :`<input type="text" value="${esc(String(rule.val))}" onchange="updateProtoRule('${protoCat}','${rule.id}',this.value,'txt')">`
            }
            ${rule.unit?`<span class="unit">${esc(rule.unit)}</span>`:''}
          </div>
        </div>
        ${changed?`<div class="proto-rule-diff"><span class="old">${esc(String(orig.val))}</span><span class="arrow">→</span><span class="new">${esc(String(rule.val))}</span></div>`:''}
      </div>`;
    });
  }

  el.innerHTML=`
    <div class="proto-hd">
      <div>
        <h2>⚙ Protocol Configuration</h2>
        <div class="proto-hd-sub">Version: ${esc(protoDraft.version)} · ${protoDraft.modifiedBy?'Last modified by '+esc(protoDraft.modifiedBy):''} · ${Object.values(protoDraft.cats).reduce((a,c)=>a+c.rules.length,0)} rules across ${cats.length} categories</div>
      </div>
      <button class="md-x" onclick="closeProto()">✕</button>
    </div>
    <div class="proto-body">
      <div class="proto-side">${sidebar}</div>
      <div class="proto-rules">${rules}</div>
    </div>
    <div class="proto-ft">
      <div class="proto-ft-l">${changes.length?changes.length+' unsaved change'+(changes.length>1?'s':''):''}</div>
      <div class="proto-ft-r">
        <button class="btn" onclick="protoDraft=JSON.parse(JSON.stringify(PROTO));renderProtoSettings();" style="font-size:10px;">↺ Reset</button>
        <button class="btn" onclick="closeProto()">Cancel</button>
        <button class="btn p" onclick="protoConfirmSave()" ${changes.length===0?'disabled style="opacity:.4;cursor:not-allowed;font-size:10px;"':'style="font-size:10px;"'}>${changes.length?'Review & Save '+changes.length+' Change'+(changes.length>1?'s':''):'No Changes'}</button>
      </div>
    </div>
  `;
}

function updateProtoRule(catId,ruleId,val,type){
  const cat=protoDraft.cats[catId];if(!cat)return;
  const rule=cat.rules.find(r=>r.id===ruleId);if(!rule)return;
  rule.val = type==='num' ? (parseFloat(val)||0) : val;
  renderProtoSettings();
}

let protoConfirmMode=false;
function protoConfirmSave(){
  const changes=protoChanges();
  if(!changes.length)return;
  
  const el=document.getElementById("protoMd");
  // Replace the rules area with confirmation
  const rulesArea=el.querySelector('.proto-rules');
  rulesArea.innerHTML=`
    <div class="proto-confirm">
      <h4>⚠ Confirm ${changes.length} Protocol Change${changes.length>1?'s':''}</h4>
      ${changes.map(c=>`<div class="proto-confirm-item"><span class="lbl">${esc(c.label)}:</span> <span style="color:var(--red);text-decoration:line-through;">${esc(String(c.oldVal))}</span> → <span style="color:var(--green);font-weight:700;">${esc(String(c.newVal))}</span></div>`).join('')}
    </div>
    <div class="proto-confirm-name">
      <input type="text" id="protoSaveBy" placeholder="Your name (required to save)">
      <button class="btn p" onclick="doProtoSave()" style="font-size:10px;">✓ Confirm & Save</button>
      <button class="btn" onclick="renderProtoSettings()" style="font-size:10px;">← Back</button>
    </div>
    <p style="font-size:9px;color:var(--t4);margin-top:8px;">Changes take effect immediately across all patient evaluations. A record will be saved to the change history.</p>
  `;
}

function doProtoSave(){
  const nameEl=document.getElementById("protoSaveBy");
  const name=nameEl?nameEl.value.trim():'';
  if(!name){nameEl.style.borderColor='var(--red)';nameEl.focus();return;}
  
  const changes=protoChanges();
  
  // Record history
  PROTO_HISTORY.unshift({
    timestamp:new Date().toISOString(),
    modifiedBy:name,
    changes:changes.map(c=>({label:c.label,oldVal:c.oldVal,newVal:c.newVal}))
  });
  
  // Apply
  protoDraft.lastModified=new Date().toISOString();
  protoDraft.modifiedBy=name;
  PROTO=JSON.parse(JSON.stringify(protoDraft));
  document.getElementById("protoVer").textContent=PROTO.version;
  
  saveProto();
  closeProto();
  render(); // re-evaluate all patients with new thresholds
}

// ═══════ CHANGE HISTORY ═══════
function openProtoHistory(){
  const el=document.getElementById("histMd");
  let items='';
  if(PROTO_HISTORY.length===0){
    items=`<div style="text-align:center;padding:40px 0;color:var(--t4);font-size:12px;">No protocol changes recorded yet</div>`;
  } else {
    PROTO_HISTORY.forEach(entry=>{
      items+=`<div class="hist-entry">
        <div class="hist-entry-hd">
          <div class="hist-entry-who">${esc(entry.modifiedBy)}</div>
          <div class="hist-entry-when">${new Date(entry.timestamp).toLocaleString()}</div>
        </div>
        ${entry.changes.map(c=>`<div class="hist-entry-item">
          <span class="lbl">${esc(c.label)}</span>
          <span style="color:var(--red);text-decoration:line-through;font-family:monospace;font-size:10px;">${esc(String(c.oldVal))}</span>
          <span style="color:var(--t4);">→</span>
          <span style="color:var(--green);font-family:monospace;font-weight:700;font-size:10px;">${esc(String(c.newVal))}</span>
        </div>`).join('')}
      </div>`;
    });
  }
  
  el.innerHTML=`
    <div class="proto-hd">
      <div>
        <h2>📋 Protocol Change History</h2>
        <div class="proto-hd-sub">${PROTO_HISTORY.length} recorded change${PROTO_HISTORY.length!==1?'s':''}</div>
      </div>
      <button class="md-x" onclick="closeHist()">✕</button>
    </div>
    <div style="padding:16px;overflow-y:auto;flex:1;">${items}</div>
    <div class="proto-ft">
      <div class="proto-ft-l"></div>
      <div class="proto-ft-r">
        ${PROTO_HISTORY.length?`<button class="btn ro" onclick="if(confirm('Reset protocol to Q4 2025 defaults and clear history?')){PROTO=JSON.parse(JSON.stringify(PROTO_DEFAULT));PROTO_HISTORY=[];saveProto();closeHist();render();}" style="font-size:10px;">↺ Reset to Q4 2025 Defaults</button>`:''}
        <button class="btn" onclick="closeHist()">Close</button>
      </div>
    </div>
  `;
  document.getElementById("histOv").classList.add("open");
}
function closeHist(){document.getElementById("histOv").classList.remove("open");}

render();
</script>
</body>
</html>
