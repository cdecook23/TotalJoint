<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TJR Hub — Clinic v11.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{--bg:#0c0f14;--card:#12161e;--card2:#161b26;--border:#1e2533;--border2:#2a3040;--t1:#e4e7ec;--t2:#c8cdd5;--t3:#94a3b8;--t4:#64748b;--blue:#3b82f6;--blueL:#93c5fd;--blueD:#1e3a5f;--purple:#8b5cf6;--purpleL:#c4b5fd;--purpleD:#2e1065;--green:#22c55e;--greenL:#86efac;--greenD:#14532d;--yellow:#fbbf24;--yellowD:#422006;--red:#ef4444;--redD:#450a0a;}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;height:100vh;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
textarea,input,select,button{font-family:inherit;}

.sc{margin-bottom:10px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--card);}
.sc.brd{border-left:3px solid var(--blue);}
.sh{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--card2);flex-wrap:wrap;gap:4px;cursor:default;}
.sh.collapsible{cursor:pointer;}
.st{font-weight:800;font-size:11px;color:var(--t3);letter-spacing:.1em;}
.sb{padding:10px 12px;}
.sb.collapsed{display:none;}

.fl{padding:2px 0;font-size:13px;color:var(--t2);line-height:1.6;}
.fl-label{font-weight:700;color:var(--t4);font-size:10px;letter-spacing:.04em;text-transform:uppercase;}
.fl-blue{color:var(--blueL);}.fl-ul{text-decoration:underline;text-underline-offset:2px;text-decoration-color:#475569;}
.fl-indent{padding-left:16px;}.spacer{height:5px;}

.cb{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:3px;}
.icd{background:#1e1b4b;color:#a5b4fc;}.cpt{background:var(--greenD);color:var(--greenL);}
.ca{display:inline-flex;align-items:center;gap:3px;background:#431407;color:var(--yellow);padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;margin-left:3px;}

.ed{background:transparent;border:none;color:var(--t2);font-size:13px;font-family:inherit;line-height:1.6;width:100%;outline:none;resize:none;overflow:hidden;}
.ed:focus{background:rgba(59,130,246,0.08);border-radius:4px;}

.rom-box{display:inline-flex;align-items:center;gap:3px;background:var(--card2);border:1px solid var(--border2);border-radius:5px;padding:3px 6px;margin:2px 3px 2px 0;}
.rom-box:focus-within{border-color:var(--blue);}
.rom-input{background:transparent;border:none;color:var(--blueL);font-size:14px;font-weight:700;font-family:inherit;width:32px;text-align:center;outline:none;}
.rom-label{font-size:9px;color:var(--t4);font-weight:600;text-transform:uppercase;}
.rom-unit{font-size:10px;color:var(--t4);}

.tb{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--card2);color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;}
.tb:hover{border-color:var(--blue);color:var(--t2);}.tb.active{background:var(--blueD);border-color:var(--blue);color:var(--blueL);}

.sev-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--card2);color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;}
.sev-btn:hover{border-color:var(--blue);}
.sev-none.active{background:var(--greenD);border-color:var(--green);color:var(--greenL);}
.sev-mild.active{background:var(--yellowD);border-color:#f59e0b;color:var(--yellow);}
.sev-moderate.active{background:#431407;border-color:#ea580c;color:#fb923c;}
.sev-severe.active{background:var(--redD);border-color:var(--red);color:#fca5a5;}

/* AI-populated fields flash briefly */
.sev-btn.ai-flash{animation:aiPulse .6s ease;}
.tb.ai-flash{animation:aiPulse .6s ease;}
@keyframes aiPulse{0%{box-shadow:0 0 0 0 rgba(59,130,246,.6);}50%{box-shadow:0 0 12px 4px rgba(59,130,246,.3);}100%{box-shadow:0 0 0 0 transparent;}}

.add-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;border:1px dashed var(--border2);background:transparent;color:var(--t4);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;margin:3px 2px 0 0;}
.add-btn:hover{border-color:var(--blue);color:var(--blueL);}

.del-btn{background:none;border:none;color:var(--t4);cursor:pointer;font-size:10px;padding:0 4px;opacity:.5;transition:opacity .12s;}
.del-btn:hover{opacity:1;color:var(--red);}

.item-row{display:flex;align-items:center;gap:4px;padding:1px 0;}
.item-row:hover .del-btn{opacity:.8;}

.ol{display:flex;align-items:flex-start;gap:6px;padding:4px 8px;border-radius:4px;background:var(--card2);border:1px solid var(--border);margin-bottom:2px;font-size:11px;color:var(--t2);}
.ol-ok{color:var(--green);font-weight:700;flex-shrink:0;}.ol-w{color:var(--yellow);font-weight:700;flex-shrink:0;}

.mt{width:100%;border-collapse:collapse;margin:4px 0;font-size:11px;}
.mt th{text-align:left;font-size:8px;font-weight:700;color:var(--t4);letter-spacing:.06em;text-transform:uppercase;padding:3px 6px;border-bottom:1px solid var(--border2);}
.mt td{padding:4px 6px;border-bottom:1px solid #1a1f2e;vertical-align:top;color:var(--t2);}
.mt tr:hover td{background:#1a1f2e;}
.ac-c{color:var(--greenL);font-weight:600;}.ac-h{color:var(--yellow);font-weight:600;}.ac-s{color:var(--red);font-weight:700;}.ac-m{color:var(--blueL);font-weight:700;}.ac-p{color:var(--purpleL);font-weight:600;}.ac-r{color:var(--t3);font-weight:600;}

.of{display:flex;align-items:flex-start;padding:4px 0;border-bottom:1px solid #1a1f2e;gap:8px;}
.of-l{font-weight:700;font-size:10px;color:var(--t4);letter-spacing:.05em;text-transform:uppercase;min-width:110px;padding-top:4px;flex-shrink:0;}
.of-v{flex:1;display:flex;gap:4px;flex-wrap:wrap;}

.clr-grid{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0;}
.clr-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--card2);color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;}
.clr-btn:hover{border-color:var(--blue);}.clr-btn.active{background:var(--blueD);border-color:var(--blue);color:var(--blueL);}
.clr-btn.auto{background:var(--greenD);border-color:var(--green);color:var(--greenL);}

.ab{border-radius:6px;padding:6px 10px;margin:4px 0;display:flex;align-items:flex-start;gap:6px;font-size:11px;}
.ab.w{background:#431407;border:1px solid #92400e;color:var(--yellow);}.ab.d{background:var(--redD);border:1px solid #7f1d1d;color:#fca5a5;}

.op-para{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--t2);line-height:1.7;margin-top:8px;white-space:pre-line;}

.chev{font-size:10px;color:var(--t4);transition:transform .2s;display:inline-block;}
.chev.open{transform:rotate(90deg);}

/* ═══ AMBIENT AI BAR ═══ */
#amb-bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(180deg,rgba(12,15,20,0) 0%,#0c0f14 20%);padding:24px 16px 12px;pointer-events:none;}
#amb-inner{pointer-events:all;max-width:820px;margin:0 auto;background:#12161e;border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;align-items:stretch;min-height:44px;}
#amb-ctrl{display:flex;align-items:center;gap:8px;padding:8px 14px;border-right:1px solid var(--border);cursor:pointer;user-select:none;transition:background .15s;}
#amb-ctrl:hover{background:var(--card2);}
#amb-dot{width:8px;height:8px;border-radius:50%;background:var(--t4);transition:background .3s,box-shadow .3s;}
#amb-dot.live{background:#22c55e;box-shadow:0 0 8px #22c55e88;}
#amb-dot.live{animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 4px #22c55e44;}50%{box-shadow:0 0 12px #22c55eaa;}}
#amb-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--t4);text-transform:uppercase;white-space:nowrap;}
#amb-label.live{color:var(--greenL);}
#amb-feed{flex:1;display:flex;align-items:center;padding:8px 14px;gap:10px;overflow:hidden;min-width:0;}
#amb-detections{flex:1;display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;min-width:0;scrollbar-width:none;}
#amb-detections::-webkit-scrollbar{display:none;}
.amb-det{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;animation:detSlide .3s ease;flex-shrink:0;}
.amb-det.sev{background:var(--blueD);color:var(--blueL);border:1px solid #2563eb44;}
.amb-det.plan{background:var(--purpleD);color:var(--purpleL);border:1px solid #7c3aed44;}
.amb-det.pt{background:var(--greenD);color:var(--greenL);border:1px solid #16a34a44;}
.amb-det.fu{background:var(--yellowD);color:var(--yellow);border:1px solid #d9770644;}
.amb-det.heard{background:var(--card2);color:var(--t3);border:1px solid var(--border2);}
.amb-det.mri{background:#1e1b4b;color:#a5b4fc;border:1px solid #4338ca44;}
@keyframes detSlide{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
#amb-transcript{font-size:10px;color:var(--t4);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
#amb-mode{display:flex;align-items:center;gap:6px;padding:8px 14px;border-left:1px solid var(--border);}
.amb-mode-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--card2);color:var(--t4);font-size:9px;font-weight:700;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s;}
.amb-mode-btn:hover{border-color:var(--blue);color:var(--t3);}
.amb-mode-btn.active{background:var(--blueD);border-color:var(--blue);color:var(--blueL);}

/* Demo sim controls */
#amb-sim{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--border);}
.sim-btn{padding:3px 6px;border-radius:3px;border:1px solid var(--border2);background:var(--card2);color:var(--t4);font-size:8px;font-weight:700;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s;}
.sim-btn:hover{border-color:var(--yellow);color:var(--yellow);}

/* Dictation mic button */
.mic-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:var(--card2);color:var(--t4);font-size:11px;cursor:pointer;transition:all .15s;vertical-align:middle;margin-left:4px;flex-shrink:0;}
.mic-btn:hover{border-color:var(--blue);color:var(--blueL);}
.mic-btn.recording{background:#450a0a;border-color:var(--red);color:#fca5a5;animation:micPulse 1.2s infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 8px 3px rgba(239,68,68,.2);}}

/* Evidence trail */
.ev-trail{display:flex;align-items:flex-start;gap:6px;padding:4px 8px;border-radius:4px;background:#0f172a;border:1px solid #1e293b;margin:3px 0;font-size:10px;}
.ev-ts{color:var(--t4);font-weight:600;flex-shrink:0;min-width:52px;}
.ev-heard{color:var(--t3);font-style:italic;flex:1;}
.ev-action{color:var(--blueL);font-weight:600;flex-shrink:0;}

/* Clearance letter */
.clr-letter{background:#0f172a;border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin:4px 0;font-size:10px;color:var(--t3);line-height:1.5;}
.clr-send{padding:3px 8px;border-radius:4px;border:none;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-weight:700;font-size:9px;cursor:pointer;margin-left:6px;}
.clr-sent{padding:3px 8px;border-radius:4px;background:#065f46;color:#6ee7b7;font-weight:700;font-size:9px;display:inline-flex;align-items:center;gap:3px;margin-left:6px;}

@media(max-width:768px){.sb{padding:8px 10px;}.sh{padding:6px 10px;}.mt td,.mt th{padding:3px 4px;font-size:10px;}.rom-input{width:28px;font-size:12px;}.of-l{min-width:80px;font-size:9px;}.fl{font-size:12px;}.tb{font-size:10px;padding:3px 7px;}.sev-btn{font-size:10px;padding:3px 7px;}#amb-inner{flex-wrap:wrap;}#amb-feed{min-width:100%;order:3;border-top:1px solid var(--border);}#amb-mode{border-left:none;}#amb-sim{border-left:none;}}
</style>
</head>
<body>
<div id="app"></div>
<div id="amb-bar">
  <div id="amb-inner">
    <div id="amb-ctrl" onclick="toggleAmbient()">
      <div id="amb-dot"></div>
      <div id="amb-label">AMBIENT</div>
    </div>
    <div id="amb-feed">
      <div id="amb-detections"></div>
      <div id="amb-transcript"></div>
    </div>
    <div id="amb-mode">
      <button class="amb-mode-btn active" id="amb-auto" onclick="setAmbMode('auto')" title="Auto-apply detections">AUTO</button>
      <button class="amb-mode-btn" id="amb-suggest" onclick="setAmbMode('suggest')" title="Show suggestions only">SUGGEST</button>
    </div>
    <div id="amb-sim">
      <button class="sim-btn" onclick="simSurgeon('severe_knee')" title="Simulate: severe knee OA">SEV</button>
      <button class="sim-btn" onclick="simSurgeon('plan_tka')" title="Simulate: plan TKA">TKA</button>
      <button class="sim-btn" onclick="simSurgeon('plan_cons')" title="Simulate: conservative">CONS</button>
      <button class="sim-btn" onclick="simSurgeon('fu_6')" title="Simulate: follow-up 6wk">FU6</button>
      <button class="sim-btn" onclick="simSurgeon('pt_home')" title="Simulate: home PT">PT</button>
      <button class="sim-btn" onclick="simSurgeon('mri_labrum')" title="Simulate: MRI labrum tear">MRI</button>
    </div>
  </div>
</div>
<script>

// ═══════ MED DB ═══════
const MDB={};function aM(c,n,r){n.forEach(x=>{MDB[x.toLowerCase()]={dc:c,...r};});}
aM("ACE Inhibitor",["benazepril","captopril","enalapril","fosinopril","lisinopril","zestril","quinapril","ramipril","trandolapril"],{a:"hold",p:"Hold AM/PM day of surgery",r:"Resume POD#1"});
aM("ARB",["candesartan","irbesartan","losartan","cozaar","olmesartan","telmisartan","valsartan","diovan","entresto"],{a:"hold",p:"Hold AM/PM day of surgery",r:"Resume POD#1"});
aM("Beta Blocker",["atenolol","tenormin","bisoprolol","metoprolol","lopressor","toprol","nadolol","nebivolol","propranolol","sotalol","carvedilol","coreg"],{a:"must_take",p:"MUST take — cardioprotective",r:"Continue",w:1});
aM("Antiarrhythmic",["digoxin","amiodarone","flecainide","dronedarone","dofetilide"],{a:"must_take",p:"MUST take — cardioprotective",r:"Continue",w:1});
aM("Diuretic",["furosemide","lasix","bumetanide","spironolactone","torsemide","triamterene","chlorthalidone","metolazone"],{a:"hold",p:"Hold day of surgery",r:"Resume POD#1"});
aM("Anticoagulant",["apixaban","eliquis","rivaroxaban","xarelto","edoxaban","warfarin","coumadin","enoxaparin","lovenox","heparin","dabigatran","pradaxa"],{a:"per_specialist",p:"Per Cardiologist/Surgeon — coordinate bridging",r:"Per Cardiologist/Surgeon",cc:1,w:1});
aM("Antiplatelet",["clopidogrel","plavix","prasugrel","effient","ticagrelor","brillinta","dipyridamole","aggrenox"],{a:"per_specialist",p:"Per Cardiologist/Surgeon",r:"Per Cardiologist/Surgeon",cc:1,w:1});
aM("NSAID/Antiplatelet",["aspirin"],{a:"continue",p:"Per surgeon",r:"Continue — DVT ppx"});
const ND={"diclofenac":1,"ibuprofen":1,"advil":1,"motrin":1,"ketorolac":1,"etodolac":2,"indomethacin":2,"celecoxib":2,"celebrex":2,"meloxicam":4,"mobic":4,"naproxen":4,"aleve":4,"sulindac":4,"nabumetone":6,"oxaprozin":10,"piroxicam":10};
Object.keys(ND).forEach(n=>{const d=ND[n];MDB[n]={dc:"NSAID",a:"hold",p:`Hold ${d}d prior`,r:"Resume per surgeon",hd:d};});
aM("Metformin",["metformin","glucophage","glumetza"],{a:"hold",p:"Hold 12hr (48hr if CKD)",r:"Resume w/ oral intake + stable renal",w:1});
aM("SGLT2 Inhibitor",["canagliflozin","invokana","dapagliflozin","farxiga","empagliflozin","jardiance","ertugliflozin","steglatro"],{a:"stop",p:"MUST stop 3-4d prior — DKA risk",r:"Resume when oral baseline",w:1,crit:1});
aM("GLP-1 RA (Daily)",["liraglutide","victoza","saxenda"],{a:"hold",p:"Hold 1 day prior",r:"Resume w/ oral intake",glp1:1,w:1});
aM("GLP-1 RA (Weekly)",["semaglutide","ozempic","wegovy","dulaglutide","trulicity","exenatide","tirzepatide","mounjaro","zepbound"],{a:"hold",p:"Hold min 1 week prior",r:"Resume w/ oral diet",glp1:1,w:1});
aM("Insulin (Rapid)",["humalog","novolog","apidra","humulin r"],{a:"hold",p:"Hold AM DOS",r:"Resume w/ first meal"});
aM("Insulin (Basal)",["lantus","basaglar","toujeo","levemir","tresiba"],{a:"hold",p:"Take 2/3 dose DOS",r:"Resume normal w/ diet"});
aM("MAOI",["phenelzine","nardil","tranylcypromine","parnate"],{a:"stop",p:"MUST stop 2wk prior",r:"Per prescriber",w:1,crit:1});
aM("TCA",["amitriptyline","nortriptyline","imipramine","doxepin","desipramine"],{a:"hold",p:"OK night before. Hold AM.",r:"Resume w/ fluids"});
aM("SSRI/SNRI",["sertraline","zoloft","fluoxetine","prozac","paroxetine","citalopram","escitalopram","lexapro","venlafaxine","duloxetine","cymbalta","bupropion","wellbutrin","mirtazapine","trazodone"],{a:"continue",p:"Take w/ sip water",r:"Continue"});
aM("Opioid",["oxycodone","hydrocodone","morphine","tramadol","methadone","codeine","hydromorphone","tapentadol"],{a:"continue",p:"May take DOS",r:"Continue"});
aM("CCB",["amlodipine","norvasc","diltiazem","cardizem","nifedipine","verapamil"],{a:"continue",p:"Continue",r:"Continue"});
aM("Antiseizure",["gabapentin","neurontin","pregabalin","lyrica","levetiracetam","keppra","topiramate","lamotrigine","carbamazepine","valproic acid","lorazepam","clonazepam"],{a:"continue",p:"Take w/ sip water",r:"Continue"});
aM("Thyroid",["levothyroxine","synthroid","armour thyroid","methimazole","liothyronine"],{a:"continue",p:"Continue",r:"Continue"});
aM("Antireflux",["omeprazole","prilosec","pantoprazole","protonix","lansoprazole","esomeprazole","nexium","famotidine","pepcid"],{a:"continue",p:"Continue",r:"Continue"});
aM("Statin",["atorvastatin","lipitor","rosuvastatin","crestor","simvastatin","pravastatin","lovastatin","pitavastatin"],{a:"continue",p:"Take night before",r:"Continue"});
aM("Immunosuppressant",["prednisone","tacrolimus","cyclosporine","mycophenolate","azathioprine","sirolimus"],{a:"continue",p:"Continue — critical",r:"Continue",w:1});
aM("Vitamin/Supplement",["calcium","vitamin d","vitamin d3","vitamin c","vitamin b12","folic acid","iron","magnesium","zinc","multivitamin","potassium"],{a:"continue",p:"May continue",r:"Continue"});
aM("Urological",["tamsulosin","flomax","alfuzosin","dutasteride","finasteride"],{a:"continue",p:"Continue",r:"Continue"});
aM("Antibiotic",["cefdinir","amoxicillin","azithromycin","doxycycline","ciprofloxacin","cephalexin","clindamycin"],{a:"continue",p:"Continue course",r:"Complete"});
aM("Cholesterol",["ezetimibe","zetia","fenofibrate","gemfibrozil"],{a:"continue",p:"Continue",r:"Continue"});
aM("OTC Supplement",["garlic","ginkgo","ginseng","vitamin e","fish oil","omega-3","turmeric","saw palmetto"],{a:"hold",p:"Hold DOS",r:"Resume post-op"});
aM("Weight Loss",["phentermine","qsymia"],{a:"stop",p:"MUST stop 7d prior",r:"Per prescriber",w:1,crit:1});

function cpb(c){return`<span class="cb cpt">CPT ${c}</span>`;}
function sec(t,body,cls='',ex='',coll=false,open=true){const bodyId='sec_'+Math.random().toString(36).slice(2,8);return`<div class="sc ${cls}"><div class="sh ${coll?'collapsible':''}" ${coll?`onclick="document.getElementById('${bodyId}').classList.toggle('collapsed');this.querySelector('.chev').classList.toggle('open');"`:''} ><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">${coll?`<span class="chev ${open?'open':''}">▶</span>`:''}<span class="st">${t}</span></div>${ex}</div><div class="sb ${!open&&coll?'collapsed':''}" id="${bodyId}">${body}</div></div>`;}
function romBox(l,v,id){return`<span class="rom-box"><span class="rom-label">${l}</span><input class="rom-input" id="rom_${id}" value="${v}"><span class="rom-unit">°</span></span>`;}
function itemRow(text,onDel){return`<div class="item-row"><span style="flex:1;">${text}</span><button class="del-btn" onclick="${onDel}" title="Remove">✕</button></div>`;}
const dosStr=new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString();

function medTbl(meds,po){const cl=meds.map(m=>cM(m)),so={stop:0,per_specialist:1,must_take:2,hold:3,continue:4,review:5};cl.sort((a,b)=>(so[a.a]||5)-(so[b.a]||5));const g1=cl.some(m=>m.glp1),sg=cl.some(m=>m.crit&&m.dc.includes('SGLT2'));let h='';if(!po&&g1)h+=`<div class="ab w"><b>⚠ GLP-1 RA</b> — Clear liquid diet 24hr prior (aspiration risk)</div>`;if(!po&&sg)h+=`<div class="ab d"><b>🛑 SGLT2</b> — MUST stop 3-4d prior (DKA risk)</div>`;h+=`<table class="mt"><thead><tr><th>Medication</th><th>Class</th><th>Action</th><th>${po?'Post-Op':'Pre-Op'}</th><th>Restart</th></tr></thead><tbody>`;cl.forEach(m=>{const ac=m.a==='must_take'?'ac-m':m.a==='stop'?'ac-s':m.a==='per_specialist'?'ac-p':m.a==='hold'?'ac-h':m.a==='continue'?'ac-c':'ac-r';const lb=m.a==='must_take'?'MUST TAKE':m.a==='per_specialist'?'PER SPEC':m.a.toUpperCase();h+=`<tr><td style="font-weight:600;">${esc(m.inp)}</td><td style="font-size:10px;color:var(--t4);">${esc(m.dc)}</td><td class="${ac}">${lb}</td><td style="font-size:10px;">${esc(po?m.r:m.p)}</td><td style="font-size:10px;">${esc(m.r)}</td></tr>`;});h+=`</tbody></table>`;return{html:h,cl,g1,sg};}

function radKnee(side,sev,impl,jk){if(impl)return`<div class="fl"><b>EXAM:</b> 4 views: WB AP, lateral, Rosenberg, Sunrise</div><div class="fl"><b>INDICATION:</b> Joint Implant</div><div class="fl"><b>FINDINGS:</b> ${side} knee arthroplasty present. Components in expected position. No periprosthetic fracture. No loosening. No dislocation.</div><div class="fl"><b>IMPRESSION:</b></div><div class="fl fl-indent">1. ${side} knee arthroplasty <b>without acute complication</b>.</div><div class="fl fl-indent">2. No periprosthetic fracture.</div>`;
  return`<div class="fl"><b>EXAM:</b> 4 views: WB AP, lateral, Rosenberg, Sunrise</div><div class="fl"><b>INDICATION:</b> Knee pain / DJD evaluation</div><div class="fl"><b>FINDINGS:</b> WB alignment assessed. No acute fracture or dislocation. <span style="display:inline-flex;gap:4px;vertical-align:middle;"><button class="sev-btn sev-none ${sev==='none'?'active':''}" onclick="setSev('${jk}','none')">None</button><button class="sev-btn sev-mild ${sev==='mild'?'active':''}" onclick="setSev('${jk}','mild')">Mild</button><button class="sev-btn sev-moderate ${sev==='moderate'?'active':''}" onclick="setSev('${jk}','moderate')">Moderate</button><button class="sev-btn sev-severe ${sev==='severe'?'active':''}" onclick="setSev('${jk}','severe')">Severe</button></span> degenerative change with joint space narrowing, osteophytes, subchondral sclerosis. No aggressive osseous lesion.</div><div class="fl"><b>IMPRESSION:</b></div><div class="fl fl-indent">1. <b>${(sev||'___').charAt(0).toUpperCase()+(sev||'___').slice(1)}</b> OA of the ${side.toLowerCase()} knee on WB radiographs. ${icd(side.toLowerCase()+'_knee_oa')}</div><div class="fl fl-indent">2. No acute osseous abnormality.</div>`;}

function radHip(side,sev,impl,jk){if(impl)return`<div class="fl"><b>EXAM:</b> 2 views: standing AP, lateral</div><div class="fl"><b>INDICATION:</b> Hip implant</div><div class="fl"><b>FINDINGS:</b> ${side} THA present. Components in expected position. No periprosthetic fracture. No dislocation. No loosening.</div><div class="fl"><b>IMPRESSION:</b></div><div class="fl fl-indent">1. ${side} hip arthroplasty <b>without acute complication</b>.</div><div class="fl fl-indent">2. No periprosthetic fracture or dislocation.</div>`;
  return`<div class="fl"><b>EXAM:</b> 2 views: standing AP, lateral</div><div class="fl"><b>INDICATION:</b> Hip pain / DJD evaluation</div><div class="fl"><b>FINDINGS:</b> No acute fracture or dislocation. <span style="display:inline-flex;gap:4px;vertical-align:middle;"><button class="sev-btn sev-none ${sev==='none'?'active':''}" onclick="setSev('${jk}','none')">None</button><button class="sev-btn sev-mild ${sev==='mild'?'active':''}" onclick="setSev('${jk}','mild')">Mild</button><button class="sev-btn sev-moderate ${sev==='moderate'?'active':''}" onclick="setSev('${jk}','moderate')">Moderate</button><button class="sev-btn sev-severe ${sev==='severe'?'active':''}" onclick="setSev('${jk}','severe')">Severe</button></span> degenerative change of the ${side.toLowerCase()} hip with joint space narrowing, osteophytes, subchondral sclerosis.</div><div class="fl"><b>IMPRESSION:</b></div><div class="fl fl-indent">1. <b>${(sev||'___').charAt(0).toUpperCase()+(sev||'___').slice(1)}</b> OA of the ${side.toLowerCase()} hip. ${icd(side.toLowerCase()+'_hip_oa')}</div><div class="fl fl-indent">2. No acute osseous abnormality.</div>`;}

// ═══════ OP NARRATIVE ═══════
function genTKANarrative(d,o){const oe=OEM[d.oem]||OEM["Zimmer Biomet"];const sysName=d.oem==='DePuy'?'Attune':d.oem==='Stryker'?'Triathlon':d.oem==='Smith & Nephew'?(d.snSys||'Journey II'):oe.knee.sys;const nb=d.nBlock||'Adductor Canal Block';return`The patient was identified in the preoperative area. The operative extremity was confirmed and marked. The patient was brought to the operating room and placed supine on the operative table. ${d.anes} anesthesia was administered${nb!=='None'?'. A '+nb.toLowerCase()+' was performed by anesthesia for postoperative pain management':''}. A ${d.tourn==='Yes'?'tourniquet was applied to the proximal thigh and inflated':'tourniquet was not used'}. The ${d.side.toLowerCase()} lower extremity was prepped and draped in the usual sterile fashion.\n\nA ${d.arth.toLowerCase()} arthrotomy was performed. Inspection of the knee revealed ${d.find.toLowerCase()}. The tibial and femoral cuts were performed using ${d.guid.toLowerCase()} guidance. The PCL was ${d.pcl.toLowerCase()}.\n\nTrial components were placed and the knee was taken through a range of motion and assessed for stability. Balance was achieved in flexion and extension.${d.mr!=='None'?' A '+d.mr.toLowerCase()+' release was performed medially.':''}${d.lr!=='None'?' A '+d.lr.toLowerCase()+' release was performed laterally.':''}\n\nThe ${sysName} components were implanted: Femur size ${d.fs} ${d.ft}, Tibia size ${d.ts}, Poly ${d.ps}mm ${d.pt2}${d.pas!=='None'?`, Patella ${d.pas}mm`:' (patella not resurfaced)'}. Fixation: ${d.impFix||d.fix}.\n\nThe wound was irrigated with ${d.irr.toLowerCase()}. The arthrotomy, subcutaneous tissue, and skin were closed in layered fashion. ${d.dress}${d.dressNote?' ('+d.dressNote+')':''} dressing was applied. The patient tolerated the procedure well ${d.comp==='None'&&!d.compNote?'without complication ':''}and was transferred to the recovery area in stable condition.${d.opDict?'\n\n'+d.opDict:''}`;}

function genTHANarrative(d,o){const oe=OEM[d.oem]||OEM["Zimmer Biomet"];const hipSys=d.oem==='DePuy'?'Pinnacle/Corail':d.oem==='Stryker'?'Trident/Accolade':d.oem==='Smith & Nephew'?'Polarstem/R3':oe.hip.sys;const nb=d.nBlock||'LFCN Block';return`The patient was identified in the preoperative area. The operative extremity was confirmed and marked. The patient was brought to the operating room and placed supine on the operative table. ${d.anes} anesthesia was administered${nb!=='None'?'. A '+nb.toLowerCase()+' was performed by anesthesia for postoperative pain management':''}. The ${d.side.toLowerCase()} lower extremity was prepped and draped in the usual sterile fashion.\n\nA ${d.app.toLowerCase()} approach was utilized with a ${d.inc.toLowerCase()} incision. The capsule was ${d.cap.toLowerCase()}. The femoral head was dislocated and the femoral neck osteotomy was performed.\n\nThe acetabulum was prepared with sequential reaming ${d.ream}. ${d.flu==='Yes'?'Fluoroscopy was used to confirm component positioning.':''} The ${hipSys} components were implanted: Shell size ${d.sh}, Liner ${d.lin}mm, Stem size ${d.st}, Neck ${d.neck}, Head ${d.hd}mm. ${d.scr!=='No'?`${d.scr} acetabular screw(s) placed.`:'No supplemental screws.'} Fixation: ${d.impFix||'Cemented'}.${d.fr!=='No'?' A '+d.fr.toLowerCase()+' release was performed.':''}\n\nTrial reduction was performed assessing stability, leg length, and offset. Final components were implanted and reduction confirmed stable.\n\nThe wound was irrigated with ${d.irr.toLowerCase()}. The capsule, fascia, subcutaneous tissue, and skin were closed in layered fashion. ${d.dress}${d.dressNote?' ('+d.dressNote+')':''} dressing was applied. The patient tolerated the procedure well ${d.comp==='None'&&!d.compNote?'without complication ':''}and was transferred to the recovery area in stable condition.${d.opDict?'\n\n'+d.opDict:''}`;}

function opT(l,k,opts,cur){return`<div class="of"><div class="of-l">${l}</div><div class="of-v">${opts.map(o=>`<button class="tb ${cur===o?'active':''}" onclick="uOp('${k}','${o}')">${o}</button>`).join('')}</div></div>`;}
function opS(l,k,sizes,cur){return`<div class="of"><div class="of-l">${l}</div><div class="of-v">${sizes.map(s=>`<button class="tb ${String(cur)===String(s)?'active':''}" onclick="uOp('${k}','${s}')" style="min-width:26px;text-align:center;">${s}</button>`).join('')}</div></div>`;}

// ═══════ RENDER NEW EXAM ═══════
function renderNew(p){const i=p.intake,cardiac=i.pmh?.some(c=>CARDIAC.includes(c)),mr=medTbl(i.meds,false);const cc=p.joints.map(j=>`${j.side} ${j.type==='knee'?'Knee':'Hip'} pain`).join(', ');let h='';
  h+=sec('DEMOGRAPHICS',`<div class="fl"><span class="fl-label">Patient: </span><span class="fl-blue">${esc(p.last)}, ${esc(p.first)}</span> &nbsp; <span class="fl-label">DOB: </span>${esc(p.dob)} &nbsp; <span class="fl-label">Age: </span>${p.age} &nbsp; <span class="fl-label">MRN: </span>${esc(p.mrn)}</div><div class="fl"><span class="fl-label">Insurance: </span>${esc(p.ins)} &nbsp; <span class="fl-label">Surgeon: </span>${esc(p.surgeon)} &nbsp; <span class="fl-label">DOS: </span>${dosStr}</div><div class="fl"><span class="fl-label">Vitals: </span>Ht ${esc(i.ht)} / Wt ${esc(i.wt)} / BMI ${esc(i.bmi)} kg/m²</div><div class="fl"><span class="fl-label">Caregiver: </span>${esc(i.cg_rel||'')} — <span class="fl-blue">${esc(i.cg_name||'')}</span> &nbsp; ${esc(i.cg_phone||'')}</div>`);

  h+=sec('CHIEF COMPLAINT',`<div class="fl" style="font-size:14px;font-weight:600;color:var(--blueL);">${esc(cc)}</div>`,'brd');

  let hpiH='';p.joints.forEach((j,ji)=>{const jd=p.jd[j.key];if(!jd)return;const isK=j.type==='knee',lb=`${j.side} ${isK?'Knee':'Hip'}`;if(p.joints.length>1)hpiH+=`<div style="font-weight:700;font-size:12px;color:${isK?'var(--blueL)':'var(--purpleL)'};margin-top:${ji?'8':'0'}px;">${lb}</div>`;hpiH+=`<textarea class="ed" rows="3" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';">${esc(`${p.first} ${p.last} is a ${p.age}-year-old presenting with ${lb.toLowerCase()} pain of ${jd.pd} duration. Pain ${jd.pl}/10, worst ${jd.pw}/10. ${jd.hpi}`)}</textarea>`;if(jd.pt)hpiH+=`<div class="fl"><span class="fl-label">Prior Tx: </span><input class="ed" value="${esc(jd.pt.join(', '))}" style="width:100%;"></div>`;if(jd.fl)hpiH+=`<div class="fl"><span class="fl-label">Limitations: </span><input class="ed" value="${esc(jd.fl.join(', '))}" style="width:100%;"></div>`;});
  hpiH+=`<div class="fl"><span class="fl-label">Goals: </span><input class="ed" value="${esc(i.goals?.join(', ')||'')}" style="width:100%;"></div>`;
  hpiH+=`<div style="display:flex;align-items:center;gap:4px;margin:4px 0;"><span class="fl-label">Open Dictation:</span>${micBtn('hpi_dict')}</div><textarea class="ed" id="hpi_dict" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';" placeholder="Dictate additional HPI notes..."></textarea>`;
  h+=sec('HPI',hpiH,'brd');

  let mhH='';
  if(!i.pmhD?.length)mhH+=`<div class="fl fl-indent" style="color:var(--t4);">None reported</div>`;
  (i.pmhD||[]).forEach((c,ci)=>{mhH+=itemRow(`${esc(c)} ${icd(i.pmh[ci])}${CARDIAC.includes(i.pmh[ci])?` <span class="ca">⚠ CARDIAC</span>`:''}`,`alert('Removed: ${esc(c)}')`);});
  if(i.hba1c)mhH+=`<div class="fl fl-indent">HbA1c: <span class="fl-blue">${i.hba1c}%</span></div>`;
  mhH+=`<button class="add-btn" onclick="prompt('Add diagnosis:')">+ Add Diagnosis</button><div class="spacer"></div>`;
  mhH+=`<div class="fl"><span class="fl-label">Surgical Hx: </span><input class="ed" value="${esc(i.psh||'None')}" style="width:100%;"></div>`;
  mhH+=`<div class="fl"><span class="fl-label">Allergies:</span></div>`;
  (i.allergy||[]).forEach(a=>{mhH+=itemRow(`<span class="fl-indent">${esc(a)}</span>`,`alert('Removed')`);});
  mhH+=`<button class="add-btn" onclick="prompt('Add allergy:')">+ Add Allergy</button>`;
  mhH+=`<div style="display:flex;align-items:center;gap:4px;margin:4px 0;"><span class="fl-label">Additional:</span>${micBtn('mh_dict')}</div><textarea class="ed" id="mh_dict" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';" placeholder="Dictate or type..."></textarea>`;
  h+=sec('MEDICAL HISTORY',mhH,'brd');

  let medH='';i.meds.forEach(m=>{medH+=itemRow(`<span class="fl-indent" style="font-size:12px;color:var(--t3);">${esc(m)}</span>`,`alert('Removed')`);});
  medH+=`<button class="add-btn" onclick="prompt('Add medication:')">+ Add Medication</button>`;
  medH+=`<div style="display:flex;align-items:center;gap:4px;margin:4px 0;"><span class="fl-label">Additional:</span>${micBtn('med_dict')}</div><textarea class="ed" id="med_dict" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';" placeholder="Dictate or type..."></textarea>`;
  h+=sec('MEDICATIONS',medH,'brd');

  let rosH='';if(i.ros){Object.entries(i.ros).forEach(([k,v])=>{rosH+=itemRow(`<span class="fl-indent"><span style="font-weight:600;font-size:10px;color:var(--t4);text-transform:uppercase;">${k}: </span><input class="ed" value="${esc(v)}" style="width:60%;display:inline;"></span>`,`alert('Removed')`);});}
  rosH+=`<button class="add-btn" onclick="prompt('Add ROS:')">+ Add System</button>`;
  rosH+=`<div style="display:flex;align-items:center;gap:4px;margin:4px 0;"><span class="fl-label">Additional:</span>${micBtn('ros_dict')}</div><textarea class="ed" id="ros_dict" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';" placeholder="Dictate or type..."></textarea>`;
  h+=sec('REVIEW OF SYSTEMS',rosH,'brd','',true,S.rosOpen);

  // ═══ COMPREHENSIVE PE — defaults to normal, chart by exception ═══
  const peT=(jk,f,opts,cur)=>opts.map(o=>`<button class="tb ${cur===o?'active':''}" onclick="setPE('${jk}','${f}','${o}')" style="font-size:10px;padding:2px 7px;">${o}</button>`).join('');
  const peF=(jk,f,on,lb)=>`<button class="tb ${on?'active':''}" onclick="togPE('${jk}','${f}')" style="font-size:10px;padding:2px 7px;${on?'background:var(--redD);border-color:var(--red);color:#fca5a5;':''}">${on?'⊕ ':''}${lb}</button>`;
  const peR=(jk,f,v,lb)=>`<span class="rom-box"><span class="rom-label">${lb}</span><input class="rom-input" value="${v}" onchange="setPE('${jk}','${f}',this.value)"><span class="rom-unit">°</span></span>`;
  const peSt=(jk,f,v,lb)=>`<span style="font-size:10px;color:var(--t4);margin-right:4px;">${lb}</span><input class="ed" value="${esc(v)}" style="width:36px;display:inline;font-size:11px;text-align:center;" onchange="setPE('${jk}','${f}',this.value)">`;
  const peNV=(jk,f,v)=>`<span style="display:inline-flex;gap:3px;">${['Normal','Abnormal'].map(o=>`<button class="tb ${v===o?'active':''}" onclick="setPE('${jk}','${f}','${o}')" style="font-size:10px;padding:2px 7px;${o==='Abnormal'&&v===o?'background:var(--redD);border-color:var(--red);color:#fca5a5;':''}">${o}</button>`).join('')}</span>`;
  const peNP=(jk,f,v)=>`<span style="display:inline-flex;gap:3px;">${['Neg','Pos'].map(o=>`<button class="tb ${v===o?'active':''}" onclick="setPE('${jk}','${f}','${o}')" style="font-size:10px;padding:2px 7px;${o==='Pos'&&v===o?'background:var(--redD);border-color:var(--red);color:#fca5a5;':''}">${o}</button>`).join('')}</span>`;
  const peSL=(jk,f,v)=>`<span style="display:inline-flex;gap:3px;">${['Stable','Lax'].map(o=>`<button class="tb ${v===o?'active':''}" onclick="setPE('${jk}','${f}','${o}')" style="font-size:10px;padding:2px 7px;${o==='Lax'&&v===o?'background:var(--redD);border-color:var(--red);color:#fca5a5;':''}">${o}</button>`).join('')}</span>`;

  let peH=`<div class="fl" style="font-weight:700;font-size:11px;color:var(--t3);margin-bottom:4px;">CONSTITUTIONAL / SYSTEMS</div>`;
  peH+=`<div class="fl fl-indent" style="font-size:12px;">${esc(SURG_DEF.eval.generalPE)}</div><div class="spacer"></div>`;

  p.joints.forEach(j=>{const jd=p.jd[j.key];if(!jd)return;const isK=j.type==='knee',lb=`${j.side} ${isK?'Knee':'Hip'}`;
    const pe=S.peState[j.key]||{};
    peH+=`<div style="font-weight:700;font-size:12px;color:${isK?'var(--blueL)':'var(--purpleL)'};">${lb} Examination</div>`;

    if(isK){
      // INSPECTION
      peH+=`<div class="fl fl-indent"><span class="fl-label">Inspection: </span>Skin intact, no erythema, no ecchymosis.</div>`;
      peH+=`<div class="fl fl-indent"><span class="fl-label">Previous Incision: </span>${peT(j.key,'scar',['None','Midline','Medial','Lateral'],pe.scar||'None')}</div>`;
      peH+=`<div class="fl fl-indent"><span class="fl-label">Effusion: </span>${peT(j.key,'eff',['None','Trace','Mild','Moderate','Large'],pe.eff||'None')}</div>`;

      // PALPATION (toggles — red when positive = abnormal)
      peH+=`<div class="fl fl-indent"><span class="fl-label">Palpation: </span><span style="display:inline-flex;gap:3px;flex-wrap:wrap;">${peF(j.key,'mJL',pe.mJL,'Medial JL TTP')} ${peF(j.key,'lJL',pe.lJL,'Lateral JL TTP')} ${peF(j.key,'patF',pe.patF,'Patellar facet TTP')}</span></div>`;

      // ROM
      peH+=`<div class="fl fl-indent"><span class="fl-label">ROM: </span>${peR(j.key,'ext',pe.ext||'0','Ext')} ${peR(j.key,'flex',pe.flex||'120','Flex')}</div>`;

      // ALIGNMENT
      peH+=`<div class="fl fl-indent"><span class="fl-label">Alignment: </span>${peT(j.key,'align',['Varus','Valgus','Neutral'],pe.align||'Varus')}</div>`;

      // LIGAMENTOUS STABILITY
      peH+=`<div class="fl fl-indent"><span class="fl-label">Stability: </span></div>`;
      peH+=`<div class="fl fl-indent" style="padding-left:32px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;"><span style="font-size:10px;color:var(--t4);min-width:65px;">Varus stress</span>${peSL(j.key,'varS',pe.varS||'Stable')} <span style="font-size:10px;color:var(--t4);min-width:65px;">Valgus stress</span>${peSL(j.key,'valS',pe.valS||'Stable')}</div>`;
      peH+=`<div class="fl fl-indent" style="padding-left:32px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;"><span style="font-size:10px;color:var(--t4);min-width:65px;">Ant drawer</span>${peNP(j.key,'antD',pe.antD||'Neg')} <span style="font-size:10px;color:var(--t4);min-width:65px;">Post drawer</span>${peNP(j.key,'postD',pe.postD||'Neg')} <span style="font-size:10px;color:var(--t4);min-width:45px;">Lachman</span>${peNP(j.key,'lach',pe.lach||'Neg')}</div>`;

      // CREPITUS
      peH+=`<div class="fl fl-indent"><span class="fl-label">Crepitus: </span>${peT(j.key,'crepitus',['None','Mild','Moderate','Severe'],pe.crepitus||'None')}</div>`;

      // STRENGTH
      peH+=`<div class="fl fl-indent"><span class="fl-label">Strength: </span>${peSt(j.key,'qStr',pe.qStr||'5/5','Quads')} ${peSt(j.key,'hStr',pe.hStr||'5/5','Hams')}</div>`;

      // NV
      peH+=`<div class="fl fl-indent"><span class="fl-label">Neurovascular: </span>${peNV(j.key,'nv',pe.nv||'Normal')}<span style="font-size:10px;color:var(--t4);margin-left:6px;">DP pulse 2+, sensation intact distally</span></div>`;

      // GAIT
      peH+=`<div class="fl fl-indent"><span class="fl-label">Gait: </span>${peT(j.key,'gait',['Normal','Antalgic','Non-WB','Assistive device'],pe.gait||'Antalgic')}</div>`;
    }
    else {
      // HIP EXAM
      const e=jd.exam;
      if(e?.wound){
        // Post-op hip — keep the free-text for post-op visits
        peH+=`<textarea class="ed" rows="4" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';">Wound: ${e.wound}\nROM: ${e.rom}\nGait: ${e.gait}\nStrength: ${e.str}\nNV: ${e.nv}\nDVT: ${e.dvt}</textarea>`;
      } else {
      // INSPECTION
      peH+=`<div class="fl fl-indent"><span class="fl-label">Inspection: </span>Skin intact, no erythema, no ecchymosis.</div>`;
      peH+=`<div class="fl fl-indent"><span class="fl-label">Previous Incision: </span>${peT(j.key,'scar',['None','Anterior','Posterior','Lateral'],pe.scar||'None')}</div>`;

  // ═══ SURGICAL PROCEDURE DESCRIPTOR — used by all downstream sections ═══
  const surgJoints=p.joints.filter(j=>S.plans[j.key]==='replacement'||S.plans[j.key]==='revision');
  const surgProcs=surgJoints.map(j=>{const isK=j.type==='knee';const rev=S.plans[j.key]==='revision';return{key:j.key,side:j.side,type:j.type,isK,label:`${j.side} Total ${isK?'Knee':'Hip'} ${rev?'Revision ':''}Arthroplasty`,short:`${j.side} ${isK?(rev?'TKA Rev':'TKA'):(rev?'THA Rev':'THA')}`,cpt:isK?(rev?CPT.rev_tka:CPT.tka):(rev?CPT.rev_tha:CPT.tha)};});
  const procStr=surgProcs.map(s=>s.label).join(' + ');
  const procShort=surgProcs.map(s=>s.short).join(' + ');
  const hasSurgPlan=surgProcs.length>0;

  // ═══ PATIENT SURGERY INSTRUCTIONS (PP1254) ═══
  if(hasSurgPlan){
    const isKnee=surgJoints.some(j=>j.type==='knee');
    const isHip=surgJoints.some(j=>j.type==='hip');
    const dvt0=S.dvtPlan[surgJoints[0]?.key]||'ASA 81mg BID × 6wk';const hasMRSA=p.flags?.includes('mrsa');
    let instrH=`<div class="fl" style="font-weight:700;font-size:12px;margin-bottom:4px;">Pre-Op Instructions — <span class="fl-blue">${esc(procStr)}</span></div>`;
    instrH+=`<div class="fl fl-indent">1. <b>Food:</b> Do NOT eat after midnight. Water or Gatorade up to 1 hour prior to arrival.</div>`;
    instrH+=`<div class="fl fl-indent">2. <b>Medications:</b> Refer to personalized Medication Record (attached).</div>`;
    instrH+=`<div class="fl fl-indent">3. <b>Morning of surgery:</b> Loose-fitting clothes, no makeup, no body lotion, no jewelry.</div>`;
    instrH+=`<div class="fl fl-indent">4. Glasses, contacts, dentures, prosthetic devices removed in pre-op room.</div>`;
    instrH+=`<div class="fl fl-indent">5. <b>Responsible adult</b> must drive you home and remain with you ≥12 hours. No Uber/public transit. → <span class="fl-blue">${esc(i.cg_name||'TBD')}</span></div>`;
    instrH+=`<div class="fl fl-indent">6. <b>Sage Wipes:</b> Shower night before surgery, wait 1 hour, then use Sage Wipes as instructed. Sleep in clean pajamas/bedsheets. DO NOT shower morning of surgery.</div>`;
    if(hasMRSA)instrH+=`<div class="fl fl-indent" style="color:var(--yellow);">7. <b>MRSA Protocol:</b> Hibiclens scrub × 5 nights. Mupirocin ointment to each nostril BID × 5 days prior.</div>`;

    instrH+=`<div class="spacer"></div><div class="fl" style="font-weight:700;font-size:12px;margin:4px 0;">Home Discharge Instructions</div>`;
    instrH+=`<div class="fl fl-indent">1. <b>PT:</b> Post-op PT arranged per surgeon.</div>`;
    instrH+=`<div class="fl fl-indent">2. <b>Equipment:</b> Patient responsible for rolling walker and cane.</div>`;
    instrH+=`<div class="fl fl-indent">3. <b>Incision:</b> Dissolvable sutures + waterproof bandage. Staples if revision.</div>`;
    instrH+=`<div class="fl fl-indent">4. <b>Showering:</b> OK day after surgery. Waterproof bandage stays on 7 days. No submersion × 4 weeks.</div>`;
    instrH+=`<div class="fl fl-indent">5. <b>Driving:</b> When walking without walker and off narcotic pain meds (typically 1-4 weeks).</div>`;

    if(isKnee)instrH+=`<div class="fl fl-indent">6. <b>Swelling (Knee):</b> Compress, elevate, ice several times daily. TED stockings during day × 2 weeks. Ice 30 min frequently.</div>`;
    if(isHip)instrH+=`<div class="fl fl-indent">6. <b>Swelling (Hip):</b> Ice pack over incision area as needed.</div>`;

    instrH+=`<div class="fl fl-indent">7. <b>Blood Thinner (required):</b> <span class="fl-blue">${esc(dvt0.includes('Eliquis')?'Eliquis 2.5mg twice/day':'Aspirin 81mg twice/day')}</span> begin morning after surgery × 6 weeks.</div>`;
    instrH+=`<div class="fl fl-indent">8. <b>Pain meds:</b> Ibuprofen 800mg TID + Tylenol 500mg TID (together, with food), Lyrica 75mg QHS, Decadron 6mg Q12h until done, Cefdinir 300mg BID × 7d. Oxycodone 5mg PRN severe pain only.</div>`;
    instrH+=`<div class="fl fl-indent" style="font-size:10px;color:var(--t4);margin-left:32px;">Rx sent to Northside Homecare Pharmacy. Narcotics CANNOT be called in or refilled after hours/weekends.</div>`;
    instrH+=`<div class="fl fl-indent">9. <b>Constipation:</b> OTC Colace or Miralax recommended.</div>`;
    instrH+=`<div class="fl fl-indent">10. No dental cleanings × 3 months. No colonoscopy × 6 months. Long car trips: stop Q2hr and walk 5 min.</div>`;
    instrH+=`<div class="fl fl-indent">11. <b>Emergency:</b> Call 911. Business hours: message on FORCE or nurse triage. After 4 PM / weekends: 770-292-6500.</div>`;

    instrH+=`<div class="spacer"></div><div class="fl" style="font-weight:700;font-size:12px;margin:4px 0;">Surgery Checklist — Patient Gets:</div>`;
    instrH+=`<div class="fl fl-indent" style="font-size:11px;">Rolling Walker • Cane • Gatorade/water • ${isHip?'Gauze Bandages + Tape':'ACE Bandage'} • Extra Strength Tylenol 500mg • Colace/Miralax</div>`;
    instrH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:4px 0;">We Provide:</div>`;
    instrH+=`<div class="fl fl-indent" style="font-size:11px;">Sage Wipes • ${isKnee?'TED Stockings + Ice Pack • ':''}Ibuprofen 800mg • Lyrica 75mg • Oxycodone 5mg • Protonix 40mg • Aspirin 81mg • Decadron 6mg • Cefdinir • Post-op Antibiotic</div>`;

    // Free text + dictation
    instrH+=`<div class="spacer"></div><div style="display:flex;align-items:center;gap:4px;margin:4px 0;"><span class="fl-label">Additional Instructions:</span>${micBtn('patNotes')}</div>`;
    instrH+=`<textarea class="ed" id="patNotes" rows="2" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';setPatNotes(this.value)" placeholder="Dictate or type additional patient-specific instructions...">${esc(S.patNotes||'')}</textarea>`;

    // Send button
    if(!S.instrSent){instrH+=`<div style="margin-top:6px;"><button onclick="sendInstr()" style="padding:6px 16px;border-radius:5px;border:none;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-weight:700;font-size:11px;cursor:pointer;">📱 Text Surgery Instructions to Patient</button><div style="font-size:9px;color:var(--t4);margin-top:2px;">Sends PP1254 Surgery Preop Packet + personalized med list to patient's phone</div></div>`;}
    else{instrH+=`<div style="margin-top:6px;padding:6px 10px;border-radius:5px;background:#0d2818;border:1px solid #065f46;font-size:11px;font-weight:600;color:var(--greenL);">✓ Instructions sent to patient</div>`;}
    h+=sec('PATIENT SURGERY INSTRUCTIONS',instrH,'brd','',true,false);
  }

  h+=sec('PERIOPERATIVE MEDICATION PLAN',mr.html,'brd');

  let clH='';
  if(hasSurgPlan)clH+=`<div class="fl" style="font-weight:600;font-size:11px;color:var(--blueL);margin-bottom:4px;">Clearances for: ${esc(procStr)}</div>`;
  clH+=`<div class="fl"><span class="fl-label">Specialty Clearances:</span></div><div class="clr-grid">`;
  CLR_SPECIALTIES.forEach(c=>{const on=S.clrs[c];clH+=`<button class="clr-btn ${on?'active':''}" onclick="togClr('${c}')">${on?'✓ ':''}${c}</button>`;});
  clH+=`</div>`;
  // Show doctor info and send link for active clearances
  CLR_SPECIALTIES.forEach(c=>{if(!S.clrs[c])return;const doc=S.clrDocs[c]||{name:'',phone:'',fax:''};const sent=S.clrSent[c];
    clH+=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:4px 0 4px 8px;">`;
    clH+=`<span style="font-size:10px;font-weight:700;color:var(--blueL);min-width:65px;">${c}:</span>`;
    clH+=`<input class="ed" placeholder="Doctor name" value="${esc(doc.name)}" style="width:140px;font-size:11px;display:inline;border-bottom:1px solid var(--border2);" onchange="setClrDoc('${c}','name',this.value)">`;
    clH+=`<input class="ed" placeholder="Phone" value="${esc(doc.phone)}" style="width:110px;font-size:11px;display:inline;border-bottom:1px solid var(--border2);" onchange="setClrDoc('${c}','phone',this.value)">`;
    if(sent){clH+=`<span class="clr-sent">✓ Sent ${esc(sent)}</span>`;}
    else{clH+=`<button class="clr-send" onclick="sendClrLetter('${c}')">📤 Send Link</button>`;}
    clH+=`</div>`;});
  clH+=`<button class="add-btn" onclick="prompt('Add clearance:')">+ Add Clearance</button>`;
  h+=sec('CLEARANCES',clH,'brd');

  let labH=`<div class="fl"><span class="fl-label">Pre-Op Labs:</span></div>`;
  LABS_DEFAULT.forEach(l=>{labH+=itemRow(`<span class="fl-indent">${l}</span>`,`alert('Removed')`);});
  if(i.pmh?.includes('diabetes'))labH+=itemRow(`<span class="fl-indent">HbA1c (diabetic)</span>`,`alert('Removed')`);
  labH+=`<button class="add-btn" onclick="prompt('Add lab:')">+ Add Lab</button>`;
  labH+=`<div class="spacer"></div><div class="fl"><span class="fl-label">Additional:</span></div>`;
  labH+=itemRow(`<span class="fl-indent">MRSA nasal screen</span>`,`alert('Removed')`);
  labH+=itemRow(`<span class="fl-indent">CHG wash × 3 days</span>`,`alert('Removed')`);
  labH+=itemRow(`<span class="fl-indent">Pre-op education class</span>`,`alert('Removed')`);
  h+=sec('LABS & PRE-OP ORDERS',labH,'brd');

  // CONSENTS (only show if plan is surgical)
  if(hasSurgPlan){
    const cn=S.consents||{};const allSigned=cn.surg&&cn.anes&&cn.rights&&cn.abn;
    let conH=`<div class="fl" style="font-weight:600;font-size:12px;color:var(--blueL);margin-bottom:4px;">Procedure: ${esc(procStr)}</div>`;
    conH+=`<div class="fl"><span class="fl-label">Required Consents:</span></div><div style="margin:6px 0;">`;
    const conItems=[{k:'surg',l:'Surgical Consent',d:`Informed Consent — ${esc(procStr)}. Risks, benefits, alternatives discussed.`},{k:'anes',l:'Anesthesia Consent',d:'ACJS Anesthesia Consent — spinal/nerve block/general risks'},{k:'rights',l:'Patient Rights & Responsibilities',d:'ACJS Patient Rights & Responsibilities acknowledgment'},{k:'abn',l:'ABN — Surgical Assistant',d:'Advance Beneficiary Notice — Southern Surgical Assistants, LLC'}];
    conItems.forEach(c=>{const signed=cn[c.k];conH+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;background:var(--card2);border:1px solid ${signed?'#065f46':'var(--border)'};margin-bottom:3px;"><span style="font-size:14px;">${signed?'✅':'⬜'}</span><div style="flex:1;"><div style="font-size:11px;font-weight:600;color:${signed?'var(--greenL)':'var(--t2)'};">${c.l}</div><div style="font-size:9px;color:var(--t4);">${c.d}</div></div><button class="tb" onclick="setConsent('${c.k}',${!signed})" style="font-size:9px;padding:2px 6px;">${signed?'Undo':'Manual ✓'}</button></div>`;});
    conH+=`</div>`;
    if(!allSigned){conH+=`<button onclick="sendConsents()" style="padding:6px 16px;border-radius:5px;border:none;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-weight:700;font-size:11px;cursor:pointer;margin:4px 0;">📱 Text Consents to Patient for DocuSign</button><div style="font-size:9px;color:var(--t4);margin-top:3px;">Sends all 4 consent forms to patient's phone for electronic signature</div>`;}
    else{conH+=`<div style="padding:6px 10px;border-radius:5px;background:#0d2818;border:1px solid #065f46;font-size:11px;font-weight:600;color:var(--greenL);">✓ All consents signed electronically</div>`;}
    h+=sec('CONSENTS',conH,'brd');
  }

  // ═══ PHYSICIANS PRE-OPERATIVE ORDERS (from TJS form PP1265) ═══
  if(hasSurgPlan){
  const po=S.preOrd||{};const ps=S.postOrd||{};const oSig=S.ordSigned;
  const oc=(set,k,label,sub)=>{const on=S[set][k];return`<div style="display:flex;align-items:flex-start;gap:6px;padding:3px 0;${oSig?'opacity:.85;pointer-events:none;':''}"><button style="width:18px;height:18px;border-radius:3px;border:1px solid ${on?'var(--green)':'var(--border2)'};background:${on?'var(--greenD)':'var(--card2)'};color:${on?'var(--greenL)':'var(--t4)'};font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;" onclick="togOrd('${set}','${k}')">${on?'✓':''}</button><div><span style="font-size:11px;color:${on?'var(--t2)':'var(--t4)'};">${label}</span>${sub?`<div style="font-size:10px;color:var(--t4);margin-top:1px;">${sub}</div>`:''}</div></div>`;};
  const oed=(set,k,val,w)=>`<input class="ed" value="${esc(val)}" style="width:${w||'120px'};font-size:10px;display:inline;border-bottom:1px solid var(--border2);color:var(--blueL);${oSig?'pointer-events:none;':''}" onchange="setOrdVal('${set}','${k}',this.value)">`;

  // Warnings
  let ordW='';
  if(mr.g1)ordW+=`<div class="ab w"><b>⚠ GLP-1 RA</b> — Verify held + clear liquid diet 24hr prior</div>`;
  if(mr.sg)ordW+=`<div class="ab d"><b>🛑 SGLT2</b> — Verify discontinued ≥3-4 days prior</div>`;
  if(cardiac)ordW+=`<div class="ab w"><b>⚠ Cardiac</b> — Verify cardiac clearance on file</div>`;

  // PRE-OP ORDERS
  let preH=ordW;
  preH+=`<div class="fl" style="font-weight:700;font-size:12px;margin-bottom:4px;">1. Antibiotic Prophylaxis</div>`;
  preH+=oc('preOrd','mrsa','H/O MRSA — Give both Ancef and Vancomycin');
  if(!po.pcnAllergy){
    preH+=oc('preOrd','ancef',`Cefazolin (Ancef) ${oed('preOrd','ancefDose',po.ancefDose||'2g','50px')} IV x1 — begin within 60 min prior to incision`);
  } else {
    preH+=`<div class="ab w" style="margin:3px 0;"><b>⚠ PCN Allergy</b> — Cephalosporin with caution or use Vancomycin</div>`;
  }
  preH+=oc('preOrd','vanc',`Vancomycin ${oed('preOrd','vancDose',po.vancDose||'1g','50px')} IV over 90 min x1 — within 120 min prior`,`Weight-based: ≤85kg → 1g | >85kg → 1.5g. For severe cephalosporin allergy (anaphylaxis, pharyngeal swelling, hives)`);

  preH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">2. VTE Prophylaxis</div>`;
  preH+=oc('preOrd','ted','TED Stockings');
  preH+=oc('preOrd','scd','SCDs (Sequential Compression Devices)');

  preH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">3. Surgical Skin Preparation</div>`;
  preH+=oc('preOrd','clipper','Standard hip or knee hair removal by clippers');
  preH+=oc('preOrd','chg','Full body cleanse with SAGE 2% CHG cloth as directed');
  preH+=oc('preOrd','intranasal','Intranasal Providone / Iodine (unless allergic)');

  preH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">4. Anesthesia</div>`;
  preH+=oc('preOrd','nerveBlock','Consult Anesthesia for Regional Nerve Block');

  preH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">5. Tranexamic Acid</div>`;
  preH+=oc('preOrd','txa',`TXA ${oed('preOrd','txaDose',po.txaDose||'1g IV x1','90px')}`);

  preH+=`<div style="margin-top:8px;display:flex;align-items:center;gap:4px;"><span class="fl-label">Additional Orders:</span>${oSig?'':micBtn('preOrdAddl')}</div><input class="ed" id="preOrdAddl" value="${esc(po.addl||'')}" style="width:100%;margin-top:2px;border-bottom:1px solid var(--border2);${oSig?'pointer-events:none;':''}" onchange="setOrdVal('preOrd','addl',this.value)" placeholder="Type or dictate additional orders...">`;
  h+=sec(`PRE-OP ORDERS — ${procShort}`,preH,'brd');

  // POST-OP ORDERS
  let postH='';
  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin-bottom:4px;">1. Vital Signs</div>`;
  postH+=oc('postOrd','vs','Q5min ×3 → Q15min ×2 → Q30min ×2 → Q1hr ×2 → Q4hr until discharge');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">2. Dressing</div>`;
  postH+=oc('postOrd','dress','AquaCel in place at discharge. DO NOT CHANGE unless >75% saturated');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">3. Nutrition</div>`;
  postH+=oc('postOrd','nutAdv','Advance as tolerated');
  postH+=oc('postOrd','glucMon','Blood Glucose Monitoring: Per Protocol','For diabetic patients');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">4. IV Fluids</div>`;
  postH+=oc('postOrd','ivBolus','Bolus Normal Saline 500cc over 30 min');
  postH+=oc('postOrd','ivMaint','Then Lactated Ringers 150 cc/hr. After 4hr adjust to 75 cc/hr');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">5. Bladder</div>`;
  postH+=oc('postOrd','noFoley','No Foley');
  postH+=oc('postOrd','bladScan','Bladder Scan if unable to void in 2 hours — notify physician','Rapaflo 8mg PO qd | Rapaflo 4mg PO qd if CrCl 30-50 | Urecholine 10mg q1h until response');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">6. Ice Therapy</div>`;
  postH+=oc('postOrd','ice','Ice Therapy PRN');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">7. Physical Therapy</div>`;
  postH+=oc('postOrd','ptEval','Total Knee/Hip PT Evaluation & Treatment — Exercises per PT');
  postH+=oc('postOrd','wbat','WBAT');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">8. Pain Management</div>`;
  postH+=oc('postOrd','tylenol',`Acetaminophen ${oed('postOrd','tylenolDose',ps.tylenolDose||'1000mg PO x1','120px')}`);
  postH+=oc('postOrd','noOtherApap','Patient is to receive NO other acetaminophen-containing products');
  postH+=oc('postOrd','oxy',`Oxycodone ${oed('postOrd','oxyDose',ps.oxyDose||'5-10mg PO Q4H PRN','140px')}`,`Or Tramadol 50-150mg PO for patients allergic to oxycodone`);
  postH+=oc('postOrd','robaxin',`Robaxin ${oed('postOrd','robaxinDose',ps.robaxinDose||'750mg PO x1','100px')} for mild pain`);
  postH+=oc('postOrd','dilaudid',`Dilaudid ${oed('postOrd','dilaudidDose',ps.dilaudidDose||'0.2mg IV x1','100px')} for severe pain`);
  postH+=oc('postOrd','toradol',`Toradol ${oed('postOrd','toradolDose',ps.toradolDose||'30mg IV','80px')} x1 dose`,`If Cr<1.2 give 30mg IV | If Cr>1.2 give 15mg IV`);

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">9. Nausea / Discharge</div>`;
  postH+=oc('postOrd','zofran',`Zofran ${oed('postOrd','zofranDose',ps.zofranDose||'4mg IV x1','80px')}`);
  postH+=oc('postOrd','dcWhenReady','May discharge when discharge criteria met');
  postH+=oc('postOrd','vteEduc','Educate VTE prophylaxis as ordered');
  postH+=oc('postOrd','bowelReg','Educate Bowel Regimen as ordered');

  postH+=`<div class="fl" style="font-weight:700;font-size:12px;margin:8px 0 4px;">10. Discharge Medications (Home)</div>`;
  postH+=oc('postOrd','dcTylenol','Tylenol 1000mg PO Q8H PRN mild-moderate pain');
  postH+=oc('postOrd','dcIbu','Ibuprofen 800mg PO Q8H PRN mild-moderate pain');
  postH+=oc('postOrd','dcLyrica',`Lyrica ${oed('postOrd','dcLyricaDose',ps.dcLyricaDose||'75mg PO @ bedtime','140px')} or Gabapentin 300mg PO`);
  postH+=oc('postOrd','dcOxy','Oxycodone 5-10mg PRN');
  postH+=oc('postOrd','dcProtonix','Protonix 40mg daily');
  postH+=oc('postOrd','dcAsa','Aspirin 81mg PO twice daily × 6 weeks');
  postH+=oc('postOrd','dcDecadron','Decadron 6mg PO start night of surgery, then Q12h');
  postH+=oc('postOrd','dcCefdinir','Cefdinir 300mg BID × 7 days start night of surgery');

  postH+=`<div style="margin-top:8px;display:flex;align-items:center;gap:4px;"><span class="fl-label">Additional Orders:</span>${oSig?'':micBtn('postOrdAddl')}</div><input class="ed" id="postOrdAddl" value="${esc(ps.addl||'')}" style="width:100%;margin-top:2px;border-bottom:1px solid var(--border2);${oSig?'pointer-events:none;':''}" onchange="setOrdVal('postOrd','addl',this.value)" placeholder="Type or dictate additional orders...">`;

  h+=sec(`POST-OP ORDERS — ${procShort}`,postH,'brd');

  // Sign block for orders
  if(!oSig){
    h+=`<div style="text-align:center;margin:8px 0;"><button onclick="signOrders()" style="padding:8px 32px;border-radius:6px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,246,.3);">✍ Sign Orders — ${procShort}</button><div style="font-size:9px;color:var(--t4);margin-top:4px;">Physician signature — ${esc(p.surgeon)}</div></div>`;
  } else {
    h+=`<div style="margin:8px 0;padding:10px 14px;border-radius:8px;background:#0d2818;border:1px solid #065f46;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:12px;color:#6ee7b7;">✓ Orders Signed — ${procShort}</div><div style="font-size:10px;color:#34d399;margin-top:2px;">Signed by ${esc(p.surgeon)} — ${dosStr}</div></div><button onclick="unlockOrders()" style="padding:4px 10px;border-radius:5px;border:1px solid #065f46;background:transparent;color:#34d399;font-size:10px;font-weight:600;cursor:pointer;">Unlock</button></div>`;
  }
  }
  // Evidence trail (ambient AI audit)
  if(EVIDENCE.length){
    const evH=renderEvidence();
    h+=sec('AMBIENT AI — EVIDENCE TRAIL',`<div class="fl" style="font-size:10px;color:var(--t4);margin-bottom:4px;">Transcript-linked evidence for each AI detection. Hover for full quote.</div>${evH}<div style="font-size:9px;color:var(--t4);margin-top:4px;">${EVIDENCE.length} detection(s) logged this session</div>`,'','',true,false);
  }

  // Spacer for ambient bar
  h+='<div style="height:70px;"></div>';
  return h;}

// ═══════ AMBIENT AI ENGINE ═══════
// ═════════════════════════════════════════════════════════════

const AMB = {
  active: false,
  mode: 'auto',        // 'auto' = instant apply, 'suggest' = show but don't apply
  recognition: null,
  buffer: '',           // rolling transcript buffer
  processTimer: null,
  detections: [],       // [{type,label,value,ts}] — last 8 shown
  lastProcessed: '',
};

// ═══ KEYWORD CLASSIFIER (LOCAL — NO API NEEDED) ═══
// Because the decision space is so small, we can do this entirely
// with pattern matching. No network call required.

const SEVERITY_PATTERNS = {
  severe: [
    /bone\s*on\s*bone/i, /no\s*(joint\s*)?space/i, /severe/i, /grade\s*(4|four|IV)/i,
    /completely?\s*(gone|worn|eroded)/i, /end\s*stage/i, /obliterat/i, /no\s*cartilage/i,
    /significant\s*(narrowing|loss|arthritis)/i, /advanced/i, /terrible/i, /worst/i
  ],
  moderate: [
    /moderate/i, /grade\s*(3|three|III)/i, /significant\s*narrowing/i,
    /fair\s*amount/i, /getting\s*worse/i, /progressive/i, /considerable/i
  ],
  mild: [
    /mild/i, /grade\s*(1|2|one|two|I{1,2})\b/i, /early/i, /minimal/i,
    /slight/i, /beginning/i, /some\s*(narrowing|changes)/i, /minor/i
  ],
  none: [
    /normal/i, /no\s*(changes|arthritis|narrowing)/i, /looks\s*good/i,
    /clean/i, /healthy/i, /no\s*evidence/i
  ]
};

const PLAN_PATTERNS = {
  replacement: [
    /total\s*(knee|hip)/i, /replacement/i, /\b(TKA|THA)\b/i, /candidate\s*for\s*surgery/i,
    /schedule\s*(for\s*)?(surgery|the\s*case)/i, /let'?s\s*(go\s*ahead|do\s*(the|a)\s*(surgery|replacement))/i,
    /ready\s*for\s*surgery/i, /operative\s*candidate/i, /surgical\s*candidate/i,
    /book\s*(the|a)\s*(case|surgery)/i, /proceed\s*with/i, /you('re|\s+are)\s*a\s*candidate/i
  ],
  revision: [
    /revision/i, /re-?do/i, /failed/i, /loose(ning)?/i
  ],
  conservative: [
    /conservative/i, /not\s*(ready|a\s*candidate|there\s*yet)/i, /injection/i,
    /cortisone/i, /try\s*(PT|physical\s*therapy|therapy)/i, /hold\s*off/i,
    /wait/i, /non-?op/i, /non-?surgical/i, /gel\s*(shot|injection)/i,
    /let'?s\s*try/i, /give\s*it\s*more\s*time/i, /come\s*back/i
  ]
};

const PT_PATTERNS = {
  Virtual: [/virtual\s*(PT|therapy|physical)/i, /tele-?PT/i, /online\s*PT/i, /remote\s*(PT|therapy)/i],
  Home: [/home\s*(PT|therapy|physical|health)/i, /in\s*home/i, /at\s*home/i],
  Outpatient: [/outpatient\s*(PT|therapy|physical)/i, /clinic\s*(PT|therapy)/i, /go\s*to\s*(PT|therapy)/i]
};

const FU_PATTERNS = [
  {re:/(?:see\s*(?:you|me|us)\s*(?:back\s*)?in|follow\s*up\s*(?:in)?|come\s*back\s*(?:in)?|return\s*(?:in)?)\s*(\d+)\s*week/i, unit:'w'},
  {re:/(?:see\s*(?:you|me|us)\s*(?:back\s*)?in|follow\s*up\s*(?:in)?|come\s*back\s*(?:in)?|return\s*(?:in)?)\s*(\d+)\s*month/i, unit:'m'},
  {re:/(\d+)\s*week\s*follow/i, unit:'w'},
  {re:/(\d+)\s*month\s*follow/i, unit:'m'},
  {re:/(\d+)\s*weeks?\b/i, unit:'w'},   // fallback: just a number + weeks
];

const SIDE_PATTERNS = {
  Right: [/right\s*(knee|hip|side|leg)/i, /the\s*right/i],
  Left: [/left\s*(knee|hip|side|leg)/i, /the\s*left/i]
};

const MRI_PATTERNS = {
  'Normal': [/MRI\s*(is|was|shows?|look)?\s*normal/i, /MRI\s*clean/i, /normal\s*MRI/i],
  'AVN': [/AVN/i, /avascular\s*necrosis/i, /osteonecrosis/i],
  'Labrum Tear': [/labr(um|al)\s*tear/i, /torn\s*labrum/i],
  'Labrum Tear + Cartilage Wear': [/labr(um|al)\s*tear.*cartilage/i, /labr(um|al).*cartilage\s*wear/i, /cartilage\s*wear.*labr(um|al)/i],
  'Arthritis': [/MRI\s*(show|confirm|reveal).*arthritis/i, /arthritis\s*on\s*(the\s*)?MRI/i],
  'ACL Tear': [/ACL\s*tear/i, /torn\s*ACL/i, /anterior\s*cruciate/i],
  'Meniscus Tear': [/meniscus\s*tear/i, /torn\s*meniscus/i, /meniscal\s*tear/i],
  'Meniscus + Cartilage Wear': [/meniscus.*cartilage/i, /meniscal.*cartilage/i, /cartilage.*meniscus/i]
};

function classifyTranscript(text) {
  const results = [];
  
  // MRI findings
  for (const [finding, patterns] of Object.entries(MRI_PATTERNS)) {
    for (const p of patterns) {
      if (p.test(text)) {
        results.push({ type: 'mri', value: finding, match: text.match(p)[0] });
        break;
      }
    }
    if (results.some(r => r.type === 'mri')) break;
  }
  
  // Severity
  for (const [sev, patterns] of Object.entries(SEVERITY_PATTERNS)) {
    for (const p of patterns) {
      if (p.test(text)) {
        results.push({ type: 'severity', value: sev, match: text.match(p)[0] });
        break;
      }
    }
    if (results.some(r => r.type === 'severity')) break;
  }
  
  // Plan
  for (const [plan, patterns] of Object.entries(PLAN_PATTERNS)) {
    for (const p of patterns) {
      if (p.test(text)) {
        results.push({ type: 'plan', value: plan, match: text.match(p)[0] });
        break;
      }
    }
    if (results.some(r => r.type === 'plan')) break;
  }
  
  // PT Type
  for (const [pt, patterns] of Object.entries(PT_PATTERNS)) {
    for (const p of patterns) {
      if (p.test(text)) {
        results.push({ type: 'pt', value: pt, match: text.match(p)[0] });
        break;
      }
    }
    if (results.some(r => r.type === 'pt')) break;
  }
  
  // Follow-up
  for (const fp of FU_PATTERNS) {
    const m = text.match(fp.re);
    if (m) {
      let weeks = parseInt(m[1]);
      if (fp.unit === 'm') weeks = weeks * 4;
      results.push({ type: 'fu', value: String(weeks), match: m[0] });
      break;
    }
  }
  
  // Side detection (contextual — only use if single detection needed)
  for (const [side, patterns] of Object.entries(SIDE_PATTERNS)) {
    for (const p of patterns) {
      if (p.test(text)) {
        results.push({ type: 'side', value: side, match: text.match(p)[0] });
        break;
      }
    }
    if (results.some(r => r.type === 'side')) break;
  }
  
  return results;
}

// ═══ APPLY DETECTIONS TO STATE ═══
function applyDetection(det) {
  const p = S.p;
  if (!p || !p.joints?.length) return;
  
  // Determine target joint key
  // If patient has 1 joint, always target that
  // If multiple, use side detection or default to first
  let targetJK = p.joints[0].key;
  if (p.joints.length > 1 && det.side) {
    const match = p.joints.find(j => j.side === det.side);
    if (match) targetJK = match.key;
  }
  
  const ts = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  
  switch (det.type) {
    case 'mri': {
      addDetection('mri', `MRI: ${det.value}`, det.match, ts);
      if (AMB.mode === 'auto') {
        setMRI(targetJK, det.value);
      }
      break;
    }
    case 'severity': {
      const labels = {severe:'Severe OA',moderate:'Moderate OA',mild:'Mild OA',none:'Normal'};
      addDetection('sev', labels[det.value] || det.value, det.match, ts);
      if (AMB.mode === 'auto') {
        setSev(targetJK, det.value);
        flashElement(det.value, targetJK);
      }
      break;
    }
    case 'plan': {
      const labels = {replacement:'Replacement',revision:'Revision',conservative:'Conservative'};
      addDetection('plan', labels[det.value] || det.value, det.match, ts);
      if (AMB.mode === 'auto') {
        setPlan(targetJK, det.value);
      }
      break;
    }
    case 'pt': {
      addDetection('pt', `PT: ${det.value}`, det.match, ts);
      if (AMB.mode === 'auto') {
        setPT(targetJK, det.value);
      }
      break;
    }
    case 'fu': {
      addDetection('fu', `F/U: ${det.value}wk`, det.match, ts);
      if (AMB.mode === 'auto') {
        setFU(targetJK, det.value);
      }
      break;
    }
  }
}

function addDetection(type, label, heard, ts) {
  AMB.detections.unshift({ type, label, heard, ts });
  if (AMB.detections.length > 8) AMB.detections.pop();
  renderDetections();
  addEvidence(heard, label);
}

function renderDetections() {

      ${esc(d.label)}

function flashElement(sevValue, jk) {
  // After render, flash the active severity button
  setTimeout(() => {
    const btn = document.querySelector(`.sev-${sevValue}.active`);

      btn.classList.add('ai-flash');

    }

}

// ═══ PROCESS BUFFER ═══
function processBuffer() {
  const text = AMB.buffer.trim();
  if (!text || text === AMB.lastProcessed) return;
  
  // Only process new content
  const newText = AMB.lastProcessed ? text.slice(AMB.lastProcessed.length) : text;
  if (newText.trim().length < 3) return;
  
  AMB.lastProcessed = text;
  
  // Show what we're hearing
  const transcriptEl = document.getElementById('amb-transcript');
  if (transcriptEl) {
    const words = newText.trim().split(/\s+/).slice(-6).join(' ');
    transcriptEl.textContent = `"...${words}"`;
    // Fade out after 3s
    transcriptEl.style.opacity = '1';
    setTimeout(() => { if (transcriptEl) transcriptEl.style.opacity = '.4'; }, 3000);
  }
  
  // Classify
  const detections = classifyTranscript(newText);
  detections.forEach(d => applyDetection(d));
}

// ═══ SPEECH RECOGNITION ═══
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    console.warn('Speech Recognition not supported');
    return;
  }
  
  AMB.recognition = new SR();
  AMB.recognition.continuous = true;
  AMB.recognition.interimResults = true;
  AMB.recognition.lang = 'en-US';
  
  AMB.recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim = t;
    }
    
    if (final) {
      AMB.buffer += final;
      // Process on each final result
      processBuffer();
    }
  };
  
  AMB.recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.warn('Speech error:', e.error);
    // Auto-restart on network errors
    if (AMB.active && e.error !== 'not-allowed') {
      setTimeout(() => { if (AMB.active) startListening(); }, 1000);
    }
  };
  
  AMB.recognition.onend = () => {
    // Auto-restart if still active (Chrome stops after ~60s)
    if (AMB.active) {
      setTimeout(() => { if (AMB.active) startListening(); }, 200);
    }
  };
}

function startListening() {
  try { AMB.recognition.start(); } catch(e) { /* already started */ }
}

function stopListening() {
  try { AMB.recognition.stop(); } catch(e) {}
}

function toggleAmbient() {
  AMB.active = !AMB.active;
  
  const dot = document.getElementById('amb-dot');
  const label = document.getElementById('amb-label');
  
  if (AMB.active) {
    if (!AMB.recognition) initSpeech();
    if (AMB.recognition) {
      startListening();
      dot.classList.add('live');
      label.classList.add('live');
      label.textContent = 'LISTENING';
    } else {
      // No speech API — still allow sim buttons
      AMB.active = true;
      dot.classList.add('live');
      label.classList.add('live');
      label.textContent = 'ACTIVE (SIM)';
    }
  } else {
    if (AMB.recognition) stopListening();
    dot.classList.remove('live');
    label.classList.remove('live');
    label.textContent = 'AMBIENT';
    // Clear buffer for next session
    AMB.buffer = '';
    AMB.lastProcessed = '';
  }
}

function setAmbMode(mode) {
  AMB.mode = mode;
  document.getElementById('amb-auto').classList.toggle('active', mode === 'auto');
  document.getElementById('amb-suggest').classList.toggle('active', mode === 'suggest');
}

  moderate_hip: "There's moderate degenerative change in the hip. Some narrowing but not end stage yet.",
  plan_tha: "Your hip is ready for a total hip replacement. Let's proceed with scheduling.",
  fu_12: "Come back in 12 weeks and we'll see how the injection is doing.",
  pt_outpatient: "I want you going to outpatient physical therapy three times a week.",
  pt_virtual: "We'll set you up with virtual PT sessions.",
  mri_labrum: "The MRI shows a labrum tear with some cartilage wear as well.",
  mri_normal: "The MRI is normal, no structural damage.",
  mri_avn: "MRI confirms avascular necrosis of the femoral head.",
};

function simSurgeon(phrase) {
  const text = SIM_PHRASES[phrase];
  if (!text) return;
  
  // Activate if not already
  if (!AMB.active) {
    AMB.active = true;
    const dot = document.getElementById('amb-dot');
    const label = document.getElementById('amb-label');
    dot.classList.add('live');
    label.classList.add('live');
    label.textContent = 'ACTIVE (SIM)';
  }
  
  // Feed text into buffer as if it was spoken
  AMB.buffer += text + ' ';
  processBuffer();
}

// ═══ FIELD-LEVEL VOICE DICTATION ═══
let DICT = { active: false, targetId: null, recognition: null };

function startDictation(fieldId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition not supported in this browser'); return; }

  // If already recording this field, stop
  if (DICT.active && DICT.targetId === fieldId) { stopDictation(); return; }
  // If recording another field, stop that first
  if (DICT.active) stopDictation();

  DICT.targetId = fieldId;
  DICT.recognition = new SR();
  DICT.recognition.continuous = true;
  DICT.recognition.interimResults = true;
  DICT.recognition.lang = 'en-US';

  const field = document.getElementById(fieldId);
  if (!field) return;
  const startVal = field.value || field.textContent || '';

  DICT.recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    const newVal = startVal + (startVal ? ' ' : '') + final.trim() + (interim ? ' ' + interim : '');
    if (field.tagName === 'TEXTAREA' || field.tagName === 'INPUT') {
      field.value = newVal;
      field.style.height = 'auto';
      field.style.height = field.scrollHeight + 'px';
    }
  };

  DICT.recognition.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') stopDictation(); };
  DICT.recognition.onend = () => { if (DICT.active) stopDictation(); };

  try {
    DICT.recognition.start();
    DICT.active = true;
    const btn = document.getElementById('mic_' + fieldId);
    if (btn) btn.classList.add('recording');
  } catch(e) {}
}

function stopDictation() {
  if (DICT.recognition) try { DICT.recognition.stop(); } catch(e) {}
  if (DICT.targetId) {
    const btn = document.getElementById('mic_' + DICT.targetId);
    if (btn) btn.classList.remove('recording');
  }
  DICT.active = false;
  DICT.targetId = null;
  DICT.recognition = null;
}


// Initialize speech on load (won't start listening until toggled)
if (window.SpeechRecognition || window.webkitSpeechRecognition) {
  initSpeech();
}

</script>
