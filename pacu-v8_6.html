<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);color:var(--tx);font-family:var(--s);height:100dvh;overflow:hidden;position:fixed;width:100%;display:flex;flex-direction:column}

.ctab{padding:6px 10px;border-radius:6px;font-size:10px;font-family:var(--m);font-weight:600;cursor:pointer;border:1px solid #1a1a1a;background:#0d0d0d;color:#555;white-space:nowrap;min-height:34px;display:flex;align-items:center;gap:4px}

.pn{font-size:13px;font-weight:700;white-space:nowrap}

.content{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 90px;display:none}
.pane.act{display:block}
.bnav{display:flex;border-top:1px solid #1a1a1a;background:#0a0a0a;flex-shrink:0;padding-bottom:var(--safe-b);z-index:10}
.bn{flex:1;padding:7px 0 5px;text-align:center;cursor:pointer;position:relative}
.bn.act{background:rgba(255,255,255,.03)}

.bn.act .bn-l{color:var(--gnS)}

.cnt{font-size:9px;padding:1px 5px;border-radius:3px;background:#1a1a1a;color:#555;font-weight:600}

.vi-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px;margin-bottom:4px}
.vi{text-align:center}
.vi-l{font-size:7px;color:#555;font-family:var(--m);text-transform:uppercase;margin-bottom:1px}

.pb.sel{color:#fff}.pb.g{border-color:var(--gnS);background:var(--gn)}.pb.y{border-color:var(--ywS);background:var(--yw)}.pb.r{border-color:var(--rdS);background:var(--rd)}
/* Selector row (generic) */
.sel-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}

/* Log button */
.logb-sm{width:100%;padding:9px 12px;border-radius:6px;font-family:var(--m);font-size:11px;font-weight:700;border:1px solid #2a2a2a;background:#1a1a1a;color:#444;text-align:center;min-height:40px;cursor:default;margin-top:2px;margin-bottom:4px}
.logb-sm.ok{background:var(--gn);color:#fff;border-color:var(--gnS);cursor:pointer}

.logb{width:100%;padding:12px;border-radius:8px;font-family:var(--m);font-size:13px;font-weight:700;border:1px solid #2a2a2a;background:#1a1a1a;color:#444;text-align:center;min-height:48px;cursor:default;margin-top:4px}
.logb.ok{background:var(--gn);color:#fff;border-color:var(--gnS);cursor:pointer}
.logb.ok:active{transform:scale(.97)}

/* Log entry row */
.axe-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}

/* Edit banner */
.edit-banner{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;margin-bottom:4px;background:var(--blB);border:1px solid rgba(59,107,143,.15);font-family:var(--m);font-size:11px;color:var(--blS)}
.edit-time{display:flex;align-items:center;gap:6px}

.mon-row{display:flex;gap:3px;margin-bottom:4px}
.mon-btn{flex:1;padding:8px 10px;border-radius:6px;border:1px solid #222;background:#151515;color:#555;font-size:10px;font-family:var(--m);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;min-height:36px}

.mon-btn.conn{border-color:var(--gnS);background:var(--gnB);color:var(--gnS)}
.mon-btn.pull{border-color:var(--blS);background:var(--blB);color:var(--blS)}
.mon-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
.mon-dot.on{background:var(--gnS)}
/* Assessment interval timer */
.nxt{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-bottom:4px;font-family:var(--m);font-size:11px;font-weight:600}

.nxt.soon{background:var(--ywB);border:1px solid rgba(138,109,43,.12);color:var(--ywS)}
.nxt.over{background:var(--rdB);border:1px solid rgba(139,45,45,.12);color:var(--rdS)}
.nxt-btns{display:flex;gap:3px}
.nxt-b{padding:4px 7px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#666;font-size:8px;font-family:var(--m);font-weight:700;cursor:pointer}
.nxt-b.act{border-color:var(--gnS);background:var(--gnB);color:var(--gnS)}
/* Milestone items */
.tm{display:flex;align-items:center;gap:8px;padding:10px;border-radius:6px;border:1px solid #1e1e1e;background:rgba(255,255,255,.015);margin-bottom:4px;cursor:pointer;min-height:46px}
.tm:active{transform:scale(.98)}
.tm.done{border-color:rgba(42,107,63,.15);background:var(--gnB)}
.tm.no{border-color:rgba(139,45,45,.1);background:var(--rdB)}
.tm-c{width:20px;height:20px;border-radius:5px;border:2px solid #3a3a3a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;flex-shrink:0}
.tm-c.done{border-color:var(--gnS);background:var(--gn);color:#fff}
.tm-c.no{border-color:var(--rdS);background:var(--rd);color:#fff;font-size:8px}
.tm-n{font-size:12px;font-weight:600;flex:1}.tm-n.done{color:#7a7a7a}
.tm-t{font-size:10px;font-family:var(--m);color:var(--gnS);flex-shrink:0}
.tm-sub{font-size:8px;color:#555;font-family:var(--m);margin-top:1px}
/* Info row */
.ir{display:flex;justify-content:space-between;padding:2px 0;font-size:9px;font-family:var(--m)}
.irk{color:#555}.irv{color:#888;text-align:right;max-width:65%}
.ho-card{padding:8px;background:rgba(255,255,255,.015);border:1px solid #1e1e1e;border-radius:6px;margin-bottom:6px}
/* Toggles (compact) */
.wl-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.012);border:1px solid #1a1a1a;border-radius:6px;margin-bottom:3px;min-height:38px;gap:8px}
.wl-lbl{font-size:11px;font-weight:600;flex:1;line-height:1.3}
.tog-pair{display:flex;gap:2px;flex-shrink:0}
.tb{padding:4px 8px;border-radius:4px;border:1px solid #222;background:#151515;color:#555;font-size:9px;font-family:var(--m);font-weight:700;cursor:pointer;min-height:28px;display:flex;align-items:center}
.tb:active{transform:scale(.88)}
.tb.y{border-color:var(--gnS);background:var(--gnB);color:var(--gnS)}
.tb.n{border-color:var(--rdS);background:var(--rdB);color:var(--rdS)}
.tb.mid{border-color:var(--ywS);background:var(--ywB);color:var(--ywS)}

.nurse-sel{width:100%;padding:7px 10px;background:#111;border:1px solid #222;border-radius:5px;color:var(--tx);font-size:11px;font-family:var(--m);outline:none;-webkit-appearance:none;appearance:none;margin-bottom:3px}
.nurse-sel option{background:#111}
.sel-lbl{font-size:7px;color:#3a3a3a;font-family:var(--m);text-transform:uppercase;letter-spacing:.05em;padding-left:2px;margin-bottom:2px;display:block}
/* I/O */
.io3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px}
.io-box{padding:8px 6px;background:rgba(255,255,255,.015);border:1px solid #1e1e1e;border-radius:6px;text-align:center}

.nta{width:100%;padding:10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:var(--tx);font-size:12px;font-family:var(--m);outline:none;resize:vertical;min-height:70px;margin-bottom:4px}

.order-std{padding:7px 10px;background:rgba(255,255,255,.01);border:1px solid #1a1a1a;border-radius:5px;margin-bottom:3px;font-size:9px;font-family:var(--m);color:#666;line-height:1.6}

.order-adm-btn:active{transform:scale(.9)}
.order-adm-btn.warn{border-color:var(--ywS);background:var(--ywB);color:var(--ywS)}
.order-adm-log{font-size:9px;font-family:var(--m);color:#555;padding:2px 0 0 6px;border-left:2px solid #222;margin-top:2px;line-height:1.4}

/* DC */
.blocker{padding:8px 10px;border-radius:6px;background:var(--rdB);border:1px solid rgba(139,45,45,.12);margin-bottom:6px;font-family:var(--m);font-size:10px;color:var(--rdS);line-height:1.5}

.sup-hdr{display:grid;grid-template-columns:1fr 82px 82px;gap:3px;padding:0 10px 3px;font-size:7px;font-family:var(--m);color:#3a3a3a;text-transform:uppercase;letter-spacing:.06em;text-align:center}

.sup-nm{font-size:10px;font-weight:600;line-height:1.2}
.sup-ctrl{display:flex;align-items:center;justify-content:center;gap:4px}

.sup-adj:active{transform:scale(.82)}
.sup-val{font-size:13px;font-weight:700;font-family:var(--m);min-width:18px;text-align:center}
.sup-val.has{color:var(--blS)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
</style>
</head>

function dcBlockers(s,c){
  const b=[];
  if(s.vitalLog.length<3)b.push(`Need ${3-s.vitalLog.length} more vital reading(s) (min 3)`);
  if(s.vitalLog.length>0){const m=minSince(s.vitalLog[0].t);if(m>30)b.push(`Last vitals ${m}m ago (max 30m)`);}
  else b.push("No vitals logged");
  if(!s.toChair)b.push("Not yet to chair");
  if(!s.ambulated)b.push("Not yet ambulated");
  if(!s.voided)b.push("Has not voided");
  if(!latestAldOk(s))b.push("Aldrete < 9");
  if(!latestNVOk(s))b.push("Neurovascular not verified intact");
  if(!latestDressOk(s))b.push("Dressing not assessed or fully saturated");
  if(!Object.values(s.dcCrit).every(v=>v))b.push("Discharge criteria not all met");
  const ei=eduItems(c.jt);if(ei.some(e=>s.edu[e.id]===false))b.push("Education incomplete");
  if(!s.rxConf)b.push("Prescriptions not confirmed");
  if(!s.rideHere)b.push("Responsible adult not confirmed");
  return b;
}

// Format a log entry for display
function fmtEntry(type,e){
  if(type==='pain'){const c=e.score<=3?'g':e.score<=6?'y':'r';return`Pain <span class="${c}">${e.score}/10</span>`;}
  if(type==='ald'){const c=e.score>=9?'g':e.score>=7?'y':'r';return`Aldrete <span class="${c}">${e.score}/10</span>`;}
  if(type==='o2'){const c=e.method==='RA'?'g':'y';return`O₂ <span class="${c}">${e.method}</span>`;}
  if(type==='dress'){const c=e.status==='Clean/Dry'?'g':e.status==='Slightly Saturated'?'y':'r';return`<span class="${c}">${e.status}</span>`;}
  if(type==='nv'){const c=e.status==='Intact'?'g':'r';return`NV <span class="${c}">${e.status}</span>`;}
  if(type==='naus'){const c=e.status==='None'?'g':e.status==='Mild'||e.status==='Moderate'?'y':'r';return`Nausea <span class="${c}">${e.status}</span>`;}
  if(type==='spinal')return`Spinal <span class="b">${e.level}</span>`;
  if(type==='cryo'){const c=e.status==='Active'?'g':e.status==='Repositioned'?'y':'r';return`Cryo <span class="${c}">${e.status}</span>`;}
  if(type==='vital'){
    const sbpColor=e.sbp<90||e.sbp>160?'r':e.sbp<100||e.sbp>140?'y':'g';
    const spo2Color=parseInt(e.spo2)<92?'r':parseInt(e.spo2)<95?'y':'g';
    return`<span class="${sbpColor}">${e.sbp}/${e.dbp}</span> HR<span class="b">${e.hr}</span> RR${e.rr} SpO₂<span class="${spo2Color}">${e.spo2}%</span>${e.temp?` T${e.temp}`:''}`;
  }
  return'';
}

/* ═══ RENDER ASSESS ═══ */
function renderAssess(){

  /* ── O2 ── */

  });

  ax+=logSec('o2','O₂',o2Sel,s.o2Log,es);

  /* ── DRESSING ── */
  let dressSel=`<div class="sel-row">`;
  [["Clean/Dry","sel-g"],["Slightly Saturated","sel-y"],["Fully Saturated","sel-r"],["Reinforced","sel"],["Dressing Changed","sel"]].forEach(([v,cls])=>{
    const sel=s.pDress===v;
    dressSel+=`<div class="sb${sel?' '+cls:''}" onclick="logDress('${v}')">${v}</div>`;

  {

  ax+=`<textarea class="nta" placeholder="Clinical notes, complications, events, concerns..." oninput="S[cur].nursingNote=this.value">${s.nursingNote}</textarea>`;

}

/* ═══ RENDER ORDERS ═══ */
function renderOrders(){
  const s=S[cur];
  let ord="";
  // Single acknowledge button
  if(s.ordersAck){
    ord+=`<div style="padding:8px 10px;border-radius:6px;background:var(--gnB);border:1px solid rgba(42,107,63,.2);font-family:var(--m);font-size:10px;color:var(--gnS);margin-bottom:6px">✓ Orders acknowledged · ${fm(s.ordersAck)}</div>`;
  }else{
    ord+=`<div class="logb ok" style="font-size:12px;padding:11px;margin-bottom:8px" onclick="ackOrders()">Acknowledge All Orders</div>`;
  }

  function medRtBadge(rt){return`<span class="med-rt ${rt.toLowerCase()}">${rt}</span>`;}
  function orderMedSection(meds){
    let h="";
    meds.forEach(m=>{
      const chk=canAdmOrder(m.id,s);
      const hist=s.orderAdminH.filter(x=>x.id===m.id);
      const btnCls=chk.ok?'':' warn';
      h+=`<div class="order-med-row"><div class="order-med-info"><div class="order-med-nm">${m.nm} ${medRtBadge(m.rt)} <span style="font-size:9px;font-family:var(--m);color:#555">${m.ds}</span></div><div class="order-med-detail">${m.detail}</div>`;
      if(m.warn)h+=`<div class="order-med-warn">⚠ ${m.warn}</div>`;
      hist.forEach(e=>h+=`<div class="order-adm-log"><span class="mt">${fm(e.t)}</span> — Given</div>`);
      h+=`</div><div class="order-adm-btn${btnCls}" onclick="${chk.ok?`admOrder('${m.id}')`:''}">${chk.ok?`Give${hist.length?` (${hist.length})`:''}`:chk.reason}</div></div>`;
    });
    return h;
  }

  ord+=`<div class="sh">Anesthesia Standing Orders</div>`;
  ANES_STD.forEach(o=>ord+=`<div class="order-std"><b>${o.t}</b> · ${o.d}</div>`);
  ord+=`<div class="sh" style="margin-top:4px">Anesthesia PRN Medications</div>`;
  ord+=orderMedSection(ANES_MEDS);

  ord+=`<div class="sh" style="margin-top:6px">Surgeon Post-Op Standing Orders</div>`;
  SURG_STD.forEach(o=>ord+=`<div class="order-std"><b>${o.t}</b> · ${o.d}</div>`);
  ord+=`<div class="sh" style="margin-top:4px">Surgeon PRN Medications</div>`;
  ord+=orderMedSection(SURG_MEDS);

  ord+=`<div class="sh" style="margin-top:6px">Discharge Medications (Reference)</div>`;
  DC_MEDS.forEach(m=>ord+=`<div class="order-dc-note"><span style="font-weight:700;color:#888">${m.nm}</span> · ${m.ds}</div>`);

  ord+=`<div class="sh" style="margin-top:4px">Discharge Orders</div>`;
  ["Discontinue IV at discharge","Remove scopolamine patch at discharge","May discharge home when criteria met"].forEach(txt=>ord+=`<div class="order-dc-note">${txt}</div>`);

  // Free text for extra meds
  ord+=`<div class="sh" style="margin-top:6px">Additional Medications / Notes</div>`;
  ord+=`<textarea class="nta" placeholder="Document any additional medications given or relevant medication notes..." oninput="S[cur].extraMedNote=this.value">${s.extraMedNote}</textarea>`;

  // Admin log
  if(s.orderAdminH.length){
    ord+=`<div class="sh">Administration Log (${s.orderAdminH.length})</div>`;
    s.orderAdminH.forEach(e=>ord+=`<div class="axe" style="cursor:default"><div class="axe-body"><span class="t">${fm(e.t)}</span> ${e.nm} ${e.ds} ${e.rt}</div></div>`);
  }

  ord+=`<div class="sh" style="margin-top:4px">Nursing Note</div>`;
  ord+=`<textarea class="nta" placeholder="Order-related nursing notes..." oninput="S[cur].ordersNurseNote=this.value">${s.ordersNurseNote}</textarea>`;

  document.getElementById("p-orders").innerHTML=ord;
}

/* ═══ RENDER DC ═══ */
function renderDC(){
  const c=C[cur],s=S[cur];
  let dc="";

  // Discharge criteria (pre-checked, tap to toggle)
  dc+=`<div class="sh">Discharge Criteria</div>`;
  const critMap=[
    {k:"teaching",lb:"Teaching & Understanding"},
    {k:"swallow",lb:"Swallow, Cough & Gag Reflex"},
    {k:"nvMin",lb:"Nausea/Vomiting Minimal"},
    {k:"painTol",lb:"Pain Tolerable"},
    {k:"skin",lb:"Skin Color WNL"},
    {k:"motor",lb:"No Loss of Gross Motor Skill"},
    {k:"instructions",lb:"Verbal & Written DC Instructions Given"},
  ];
  critMap.forEach(({k,lb})=>{
    const done=s.dcCrit[k];
    dc+=`<div class="tm${done?" done":done===false?" no":""}" onclick="togDcCrit('${k}')"><div class="tm-c${done?" done":""}">✓</div><span class="tm-n${done?" done":""}">${lb}</span></div>`;
  });

  // Clinical readiness (auto-derived from logs)
  dc+=`<div class="sh">Clinical Readiness</div>`;
  const aldOk=latestAldOk(s),nvOk=latestNVOk(s),drOk=latestDressOk(s);
  const latestAld=s.aldreteLog.length?s.aldreteLog[0]:null;
  const latestNV=s.nvLog.length?s.nvLog[0]:null;
  const latestDress=s.dressLog.length?s.dressLog[0]:null;

  function autoTm(done,label,sub,t){
    return`<div class="tm${done?" done":""}"><div class="tm-c${done?" done":""}">✓</div><div style="flex:1"><span class="tm-n${done?" done":""}">${label}</span>${sub?`<div class="tm-sub">${sub}</div>`:""}</div>${done&&t?`<span class="tm-t">${fm(t)}</span>`:""}</div>`;
  }
  dc+=autoTm(aldOk,"Aldrete ≥ 9",latestAld?`Latest: ${latestAld.score}/10`:"From assessments",latestAld?latestAld.t:null);
  dc+=autoTm(nvOk,"Neurovascular intact",latestNV?`Latest: ${latestNV.status}`:"From assessments",latestNV?latestNV.t:null);
  dc+=autoTm(drOk,"Dressing intact",latestDress?`Latest: ${latestDress.status}`:"From assessments",latestDress?latestDress.t:null);

  // Education
  dc+=`<div class="sh">Patient & Family Education</div>`;
  eduItems(c.jt).forEach(e=>{
    const done=s.edu[e.id]!==false;
    dc+=`<div class="tm${done?" done":""}" onclick="togEdu('${e.id}')"><div class="tm-c${done?" done":""}">✓</div><span class="tm-n${done?" done":""}">${e.lb}</span></div>`;
  });

  // Logistics
  dc+=`<div class="sh">Logistics</div>`;
  dc+=`<div class="tm${s.rxConf?" done":""}" onclick="togManual('rxConf')"><div class="tm-c${s.rxConf?" done":""}">✓</div><span class="tm-n${s.rxConf?" done":""}">Prescriptions confirmed</span></div>`;
  dc+=`<div class="tm${s.rideHere?" done":""}" onclick="togRide()"><div class="tm-c${s.rideHere?" done":""}">✓</div><span class="tm-n${s.rideHere?" done":""}">Responsible adult present</span></div>`;

  // Discharge
  if(s.discharged){
    dc+=`<div class="dc-box"><div class="dc-t">✓ Discharged</div><div class="dc-s">${fm(s.discharged)} · PACU: ${el(s.arrived,s.discharged)}</div></div>`;
  }else{
    dc+=`<div class="logb ok" style="margin-top:8px" onclick="discharge()">Discharge Patient</div>`;
  }

  dc+=`<div class="sh" style="margin-top:6px">Discharge Nursing Note</div>`;
  dc+=`<textarea class="nta" placeholder="Discharge summary, patient condition, instructions given, follow-up..." oninput="S[cur].dcNursingNote=this.value">${s.dcNursingNote||''}</textarea>`;
  document.getElementById("p-dc").innerHTML=dc;
}

/* ═══ RENDER SUPPLY ═══ */
function renderSupply(){
  const s=S[cur];
  let sup=`<div class="sh">Supplies & Instruments</div>`;
  sup+=`<div class="sup-hdr"><span>Item</span><span>Pulled</span><span>Used</span></div>`;
  s.supplies.forEach((item,idx)=>{
    sup+=`<div class="sup-row"><span class="sup-nm">${item.nm}</span><div class="sup-ctrl"><div class="sup-adj" onclick="adjSup(${idx},'pulled',-1)">−</div><span class="sup-val${item.pulled?' has':''}">${item.pulled}</span><div class="sup-adj" onclick="adjSup(${idx},'pulled',1)">+</div></div><div class="sup-ctrl"><div class="sup-adj" onclick="adjSup(${idx},'used',-1)">−</div><span class="sup-val${item.used?' has':''}">${item.used}</span><div class="sup-adj" onclick="adjSup(${idx},'used',1)">+</div></div></div>`;
  });
  document.getElementById("p-supply").innerHTML=sup;
}

/* ═══ MAIN RENDER ═══ */
function R(){
  const c=C[cur],s=S[cur];
  const jc=c.jt==="Hip"?{a:"var(--hp)",bg:"rgba(168,85,247,.08)",bd:"rgba(168,85,247,.2)"}:{a:"var(--kn)",bg:"rgba(59,130,246,.08)",bd:"rgba(59,130,246,.2)"};

  // Status pill
  const st=getStatus(s);
  const pill=document.getElementById('statusPill');
  pill.textContent=st.lb;pill.style.cssText=`color:${st.cl};background:${st.bg};border-color:${st.bd}`;

  // Patient tabs
  document.getElementById("ctabs").innerHTML=C.map((cs,i)=>{
    const dc=S[i].discharged?"✓ ":"";
    return`<div class="ctab${i===cur?" act":""}" onclick="selCase(${i})"><span class="jd" style="background:${cs.jt==="Hip"?"var(--hp)":"var(--kn)"}"></span>${dc}${cs.orOut} ${cs.ln}</div>`;
  }).join("");

  // Patient bar
  const mc=msCnt(s,c),pct=Math.round(mc/MS_TOTAL*100);
  const lAld=s.aldreteLog.length?s.aldreteLog[0].score:null;
  const lPain=s.painLog.length?s.painLog[0].score:null;
  const pc=pct>=90?"var(--gnS)":pct>=50?"var(--ywS)":"var(--blS)";
  let pb=`<div class="pr1"><span class="pn">${c.ln}, ${c.fn}</span><span class="ptag" style="background:${jc.bg};color:${jc.a};border:1px solid ${jc.bd}">${c.proc}</span>`;
  c.al.forEach(a=>pb+=`<span class="pal">⚠ ${a}</span>`);
  pb+=`</div><div class="pr2">`;
  pb+=`<div class="ps"><div class="psv">${s.arrived?fm(s.arrived):"—"}</div><div class="psl">IN</div></div>`;
  pb+=`<div class="ps"><div class="psv"${lAld!==null?` style="color:${lAld>=9?"var(--gnS)":"var(--rdS)"}"`:``}>${lAld!==null?lAld:"—"}</div><div class="psl">ALD</div></div>`;
  pb+=`<div class="ps"><div class="psv"${lPain!==null?` style="color:${lPain<=3?"var(--gnS)":lPain<=6?"var(--ywS)":"var(--rdS)"}"`:``}>${lPain!==null?lPain:"—"}</div><div class="psl">PAIN</div></div>`;
  pb+=`<div class="mbar"><div class="mfill" style="width:${pct}%;background:${pc}"></div></div><span class="mlbl" style="color:${pc}">${mc}/${MS_TOTAL}</span>`;
  pb+=`</div>`;
  document.getElementById("pbar").innerHTML=pb;

  const pe=document.getElementById("pacuEl");
  if(s.arrived&&!s.discharged){pe.textContent="⏱ "+el(s.arrived,N());pe.style.color="var(--ywS)"}
  else if(s.discharged){pe.textContent="✓ "+el(s.arrived,s.discharged);pe.style.color="var(--gnS)"}
  else pe.textContent="";

  renderAssess();
  renderOrders();
  renderDC();
  renderSupply();
}

/* ═══ TICK ═══ */
function tick(){
  document.getElementById("clk").textContent=N().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit"});
  const s=S[cur];
  const pe=document.getElementById("pacuEl");
  if(s.arrived&&!s.discharged){pe.textContent="⏱ "+el(s.arrived,N());pe.style.color="var(--ywS)"}
  // Update status pill
  const st=getStatus(s);
  const pill=document.getElementById('statusPill');
  if(pill){pill.textContent=st.lb;pill.style.cssText=`color:${st.cl};background:${st.bg};border-color:${st.bd}`;}
  // Update vitals timer if visible
  const nxtEl=document.querySelector('.nxt');
  if(nxtEl&&s.vitalLog.length){
    const elapsed=minSince(s.vitalLog[0].t),rem=s.axInt-elapsed;
    const cls=rem>5?"due":rem>0?"soon":"over";
    nxtEl.className="nxt "+cls;
    nxtEl.children[0].textContent=rem>0?`Next vitals in ${rem}m`:`Vitals overdue by ${Math.abs(rem)}m`;
  }
}
setInterval(tick,1000);tick();R();
</script>
</body>
</html>
