<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TJR Hub — Pre-Anesthesia Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e8f0;
  --t1:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;
  --blue:#2563eb;--blueL:#eff6ff;--blueD:#1d4ed8;
  --green:#16a34a;--greenL:#f0fdf4;--greenB:#dcfce7;--greenD:#15803d;
  --yellow:#d97706;--yellowL:#fffbeb;--yellowB:#fef3c7;
  --red:#dc2626;--redL:#fef2f2;--redB:#fee2e2;
  --purple:#7c3aed;--purpleL:#f5f3ff;
  --orange:#ea580c;--orangeL:#fff7ed;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:13px;}
::selection{background:var(--blue);color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-l{display:flex;align-items:center;gap:8px;}
.logo{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#7c3aed,#6d28d9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:9px;}
.topbar-t{font-weight:700;font-size:14px;}
.topbar-s{font-size:10px;color:var(--t3);}
.topbar-r{display:flex;align-items:center;gap:6px;}
.search-wrap{position:relative;}
.search-wrap input{width:180px;padding:6px 8px 6px 26px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--t1);}
.search-wrap input:focus{outline:none;border-color:var(--blue);}
.search-wrap::before{content:"🔍";position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:11px;}
.flt{padding:5px 8px;border-radius:6px;border:1px solid var(--border);font-size:10px;font-family:inherit;color:var(--t2);background:#fff;cursor:pointer;}

.main{padding:10px 12px 40px;}

.stats{display:flex;gap:8px;margin-bottom:10px;}
.stat{background:var(--card);border-radius:8px;padding:10px 14px;box-shadow:var(--shadow);border-left:3px solid transparent;flex:1;}
.stat-n{font-size:22px;font-weight:800;line-height:1;margin-bottom:1px;}
.stat-l{font-size:10px;color:var(--t3);font-weight:500;}

/* TABLE */
.pac-t{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;}
.pac-t thead th{padding:8px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:#fafbfc;white-space:nowrap;}
.pac-t thead th:first-child,.pac-t thead th:nth-child(2){text-align:left;}
.pac-t tbody td{padding:0;border-bottom:1px solid #f1f5f9;vertical-align:top;}
.pac-t tbody tr:last-child td{border-bottom:none;}
.pac-t tbody tr.dtr td{padding:0;background:#fafbfc;border-bottom:1px solid var(--border);}

.pt-c{padding:8px 8px;display:flex;align-items:center;gap:6px;min-width:160px;}
.rd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rd.ready{background:var(--green);}.rd.pending{background:var(--yellow);}.rd.not-ready{background:var(--red);}
.pn{font-weight:700;font-size:12px;white-space:nowrap;}
.ps{font-size:9px;color:var(--t4);}

.proc-c{padding:8px 6px;min-width:90px;}
.ptag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;display:inline-block;}
.ptag-tka{background:var(--blueL);color:var(--blue);}.ptag-tha{background:var(--purpleL);color:var(--purple);}.ptag-rev{background:#fef3c7;color:#d97706;}.ptag-manip{background:#fce7f3;color:#be185d;}.ptag-other{background:#f1f5f9;color:#475569;}
.sd{font-size:10px;font-weight:700;color:var(--t1);margin-top:2px;}
.scd{font-size:9px;font-weight:700;}

/* STATUS CELL */
.sc{padding:6px 4px;text-align:center;cursor:pointer;transition:background .1s;min-width:70px;position:relative;}
.sc:hover{filter:brightness(.97);}
.sc-g{background:var(--greenL);}.sc-y{background:var(--yellowL);}.sc-r{background:var(--redL);}
.sc-i{font-size:14px;line-height:1;}
.sc-lb{font-size:8px;font-weight:700;margin-top:1px;text-transform:uppercase;letter-spacing:.2px;}
.sc-g .sc-lb{color:var(--green);}.sc-y .sc-lb{color:var(--yellow);}.sc-r .sc-lb{color:var(--red);}
.sc-s{font-size:8px;color:var(--t4);}

/* Caregiver cell */
.cg-c{padding:6px;min-width:90px;cursor:pointer;}
.cg-c:hover{background:#fafbfc;}
.cg-name{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.cg-rel{font-size:8px;color:var(--t4);}
.cg-conf{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;display:inline-block;margin-top:1px;}
.cg-y{background:var(--greenB);color:var(--green);}.cg-n{background:var(--redB);color:var(--red);}

/* ACT */
.ac{padding:6px 4px;text-align:center;white-space:nowrap;}

/* DETAIL PANEL */
.dp{display:none;padding:14px 16px;}
.dp.open{display:block;}
.dp-t{font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.dp-x{background:none;border:none;font-size:13px;cursor:pointer;color:var(--t4);padding:2px 6px;border-radius:4px;}
.dp-x:hover{background:#e5e7eb;}

.ck{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.ck:last-child{border-bottom:none;}
.ci{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.ci.g{background:var(--greenB);color:var(--green);}.ci.r{background:var(--redB);color:var(--red);}.ci.y{background:var(--yellowB);color:var(--yellow);}
.ct{flex:1;min-width:0;}
.ct strong{display:block;font-size:11px;}.ct span{font-size:9px;color:var(--t4);}
.cf{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.ekg-interp{margin-top:6px;padding:10px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;font-size:10px;}
.ekg-interp-title{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.ekg-meas{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 12px;margin-bottom:8px;}
.ekg-meas-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted #e2e8f0;}
.ekg-meas-lbl{color:var(--t4);font-size:9px;}
.ekg-meas-val{font-weight:700;font-size:10px;}
.ekg-findings{margin-top:6px;}
.ekg-finding{padding:4px 8px;border-radius:5px;margin-bottom:3px;font-size:10px;display:flex;align-items:center;gap:5px;}
.ekg-finding-norm{background:#dcfce7;color:#166534;}
.ekg-finding-abn{background:#fef2f2;color:#991b1b;font-weight:600;}
.ekg-finding-note{background:#fffbeb;color:#92400e;}
.ekg-confirmed{margin-top:6px;font-size:9px;color:var(--t4);font-style:italic;}
.ag-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;}
.ag-stats{display:flex;gap:12px;padding:12px 20px;background:#f8fafc;border-bottom:1px solid var(--border);}
.ag-stat{flex:1;padding:10px 14px;border-radius:10px;text-align:center;border:1px solid var(--border);background:#fff;}
.ag-stat-n{font-size:22px;font-weight:800;line-height:1;}
.ag-stat-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;color:var(--t3);}
.ag-grp{margin:0 20px 16px;}
.ag-grp-hd{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.ag-grp-badge{font-size:10px;font-weight:800;padding:2px 10px;border-radius:12px;letter-spacing:.3px;}
.ag-grp-count{font-size:10px;color:var(--t4);}
.ag-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:4px;background:#fff;transition:all .1s;}
.ag-item:hover{border-color:var(--blue);background:#f8fafc;}
.ag-item-crit{border-left:4px solid #ef4444;}
.ag-item-over{border-left:4px solid #f59e0b;}
.ag-item-appr{border-left:4px solid #3b82f6;}
.ag-item-init{border-left:4px solid #8b5cf6;}
.ag-item-ok{border-left:4px solid #22c55e;}
.ag-pt{min-width:140px;}
.ag-pt-name{font-size:11px;font-weight:700;}
.ag-pt-sub{font-size:9px;color:var(--t4);}
.ag-days{min-width:55px;text-align:center;}
.ag-days-n{font-size:16px;font-weight:800;line-height:1;}
.ag-days-l{font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--t4);}
.ag-task{flex:1;}
.ag-task-label{font-size:11px;font-weight:600;}
.ag-task-detail{font-size:9px;color:var(--t3);margin-top:1px;}
.ag-task-hist{font-size:8px;color:var(--t4);margin-top:2px;font-style:italic;}
.ag-tier{font-size:7px;font-weight:800;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.ag-actions{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.ag-sms-btn{font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .12s;}
.ag-sms-pt{background:#dbeafe;color:#2563eb;border-color:#93c5fd;}.ag-sms-pt:hover{background:#2563eb;color:#fff;}
.ag-sms-prov{background:#f3e8ff;color:#7c3aed;border-color:#c4b5fd;}.ag-sms-prov:hover{background:#7c3aed;color:#fff;}
.ag-sms-done{background:#dcfce7;color:#16a34a;border-color:#86efac;cursor:default;opacity:.7;}
.ag-empty{padding:40px;text-align:center;color:var(--t4);font-size:12px;}
.ag-tabs{display:flex;border-bottom:2px solid var(--border);padding:0 20px;background:#f8fafc;}
.ag-tab{padding:8px 16px;font-size:11px;font-weight:700;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;white-space:nowrap;}
.ag-tab:hover{color:var(--t1);}
.ag-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.ag-tab-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:4px;vertical-align:middle;}
.ag-log-item{display:flex;gap:10px;padding:8px 14px;border-bottom:1px solid #f1f5f9;font-size:10px;align-items:flex-start;}
.ag-log-item:hover{background:#f8fafc;}
.ag-log-time{min-width:80px;color:var(--t4);font-size:9px;font-weight:600;flex-shrink:0;}
.ag-log-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ag-log-icon-sms{background:#dbeafe;color:#2563eb;}
.ag-log-icon-auto{background:#dcfce7;color:#16a34a;}
.ag-log-icon-esc{background:#fecaca;color:#991b1b;}
.ag-log-icon-init{background:#f3e8ff;color:#7c3aed;}
.ag-log-body{flex:1;}
.ag-log-pt{font-weight:700;}
.ag-log-msg{color:var(--t2);margin-top:1px;}
.ag-log-to{font-size:9px;color:var(--t4);margin-top:1px;}
.ag-cfg-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fff;}
.ag-cfg-label{flex:1;font-size:11px;font-weight:600;}
.ag-cfg-sub{font-size:9px;color:var(--t4);margin-top:1px;}
.ag-cfg-input{width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;text-align:center;font-family:inherit;}
.ag-cfg-input:focus{outline:none;border-color:var(--blue);}
.ag-cfg-unit{font-size:9px;color:var(--t3);min-width:50px;}
.ag-cfg-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:12px 0 4px;border-bottom:1px solid var(--border);margin:8px 0;}
.ag-btn-pulse{animation:agPulse 2s ease-in-out infinite;}
@keyframes agPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 6px rgba(239,68,68,0);}}
.hold-cal{margin:10px 0;padding:10px 12px;background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;}
.hold-cal-title{font-size:10px;font-weight:700;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.hold-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;margin-bottom:3px;font-size:10px;background:#fff;border:1px solid #fef3c7;}
.hold-item-date{min-width:75px;font-weight:800;font-size:11px;}
.hold-item-today{background:#fef2f2;border-color:#fca5a5;}.hold-item-today .hold-item-date{color:#ef4444;}
.hold-item-past{opacity:.5;}
.hold-item-future .hold-item-date{color:#d97706;}
.hold-item-med{flex:1;font-weight:600;}
.hold-item-instr{font-size:9px;color:var(--t3);}
.hold-item-sms{display:flex;align-items:center;gap:4px;}
.hold-sms-sent{font-size:8px;font-weight:700;color:#16a34a;display:flex;align-items:center;gap:2px;}
.hold-sms-btn{font-size:8px;font-weight:700;padding:3px 8px;border-radius:5px;border:1px solid #ef4444;background:#fef2f2;color:#ef4444;cursor:pointer;font-family:inherit;}
.hold-sms-btn:hover{background:#ef4444;color:#fff;}
.intg-dots{display:flex;gap:4px;align-items:center;padding:4px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:#fff;transition:all .12s;}
.intg-dots:hover{background:#f8fafc;border-color:var(--blue);}
.intg-dot{width:8px;height:8px;border-radius:50%;}
.intg-dot-on{background:#22c55e;box-shadow:0 0 4px #22c55e88;}
.intg-dot-warn{background:#f59e0b;box-shadow:0 0 4px #f59e0b88;animation:intgPulse 2s infinite;}
.intg-dot-off{background:#ef4444;box-shadow:0 0 4px #ef444488;animation:intgPulse 1.5s infinite;}
.intg-dot-label{font-size:7px;font-weight:700;color:var(--t3);letter-spacing:.3px;}
@keyframes intgPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.intg-card{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;background:#fff;}
.intg-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.intg-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.intg-card-title{display:flex;align-items:center;gap:8px;}
.intg-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.intg-card-name{font-size:13px;font-weight:800;}
.intg-card-desc{font-size:9px;color:var(--t3);}
.intg-card-status{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;}
.intg-st-on{background:#dcfce7;color:#16a34a;}
.intg-st-warn{background:#fef3c7;color:#d97706;}
.intg-st-off{background:#fef2f2;color:#ef4444;}
.intg-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.intg-meta-item{padding:8px 10px;background:#f8fafc;border-radius:6px;border:1px solid #f1f5f9;}
.intg-meta-label{font-size:8px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.3px;}
.intg-meta-val{font-size:11px;font-weight:600;color:var(--t1);margin-top:2px;}
.intg-data-flow{margin-top:10px;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);}
.intg-flow-title{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.intg-flow-item{display:flex;align-items:center;gap:6px;font-size:10px;padding:3px 0;}
.intg-flow-arrow{color:var(--t4);font-size:12px;font-weight:800;}
.intg-flow-tag{font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;}
.intg-flow-in{background:#dbeafe;color:#2563eb;}
.intg-flow-out{background:#dcfce7;color:#16a34a;}
.intg-refresh-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;margin-bottom:12px;}
.intg-refresh-msg{font-size:10px;color:#2563eb;font-weight:600;}
.intg-refresh-time{font-size:9px;color:var(--t4);}
.cer-cell{text-align:center;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .12s;min-width:48px;}
.cer-cell:hover{background:#f1f5f9;}
.cer-badge{font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.3px;}
.cer-badge-na{background:#f1f5f9;color:var(--t4);}
.cer-doc{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;background:#fff;}
.cer-doc:hover{background:#f8fafc;}
.cer-doc-info{display:flex;align-items:center;gap:8px;}
.cer-doc-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.cer-doc-name{font-size:11px;font-weight:600;}
.cer-doc-sub{font-size:9px;color:var(--t4);margin-top:1px;}
.cer-doc-status{display:flex;align-items:center;gap:6px;}
.cer-send-btn{font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid #3b82f6;background:#dbeafe;color:#2563eb;cursor:pointer;font-family:inherit;transition:all .12s;}
.cer-send-btn:hover{background:#2563eb;color:#fff;}
.cer-sent-tag{font-size:9px;font-weight:700;color:#16a34a;display:flex;align-items:center;gap:3px;}
.cer-header-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;margin-bottom:10px;}
.ekg-col-interp{font-size:8px;color:var(--t3);line-height:1.3;max-width:120px;margin-top:2px;}
.cf-abn{background:var(--redB);color:var(--red);}.cf-ok{background:var(--greenB);color:var(--green);}

.gate{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;margin-bottom:5px;font-size:11px;font-weight:600;}
.gate-p{background:var(--greenB);color:var(--green);}.gate-f{background:var(--redB);color:var(--red);}

.btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .12s;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.btn:hover{background:var(--blueL);border-color:var(--blue);color:var(--blue);}
.btn.p{background:var(--blue);color:#fff;border-color:var(--blue);}.btn.p:hover{background:var(--blueD);}
.btn.s{padding:2px 6px;font-size:9px;border-radius:4px;}
.btn.ro{border-color:#fecaca;color:var(--red);}.btn.ro:hover{background:var(--redL);}
.btn.rm{border:none;background:none;color:var(--t4);font-size:12px;padding:2px 4px;}.btn.rm:hover{color:var(--red);background:var(--redL);}

.dp-ft{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;}

/* Med table */
.mt{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px;}
.mt th{padding:4px 6px;text-align:left;font-size:8px;font-weight:700;color:var(--t4);text-transform:uppercase;border-bottom:1px solid var(--border);background:#f8fafc;}
.mt td{padding:5px 6px;border-bottom:1px solid #f5f5f5;}
.mt tr:last-child td{border-bottom:none;}
.ab{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;white-space:nowrap;}
.ab-mt{background:var(--greenB);color:var(--green);}.ab-c{background:var(--blueL);color:var(--blue);}
.ab-h{background:var(--yellowB);color:var(--yellow);}.ab-s{background:var(--redB);color:var(--red);}
.ab-ps{background:var(--orangeL);color:var(--orange);}.ab-rv{background:#f1f5f9;color:var(--t3);}
.hs{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;}
.hs-s{background:var(--greenB);color:var(--green);}.hs-a{background:var(--blueL);color:var(--blue);}.hs-n{background:var(--redB);color:var(--red);}

/* Consent */
.con-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:11px;}
.con-row:last-child{border-bottom:none;}
.cs{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;}
.cs-y{background:var(--greenB);color:var(--green);}.cs-n{background:var(--redB);color:var(--red);}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;}
.mo.open{display:flex;}
.md{background:#fff;border-radius:14px;max-width:560px;width:94%;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:mi .2s;max-height:88vh;overflow-y:auto;}
@keyframes mi{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:none;}}
.md-h{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.md-h h3{font-size:13px;font-weight:700;}
.md-x{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--t3);display:flex;align-items:center;justify-content:center;}
.md-x:hover{background:#f1f5f9;}
.md-b{padding:16px;}
.md-b p{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:8px;}
.md-f{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:6px;position:sticky;bottom:0;background:#fff;}
.field{margin-bottom:10px;}.field label{display:block;font-size:10px;font-weight:600;color:var(--t3);margin-bottom:2px;}
.field input,.field select,.field textarea{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-family:inherit;color:var(--t1);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);}

/* H&P Modal - full width */
.hp-modal{max-width:900px;width:96%;}
.hp-section{margin-bottom:16px;}
.hp-section h4{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.hp-field{margin-bottom:8px;}
.hp-field label{font-size:10px;font-weight:600;color:var(--t4);display:block;margin-bottom:2px;}
.hp-field textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;font-family:inherit;resize:vertical;min-height:40px;color:var(--t1);}
.hp-field textarea:focus{outline:none;border-color:var(--blue);}
.hp-field textarea[readonly]{background:#f8fafc;color:var(--t2);cursor:default;}
.hp-pre{background:#f8fafc;padding:8px 10px;border-radius:6px;font-size:11px;color:var(--t2);border:1px solid var(--border);line-height:1.5;}

/* ═══════ ORDERS (PP1265/PP1264) ═══════ */
.ss-cell{text-align:center;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .12s;}
.ss-cell:hover{background:#f1f5f9;}
.ss-type{font-size:8px;font-weight:800;letter-spacing:.5px;padding:1px 5px;border-radius:3px;display:inline-block;}
.ss-asc{background:#dbeafe;color:#1d4ed8;}
.ss-hosp{background:#fce7f3;color:#be185d;}
.ss-loc{font-size:9px;font-weight:600;color:var(--t2);margin-top:1px;}
.clr-find{padding:5px 10px;border-radius:6px;margin-top:3px;font-size:10px;line-height:1.4;display:flex;align-items:flex-start;gap:6px;}
.clr-find-crit{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.clr-find-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.clr-find-info{background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e;}
.clr-find-icon{font-size:11px;flex-shrink:0;margin-top:1px;}
.clr-find-cat{font-size:7px;font-weight:800;letter-spacing:.4px;padding:1px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0;white-space:nowrap;}
.clr-alert-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:10px;letter-spacing:.3px;display:inline-block;margin-left:4px;}
.clr-alert-crit{background:#fecaca;color:#991b1b;}
.clr-alert-warn{background:#fde68a;color:#92400e;}
.clr-sum{margin:6px 0;padding:8px 12px;border-radius:8px;border-left:4px solid;font-size:10px;line-height:1.5;}
.clr-sum-crit{background:#fef2f2;border-left-color:#ef4444;}
.clr-sum-warn{background:#fffbeb;border-left-color:#f59e0b;}
.ord-wrap{display:flex;gap:16px;flex-wrap:wrap;}
.ord-form{flex:1;min-width:380px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ord-form-h{padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ord-form-t{font-size:12px;font-weight:800;}
.ord-form-sub{font-size:8px;color:var(--t4);font-weight:500;}
.ord-form-b{padding:10px 12px;}
.ord-sec-h{font-size:10px;font-weight:700;color:var(--t3);margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid #f1f5f9;}
.ord-sec-h:first-child{margin-top:0;}
.orow{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:10px;color:var(--t2);line-height:1.4;}
.orow label{display:flex;align-items:flex-start;gap:6px;cursor:pointer;flex:1;}
.orow input[type="checkbox"]{margin-top:2px;accent-color:var(--blue);flex-shrink:0;}

.orow .warn{font-size:8px;font-weight:700;color:var(--yellow);background:var(--yellowB);padding:1px 5px;border-radius:3px;margin-left:4px;flex-shrink:0;}
.orow .alert{font-size:8px;font-weight:700;color:var(--red);background:var(--redB);padding:1px 5px;border-radius:3px;margin-left:4px;flex-shrink:0;}
.orow .sub{margin-left:24px;font-size:9px;color:var(--t4);padding:1px 0;}
.ord-sig{margin-top:10px;padding:8px 10px;border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;gap:8px;font-size:10px;color:var(--t3);}
.ord-sig-done{border-color:var(--green);background:var(--greenL);color:var(--green);font-weight:700;}
.ord-asc-bar{margin-top:8px;padding:8px 12px;border-radius:6px;display:flex;align-items:center;gap:8px;font-size:10px;font-weight:600;}
.ord-asc-sent{background:var(--purpleL);color:var(--purple);}
.ord-asc-pend{background:var(--yellowL);color:var(--yellow);}

/* ═══════ INSTRUCTIONS (PP1254) ═══════ */
.instr-sec{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.instr-sec-t{font-size:10px;font-weight:700;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:4px;}
.instr-item{font-size:11px;color:var(--t2);padding:2px 0;line-height:1.5;}
.instr-item strong{color:var(--t1);}
.instr-warn{font-size:10px;color:var(--red);font-weight:700;padding:2px 0;}
.instr-ck{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2);padding:1px 0;}
.instr-ck::before{content:"☐";font-size:12px;color:var(--t4);}
.instr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.instr-grid-t{font-size:9px;font-weight:700;color:var(--t3);margin-bottom:4px;}
.instr-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;}
.instr-auto{background:var(--greenB);color:var(--green);}
.instr-pend{background:var(--yellowB);color:var(--yellow);}
.instr-none{background:var(--redB);color:var(--red);}

/* ═══════ PROTOCOL SETTINGS ═══════ */
.proto-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.proto-btn:hover{background:var(--purpleL);border-color:var(--purple);color:var(--purple);}
.proto-btn svg{width:12px;height:12px;}

.proto-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;}
.proto-ov.open{display:flex;}
.proto-md{background:#fff;border-radius:14px;width:100%;max-width:880px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;animation:mi .2s;display:flex;flex-direction:column;max-height:calc(100vh - 48px);}
.proto-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.proto-hd h2{font-size:15px;font-weight:800;color:var(--t1);}
.proto-hd-sub{font-size:9px;color:var(--t4);font-weight:500;margin-top:1px;}
.proto-body{display:flex;flex:1;overflow:hidden;min-height:0;}
.proto-side{width:200px;border-right:1px solid #f1f5f9;overflow-y:auto;flex-shrink:0;background:#fafbfc;}
.proto-side-btn{width:100%;text-align:left;padding:10px 14px;font-size:11px;font-weight:500;color:var(--t2);border:none;background:none;cursor:pointer;border-bottom:1px solid #f1f5f9;border-left:3px solid transparent;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .1s;}
.proto-side-btn:hover{background:#f1f5f9;}
.proto-side-btn.active{background:#fff;font-weight:700;color:var(--purple);border-left-color:var(--purple);}
.proto-side-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0;display:none;}
.proto-side-btn.changed .dot{display:block;}
.proto-rules{flex:1;overflow-y:auto;padding:16px 20px;}
.proto-rule{padding:12px 14px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:#fff;transition:all .15s;}
.proto-rule.changed{border-color:var(--yellow);background:var(--yellowL);}
.proto-rule-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.proto-rule-label{font-size:11px;font-weight:700;color:var(--t1);}
.proto-rule-note{font-size:9px;color:var(--t4);margin-top:1px;}
.proto-rule-input{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.proto-rule-input .comp{font-size:9px;font-weight:700;color:var(--t4);background:#f1f5f9;padding:2px 6px;border-radius:4px;font-family:'DM Sans',monospace;}
.proto-rule-input input[type="number"]{width:80px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'DM Sans',monospace;text-align:right;font-weight:700;color:var(--t1);}
.proto-rule-input input[type="number"]:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.12);}
.proto-rule-input input[type="text"]{width:240px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;color:var(--t1);}
.proto-rule-input input[type="text"]:focus{outline:none;border-color:var(--purple);}
.proto-rule-input .unit{font-size:9px;color:var(--t4);min-width:30px;}
.proto-rule-diff{margin-top:6px;font-size:9px;display:flex;align-items:center;gap:4px;}
.proto-rule-diff .old{color:var(--red);text-decoration:line-through;font-family:monospace;font-weight:600;}
.proto-rule-diff .arrow{color:var(--t4);}
.proto-rule-diff .new{color:var(--green);font-family:monospace;font-weight:700;}
.proto-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fafbfc;}
.proto-ft-l{font-size:10px;color:var(--yellow);font-weight:600;}
.proto-ft-r{display:flex;gap:6px;}

/* Confirm panel */
.proto-confirm{padding:14px;background:var(--yellowL);border:1px solid #fbbf24;border-radius:8px;margin-bottom:12px;}
.proto-confirm h4{font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:6px;}
.proto-confirm-item{font-size:10px;color:var(--t2);padding:2px 0;font-family:monospace;}
.proto-confirm-item .lbl{font-family:'DM Sans',sans-serif;font-weight:600;}
.proto-confirm-name{display:flex;align-items:center;gap:8px;margin-top:8px;}
.proto-confirm-name input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;}
.proto-confirm-name input:focus{outline:none;border-color:var(--purple);}

/* History modal */
.hist-entry{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.hist-entry-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hist-entry-who{font-size:11px;font-weight:700;color:var(--t1);}
.hist-entry-when{font-size:9px;color:var(--t4);}
.hist-entry-item{font-size:10px;color:var(--t2);padding:2px 0;display:flex;gap:6px;align-items:center;}
.hist-entry-item .lbl{font-weight:600;min-width:120px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-l">
    <div class="logo">PAC</div>
    <div><div class="topbar-t">Pre-Anesthesia Clinic</div><div class="topbar-s">Surgical Readiness · Protocol <span id="protoVer">Q4 2025</span></div></div>
    <div class="intg-dots" onclick="openIntgPanel()" title="Integration Status">
      <div class="intg-dot intg-dot-on" title="JointOps"></div>
      <div class="intg-dot-label">JO</div>
      <div class="intg-dot" id="cernerDot" title="Cerner"></div>
      <div class="intg-dot-label">CER</div>
      <div class="intg-dot intg-dot-on" title="TJV"></div>
      <div class="intg-dot-label">TJV</div>
    </div>
  </div>
  <div class="topbar-r">
    <button class="proto-btn" onclick="openProtoHistory()" title="Change History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      History
    </button>
    <button class="proto-btn" onclick="openProtoSettings()" style="background:var(--purpleL);border-color:var(--purple);color:var(--purple);" title="Protocol Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
      Protocol
    </button>
    <button class="proto-btn" onclick="openConsentSettings()" style="background:#fce7f3;border-color:#be185d;color:#be185d;" title="Consent Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Consents
    </button>
    <button class="proto-btn" onclick="openHPSettings()" style="background:#dcfce7;border-color:#16a34a;color:#16a34a;" title="H&P Template">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      H&P
    </button>
    <button class="proto-btn" onclick="openInstrSettings()" style="background:#fef3c7;border-color:#d97706;color:#d97706;" title="Instruction Pages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Instructions
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>
    <button class="proto-btn" id="agentBtn" onclick="openAgent()" style="background:#fef2f2;border-color:#ef4444;color:#ef4444;" title="Readiness Agent — Daily Worklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      <span id="agentBtnLabel">Agent</span>
    </button>
    <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>
    <div class="search-wrap"><input id="qInput" placeholder="Search patient, MRN…" oninput="render()"></div>
    <input type="date" class="flt" id="dateFilter" onchange="render()" title="Surgery Date">
    <select class="flt" id="locFilter" onchange="render()"><option value="all">All Locations</option><option value="Cumming">Cumming</option><option value="Gwinnett">Gwinnett</option><option value="Cherokee">Cherokee</option><option value="Sandy Springs">Sandy Springs</option></select>
    <select class="flt" id="readFilter" onchange="render()"><option value="all">All</option><option value="not-ready">🔴 Not Ready</option><option value="pending">🟡 Pending</option><option value="ready">🟢 Ready</option></select>
    <select class="flt" id="provFilter" onchange="render()"><option value="all">All Surgeons</option><option value="DeCook">Dr. DeCook</option><option value="Smith">Dr. Smith</option></select>
  </div>
</div>

<div class="main" id="main"></div>
<div class="mo" id="modalOv" onclick="if(event.target===this)closeModal()"><div class="md" id="modal"></div></div>

<!-- Protocol Settings Overlay -->
<div class="proto-ov" id="protoOv" onclick="if(event.target===this)closeProto()">
  <div class="proto-md" id="protoMd"></div>
</div>

<!-- History Overlay -->
<div class="proto-ov" id="histOv" onclick="if(event.target===this)closeHist()">
  <div class="proto-md" id="histMd" style="max-width:640px;"></div>
</div>

<div class="proto-ov" id="consOv" onclick="if(event.target===this)closeConsentSettings()">
  <div class="proto-md" id="consMd" style="max-width:680px;"></div>
</div>

<!-- Integration Status Overlay -->
<div class="proto-ov" id="intgOv" onclick="if(event.target===this)closeIntgPanel()">
  <div class="proto-md" id="intgMd" style="max-width:720px;"></div>
</div>
<!-- Readiness Agent Overlay -->
<div class="proto-ov" id="agentOv" onclick="if(event.target===this)closeAgent()">
  <div class="proto-md" id="agentMd" style="max-width:1000px;"></div>
</div>
<!-- H&P Template Settings Overlay -->
<div class="proto-ov" id="hpTplOv" onclick="if(event.target===this)closeHPSettings()">
  <div class="proto-md" id="hpTplMd" style="max-width:680px;"></div>
</div>
<!-- Instruction Settings Overlay -->
<div class="proto-ov" id="instrOv" onclick="if(event.target===this)closeInstrSettings()">
  <div class="proto-md" id="instrMd" style="max-width:680px;"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// PROTOCOL CONFIGURATION — Q4 2025 (from TJS Standardized Care Protocol)
// All thresholds are editable via the Protocol Settings panel
// ═══════════════════════════════════════════════════════════════════════════════
const PROTO_DEFAULT = {
  version: "Q4 2025",
  lastModified: "2025-10-01T00:00:00Z",
  modifiedBy: "",
  cats: {
    obesity: {
      label: "Obesity / BMI",
      icon: "⚖️",
      rules: [
        {id:"bmi_non_dm",label:"BMI limit (non-diabetic)",val:47,type:"num",unit:"",comp:"<",note:"Exception form required if proceeding above limit"},
        {id:"bmi_dm",label:"BMI limit (diabetic)",val:40,type:"num",unit:"",comp:"<",note:""},
      ]
    },
    diabetes: {
      label: "Diabetes / Glycemic",
      icon: "🩸",
      rules: [
        {id:"a1c_trigger",label:"HbA1c — trigger fructosamine draw",val:7.5,type:"num",unit:"%",comp:">",note:"If above, draw serum fructosamine"},
        {id:"fruct_clear",label:"Fructosamine — clearance limit",val:292,type:"num",unit:"µmol/L",comp:"≤",note:"≤ this = cleared to schedule"},
      ]
    },
    smoking: {
      label: "Nicotine Cessation",
      icon: "🚭",
      rules: [
        {id:"nic_pre_wk",label:"Weeks nicotine-free before surgery",val:4,type:"num",unit:"wk",comp:"≥",note:"All nicotine products"},
        {id:"nic_post_wk",label:"Weeks nicotine-free after surgery",val:4,type:"num",unit:"wk",comp:"≥",note:""},
      ]
    },
    timing: {

// Live protocol state — cloned from defaults, overwritten by storage
let PROTO = JSON.parse(JSON.stringify(PROTO_DEFAULT));
let PROTO_HISTORY = [];

// Load from storage
(async function loadProto(){
  try{
    const r=await window.storage.get("tjr-pac-proto");
    if(r&&r.value)PROTO=JSON.parse(r.value);
  }catch(e){}
  try{
    const r=await window.storage.get("tjr-pac-proto-history");
    if(r&&r.value)PROTO_HISTORY=JSON.parse(r.value);
  }catch(e){}
  document.getElementById("protoVer").textContent=PROTO.version;
  render();
})();

async function saveProto(){
  try{await window.storage.set("tjr-pac-proto",JSON.stringify(PROTO));}catch(e){}
  try{await window.storage.set("tjr-pac-proto-history",JSON.stringify(PROTO_HISTORY));}catch(e){}
}

// Helper to get a proto value
function pv(catId,ruleId){
  const cat=PROTO.cats[catId];if(!cat)return null;
  const r=cat.rules.find(x=>x.id===ruleId);
  return r?r.val:null;
}

// ═══════ HELPERS ═══════
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function bmi(p){return+(p.wt_lb/((p.ht_in/39.37)**2)).toFixed(1);}
function goalWt(p){const g=getBMIGate(false);const ht_m=p.ht_in*0.0254;return Math.floor(g*ht_m*ht_m*2.205);}

// ═══════ READINESS ═══════
function readiness(p){
  let h=0,s=0;
  const today=new Date(),sd=new Date(p.surgDate+"T00:00:00");
  const d=Math.ceil((sd-today)/864e5);
  if(p.a1c&&p.a1c.val>=A1C_GATE)h++;
  if(bmi(p)>=BMI_GATE)h++;
  if(!p.cg)h++;
  ["cbc","bmp","ptinr","ua","ts"].forEach(k=>{if(!p.labs[k]?.done)s++;});
  if(!p.ekg?.done)s++;
  if(p.ekg?.abn&&p.ekg.cardiacClr===null)s++;
  Object.values(p.clrs).forEach(c=>{if(c.need&&!c.done)s++;});
  Object.entries(p.medH).forEach(([k,v])=>{if(!v.sent||!v.ack)s++;if(v.sp===false)s++;});
  Object.values(p.cons).forEach(c=>{if(!c.signed)s++;});
  if(p.cls?.st!=="done")s++;
  if(!p.npo?.conf)s++;
  if(p.hp?.st!=="signed")s++;
  if(!p.instr?.sent)s++;
  if(p.orders?.pre?.st!=="signed")s++;
  if(p.orders?.post?.st!=="signed")s++;
  if(typeof isHospPt==="function"&&isHospPt(p)){const ck=Object.keys(typeof CERNER_DOCS!=="undefined"?CERNER_DOCS:{});const cs=ck.filter(k=>p.cerner?.[k]?.sent).length;if(cs<ck.length)s++;}
  let st="ready";
  if(h>0)st="not-ready";else if(s>0&&d<=7)st="not-ready";else if(s>0)st="pending";
  return{st,h,s,d};
}

// Column statuses
function labSt(p){const k=["cbc","bmp","ptinr","ua","ts"];const dn=k.filter(x=>p.labs[x]?.done).length;const ab=k.filter(x=>p.labs[x]?.abn).length;if(dn===k.length&&!ab)return{c:"g",i:"✓",lb:`${dn}/${k.length}`,s:""};if(ab)return{c:"y",i:"⚠",lb:`${dn}/${k.length}`,s:`${ab} abn`};return{c:"r",i:"✕",lb:`${dn}/${k.length}`,s:`${k.length-dn} miss`};}
function ekgSt(p){
  if(!p.ekg?.done)return{c:"r",i:"✕",lb:"Not Done",s:""};
  const interp=p.ekg.interp||[];
  const shortInterp=interp.length?interp[0]:'';
  const hasAbnLine=interp.some(l=>l.includes('ABNORMAL'));
  if(p.ekg.abn&&p.ekg.cardiacClr===null)return{c:"y",i:"⚠",lb:"Abnormal",s:shortInterp.length>20?shortInterp.substring(0,18)+'…':shortInterp};
  if(p.ekg.abn&&p.ekg.cardiacClr!==null)return{c:"g",i:"✓",lb:"Reviewed",s:shortInterp.length>20?shortInterp.substring(0,18)+'…':shortInterp};
  return{c:"g",i:"✓",lb:p.ekg.meas?`${p.ekg.meas.rate} bpm`:"Normal",s:shortInterp.length>20?shortInterp.substring(0,18)+'…':shortInterp};
}
function clrSt(p){
  const n=Object.values(p.clrs).filter(c=>c.need);
  if(!n.length)return{c:"g",i:"✓",lb:"None",s:""};
  const d=n.filter(c=>c.done).length;
  const al=clrAlertLevel(p);
  if(d===n.length){
    if(al==="critical")return{c:"r",i:"⚠",lb:`${d}/${n.length}`,s:"⚠ ALERT"};
    if(al==="warning")return{c:"y",i:"⚠",lb:`${d}/${n.length}`,s:"Review"};
    return{c:"g",i:"✓",lb:`${d}/${n.length}`,s:""};
  }
  if(al==="critical")return{c:"r",i:"⚠",lb:`${d}/${n.length}`,s:"⚠ ALERT"};
  return{c:"r",i:"✕",lb:`${d}/${n.length}`,s:`${n.length-d} need`};
}
function conSt(p){const k=Object.keys(p.cons);const s=k.filter(x=>p.cons[x].signed).length;if(s===k.length)return{c:"g",i:"✓",lb:`${s}/${k.length}`,s:""};return{c:"r",i:"✕",lb:`${s}/${k.length}`,s:`${k.length-s} unsign`};}
function clsSt(p){if(p.cls?.st==="done")return{c:"g",i:"✓",lb:"Done",s:p.cls.date||""};if(p.cls?.st==="scheduled")return{c:"y",i:"📅",lb:"Sched",s:p.cls.date||""};return{c:"r",i:"✕",lb:"None",s:""};}
function medSt(p){const h=Object.entries(p.medH);if(!h.length)return{c:"g",i:"✓",lb:"No Holds",s:`${p.meds.length} meds`};const ok=h.every(([k,v])=>v.sent&&v.ack&&v.sp!==false);if(ok)return{c:"g",i:"✓",lb:"Conf'd",s:`${h.length} holds`};return{c:"y",i:"⚠",lb:"Pending",s:`${h.length} holds`};}
function bmiSt(p){const b=bmi(p);if(b<BMI_GATE)return{c:"g",i:"✓",lb:b+"",s:""};return{c:"r",i:"✕",lb:b+"",s:`Goal: ${goalWt(p)}lb`};}
function cgSt(p){if(!p.cg)return{c:"r"};return{c:"g"};}
function hpSt(p){if(p.hp?.st==="signed")return{c:"g",i:"✓",lb:"Signed",s:p.hp.date||""};if(p.hp?.st==="draft")return{c:"y",i:"✏",lb:"Draft",s:""};return{c:"r",i:"✕",lb:"None",s:""};}
function instrSt(p){
  if(p.instr?.sent&&p.instr?.conf)return{c:"g",i:"✓",lb:"Conf'd",s:p.instr.sentDate||""};
  if(p.instr?.sent)return{c:"y",i:"📱",lb:"Sent",s:"Unconf"};
  return{c:"r",i:"✕",lb:"Not Sent",s:""};
}
function ordSt(p){
  const pre=p.orders?.pre?.st||"none",post=p.orders?.post?.st||"none";
  if(pre==="signed"&&post==="signed"){
    if(p.orders?.asc_sent)return{c:"g",i:"✓",lb:"Signed",s:"→ ASC"};
    return{c:"g",i:"✓",lb:"Signed",s:"Send ASC"};
  }
  if(pre!=="none"||post!=="none")return{c:"y",i:"✏",lb:"Partial",s:""};
  return{c:"r",i:"✕",lb:"None",s:""};
}
function wt_kg(p){return+(p.wt_lb/2.205).toFixed(1);}
const LOC_ADDR={Cumming:"Forsyth - 2000 Howard Farm Drive, Suite T100, Cumming, GA 30041",Gwinnett:"Gwinnett - 2800 Buford Drive, Suite 100, Lawrenceville, GA 30043","Sandy Springs":"Atlanta - 1150 Hammond Drive, Suite 600, Sandy Springs, GA 30328",Cherokee:""};
// ═══════ FILTER ═══════
let openPn={};

function getF(){
  const q=(document.getElementById("qInput")?.value||"").toLowerCase();
  const rf=document.getElementById("readFilter")?.value||"all";
  const pf=document.getElementById("provFilter")?.value||"all";
  const lf=document.getElementById("locFilter")?.value||"all";
  const df=document.getElementById("dateFilter")?.value||"";
  return P.filter(p=>{
    if(pf!=="all"&&p.prov!==pf)return false;
    if(lf!=="all"&&p.loc!==lf)return false;
    if(df&&p.surgDate!==df)return false;
    const r=readiness(p);if(rf!=="all"&&r.st!==rf)return false;
    if(q&&!`${p.f} ${p.l} ${p.mrn}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{const ra=readiness(a),rb=readiness(b);const o={"not-ready":0,pending:1,ready:2};if(o[ra.st]!==o[rb.st])return o[ra.st]-o[rb.st];return new Date(a.surgDate)-new Date(b.surgDate);});
}

  </div>`;

  h+=`<table class="pac-t"><thead><tr>
    <th style="text-align:left;">Patient</th><th style="text-align:left;">Procedure</th><th>Surgeon</th><th>Surg. Site</th>
    <th>BMI</th><th>Labs</th><th>EKG</th><th>Clearances</th><th>Consents</th><th>Class</th><th>Meds</th><th>Caregiver</th><th>H&P</th><th>Orders</th><th>Instruct</th><th>Cerner</th><th>Act</th>
  </tr></thead><tbody>`;

  pts.forEach(p=>{
    const r=readiness(p);
    const sd=new Date(p.surgDate+"T00:00:00");
    const sdS=sd.toLocaleDateString("en-US",{month:"short",day:"numeric"});

    const ls=labSt(p),es=ekgSt(p),cs=clrSt(p),cos=conSt(p),cls2=clsSt(p),ms=medSt(p),bs=bmiSt(p),hs=hpSt(p),ost=ordSt(p),ist=instrSt(p);

    h+=`<tr data-pid="${p.id}">`;

    const ptInfo=PROC_TYPES[p.proc]||PROC_TYPES.other;

    [["labs",ls],["ekg",es],["clrs",cs],["cons",cos],["class",cls2],["meds",ms]].forEach(([k,s])=>{

    } else {
      const cerAct=openPn[p.id]==='cerner';
      h+=`<td><div class="sc sc-${cerSt.c}" onclick="togglePn(${p.id},'cerner')" style="${cerAct?'box-shadow:inset 0 -2px 0 currentColor;':''}"><div class="sc-i">${cerSt.i}</div><div class="sc-lb">${cerSt.lb}</div>${cerSt.s?`<div class="sc-s">${cerSt.s}</div>`:''}</div></td>`;

    h+=`<td class="ac"><button class="btn s" onclick="sendReminder(${p.id})" title="Remind">📱</button> <button class="btn s" onclick="showMsg(${p.id})" title="Message">💬</button></td>`;

function togglePn(id,k){if(openPn[id]===k)delete openPn[id];else openPn[id]=k;render();}


const CERNER_DOCS={
  hp:{name:"History & Physical",icon:"📋",gate:p=>p.hp?.st==="signed",gateLabel:"H&P must be signed"},
  nhs_consent:{name:"Hospital Consent (NHS)",icon:"📝",gate:p=>p.cons?.nhs?.signed,gateLabel:"NHS consent must be signed"},
  labs:{name:"Laboratory Results",icon:"🔬",gate:p=>["cbc","bmp","ptinr","ua","ts"].every(k=>p.labs[k]?.done),gateLabel:"All labs must be complete"},
  ekg:{name:"EKG Report",icon:"💓",gate:p=>p.ekg?.done,gateLabel:"EKG must be completed"},
  clrs:{name:"Clearance Letters",icon:"✉️",gate:p=>{const need=Object.values(p.clrs).filter(c=>c.need);return need.every(c=>c.done);},gateLabel:"All clearances must be received"},
  meds:{name:"Medication List",icon:"💊",gate:p=>p.meds?.length>0,gateLabel:"Medications must be reconciled"}
};
function isHospPt(p){return p.surgSite?.type==="hosp";}
function cernerSt(p){
  if(!isHospPt(p))return{c:"na",i:"—",lb:"N/A",s:""};
  if(!p.cerner)p.cerner={};
  const keys=Object.keys(CERNER_DOCS);
  const sent=keys.filter(k=>p.cerner[k]?.sent).length;
  if(sent===keys.length)return{c:"g",i:"✓",lb:sent+"/"+keys.length,s:"All sent"};
  if(sent>0)return{c:"y",i:"⚠",lb:sent+"/"+keys.length,s:(keys.length-sent)+" pending"};
  return{c:"r",i:"✕",lb:"0/"+keys.length,s:"None sent"};
}

function pnBMI(p){

function pnLabs(p){

function pnEKG(p){
  let h=`<div class="dp-t">EKG <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  if(!p.ekg?.done){
    h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>EKG not completed</strong></div></div>`;
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();uploadEKG(${p.id})">📷 Upload EKG Photo</button></div>`;
  } else {
    const flag=p.ekg.abn?`<span class="cf cf-abn">⚠ ABNORMAL</span>`:`<span class="cf cf-ok">Normal</span>`;
    h+=`<div class="ck"><div class="ci ${p.ekg.abn?'y':'g'}">${p.ekg.abn?'⚠':'✓'}</div><div class="ct"><strong>EKG — ${esc(p.ekg.date)}</strong><span>${esc(p.ekg.note)}</span></div>${flag}</div>`;

    // ── Interpretation block ──
    if(p.ekg.interp||p.ekg.meas){
      h+=`<div class="ekg-interp">`;
      h+=`<div class="ekg-interp-title">EKG Interpretation</div>`;

      // Measurements grid
      if(p.ekg.meas){
        const m=p.ekg.meas;
        h+=`<div class="ekg-meas">
          <div class="ekg-meas-item"><span class="ekg-meas-lbl">Vent. Rate</span><span class="ekg-meas-val">${m.rate} BPM</span></div>
          <div class="ekg-meas-item"><span class="ekg-meas-lbl">PR Interval</span><span class="ekg-meas-val">${m.pr} ms</span></div>
          <div class="ekg-meas-item"><span class="ekg-meas-lbl">QRS Duration</span><span class="ekg-meas-val">${m.qrs} ms</span></div>
          <div class="ekg-meas-item"><span class="ekg-meas-lbl">QT/QTcB</span><span class="ekg-meas-val">${m.qt}/${m.qtc} ms</span></div>
          <div class="ekg-meas-item"><span class="ekg-meas-lbl">P-R-T Axes</span><span class="ekg-meas-val">${m.axes||'—'}</span></div>
        </div>`;
      }

      // Interpretation findings
      if(p.ekg.interp&&p.ekg.interp.length){
        h+=`<div class="ekg-findings">`;
        p.ekg.interp.forEach(line=>{
          const isAbn=line.includes('ABNORMAL')||line.includes('INFARCT')||line.includes('HYPERTROPHY')||line.includes('ENLARGEMENT')||line.includes('DEVIATION')||line.includes('IS NEW');
          const isNote=line.includes('COMPARED')||line.includes('NO SIGNIFICANT CHANGE');
          const cls=isAbn?'ekg-finding-abn':isNote?'ekg-finding-note':'ekg-finding-norm';
          const icon=isAbn?'⚠':isNote?'📋':'✓';
          h+=`<div class="ekg-finding ${cls}"><span>${icon}</span><span>${esc(line)}</span></div>`;
        });
        h+=`</div>`;
      }

      // Confirmed by
      if(p.ekg.confirmedBy){
        h+=`<div class="ekg-confirmed">Confirmed by: ${esc(p.ekg.confirmedBy)} on ${esc(p.ekg.confDate||'')}</div>`;
      }
      h+=`</div>`;
    }

    // Abnormal workflow
    if(p.ekg.abn&&p.ekg.cardiacClr===null){
      h+=`<div style="margin-top:10px;padding:12px;background:var(--yellowB);border-radius:8px;border:1px solid #fbbf24;">
        <div style="font-size:12px;font-weight:700;color:var(--yellow);margin-bottom:8px;">⚠ Abnormal EKG — Does this require cardiac clearance?</div>
        <div style="display:flex;gap:8px;">
          <button class="btn p" onclick="event.stopPropagation();setEKGClr(${p.id},true)">Yes — Require Cardiac Clearance</button>
          <button class="btn" onclick="event.stopPropagation();setEKGClr(${p.id},false)">No — Clearance Not Required</button>
        </div>
      </div>`;
    } else if(p.ekg.abn&&p.ekg.cardiacClr!==null){
      if(p.ekg.cardiacClr){
        h+=`<div style="margin-top:6px;font-size:11px;color:var(--yellow);font-weight:600;">→ Cardiac clearance required and added to Clearances</div>`;
      } else {
        h+=`<div style="margin-top:6px;font-size:11px;color:var(--green);font-weight:600;">✓ Reviewed — Cardiac clearance not required</div>`;
      }
    }
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();uploadEKG(${p.id})">📷 Replace EKG Photo</button></div>`;
  }
  return h;
}

// DAY-OF MEDICATION HOLD REMINDERS
// ═══════════════════════════════════════════════════════════════════════════════

function calcHoldDates(p){
  const surgDate=new Date(p.surgDate+'T06:00:00');
  const results=[];
  p.meds.forEach(med=>{
    const m=mInfo(med);
    if(m.holdDays===undefined||m.holdDays===null)return;
    if(m.ac==='continue'||m.ac==='must_take')return;
    const holdDate=new Date(surgDate.getTime()-m.holdDays*86400000);
    holdDate.setHours(0,0,0,0);
    results.push({
      med:med,cls:m.cls,holdDays:m.holdDays,holdDate:holdDate,
      holdDateStr:holdDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
      holdDateISO:holdDate.toISOString().split('T')[0],
      instruction:m.pre,action:m.ac
    });
  });
  results.sort((a,b)=>a.holdDate-b.holdDate);
  return results;
}

function checkHoldReminders(){
  const today=new Date();today.setHours(0,0,0,0);
  const todayISO=today.toISOString().split('T')[0];
  let sent=0;
  P.forEach(p=>{
    if(!p.holdRem) p.holdRem={};
    const holds=calcHoldDates(p);
    holds.forEach(h=>{
      const key=h.med+'_'+h.holdDateISO;
      const dayBefore=new Date(h.holdDate.getTime()-86400000);
      const dayBeforeISO=dayBefore.toISOString().split('T')[0];
      if(!p.holdRem[key]?.sent && (todayISO===h.holdDateISO || todayISO===dayBeforeISO)){
        const isToday=todayISO===h.holdDateISO;
        p.holdRem[key]={sent:true,date:todayISO,msg:(isToday?'TODAY':'TOMORROW')+': Stop '+h.med};
        agentLogEntry('sms_patient',p.id,'hold_reminder',
          `Hold Reminder: ${isToday?'TODAY':'TOMORROW'} — ${h.med} (${h.instruction})`,p.phone);
        sent++;
      }
    });
  });
  return sent;
}

function sendHoldReminder(pid,med,holdDateISO){
  const p=findP(pid);if(!p)return;
  if(!p.holdRem)p.holdRem={};
  const key=med+'_'+holdDateISO;
  const today=new Date().toISOString().split('T')[0];
  const m=mInfo(med);
  p.holdRem[key]={sent:true,date:today,msg:'Stop '+med+'. '+m.pre};
  agentLogEntry('sms_patient',pid,'hold_reminder','Hold Reminder (manual): '+med+' — '+m.pre,p.phone);
  render();
}

function pnCerner(p){
  if(!isHospPt(p)) return`<div class="dp-t">Cerner <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div><div style="padding:12px;font-size:11px;color:var(--t3);">This patient is scheduled at an ASC. Cerner transmission is not required.</div>`;

  if(!p.cerner) p.cerner={};
  const keys=Object.keys(CERNER_DOCS);
  const sentCount=keys.filter(k=>p.cerner[k]?.sent).length;
  const allSent=sentCount===keys.length;

  let h=`<div class="dp-t">Cerner Transmission <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;

  h+=`<div class="cer-header-bar">
    <div>
      <div style="font-size:11px;font-weight:700;color:#2563eb;">📤 Send to Cerner — Northside Hospital ${esc(p.surgSite?.loc||'')}</div>
      <div style="font-size:9px;color:var(--t3);margin-top:2px;">${sentCount}/${keys.length} documents transmitted${allSent?' — All complete':''}</div>
    </div>
    <div style="display:flex;gap:6px;">
      ${!allSent?`<button class="cer-send-btn" onclick="event.stopPropagation();cernerSendAllReady(${p.id})">📤 Send All Ready</button>`:''}
    </div>
  </div>`;

  keys.forEach(k=>{
    const doc=CERNER_DOCS[k];
    const sent=p.cerner[k]?.sent;
    const sentDate=p.cerner[k]?.date;
    const ready=doc.gate(p);

    let statusHtml;
    if(sent){
      statusHtml=`<div class="cer-sent-tag">✓ Sent ${sentDate||''}</div>
        <button class="cer-send-btn" onclick="event.stopPropagation();cernerResend(${p.id},'${k}')" style="font-size:8px;padding:2px 6px;border-color:var(--border);background:#fff;color:var(--t3);">↻ Resend</button>`;
    } else if(ready){
      statusHtml=`<button class="cer-send-btn" onclick="event.stopPropagation();cernerSend(${p.id},'${k}')">📤 Send to Cerner</button>`;
    } else {
      statusHtml=`<span style="font-size:9px;color:var(--t4);font-style:italic;">${esc(doc.gateLabel)}</span>`;
    }

    const iconBg=sent?'#dcfce7':ready?'#dbeafe':'#f1f5f9';
    h+=`<div class="cer-doc">
      <div class="cer-doc-info">
        <div class="cer-doc-icon" style="background:${iconBg};">${doc.icon}</div>
        <div>
          <div class="cer-doc-name">${esc(doc.name)}</div>
          <div class="cer-doc-sub">${sent?'Transmitted to Cerner':ready?'Ready to send':'Prerequisite not met'}</div>
        </div>
      </div>
      <div class="cer-doc-status">${statusHtml}</div>
    </div>`;
  });

  return h;
}

function cernerSend(pid,key){
  const p=findP(pid);if(!p||!isHospPt(p))return;
  const doc=CERNER_DOCS[key];if(!doc)return;
  if(!doc.gate(p)){alert(doc.gateLabel);return;}
  if(!p.cerner)p.cerner={};
  const now=new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"});
  p.cerner[key]={sent:true,date:now};
  agentLogEntry('auto_action',pid,key,`Cerner: ${doc.name} transmitted to Northside ${p.surgSite?.loc||''}`,'Cerner EMR');
  render();
}

function cernerResend(pid,key){
  const p=findP(pid);if(!p||!isHospPt(p))return;
  const doc=CERNER_DOCS[key];if(!doc)return;
  const now=new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"});
  p.cerner[key]={sent:true,date:now};
  agentLogEntry('auto_action',pid,key,`Cerner: ${doc.name} RE-SENT to Northside ${p.surgSite?.loc||''}`,'Cerner EMR');
  render();
}

function cernerSendAllReady(pid){
  const p=findP(pid);if(!p||!isHospPt(p))return;
  if(!p.cerner)p.cerner={};
  const now=new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"});
  let sent=0;
  Object.entries(CERNER_DOCS).forEach(([k,doc])=>{
    if(!p.cerner[k]?.sent&&doc.gate(p)){
      p.cerner[k]={sent:true,date:now};
      sent++;
    }
  });
  if(sent) agentLogEntry('auto_action',pid,'',`Cerner: Batch sent ${sent} document(s) to Northside ${p.surgSite?.loc||''}`,'Cerner EMR');
  render();
}

// CLEARANCE INTELLIGENCE — AI ANALYSIS ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

const CLR_CAT_LABELS={site:"FACILITY",risk:"RISK LEVEL",cond:"CONDITIONAL",test:"TESTING",med:"MEDICATION",concern:"CONCERN",deny:"NOT CLEARED",anes:"ANESTHESIA",clear:"CLEARED"};
const CLR_CAT_COLORS={site:{bg:"#fce7f3",c:"#be185d"},risk:{bg:"#fef3c7",c:"#d97706"},cond:{bg:"#fff7ed",c:"#ea580c"},test:{bg:"#ede9fe",c:"#7c3aed"},med:{bg:"#dbeafe",c:"#2563eb"},concern:{bg:"#fef2f2",c:"#dc2626"},deny:{bg:"#fecaca",c:"#991b1b"},anes:{bg:"#fce7f3",c:"#9333ea"},clear:{bg:"#dcfce7",c:"#16a34a"}};

function analyzeClrText(text,clrType){
  if(!text)return[];
  const t=text.toLowerCase();
  const findings=[];
  // DENY
  if(t.includes("not clear")||t.includes("defer surgery")||t.includes("postpone")||t.includes("cannot clear")||t.includes("do not proceed")||t.includes("surgery not recommended"))
    findings.push({sev:"critical",cat:"deny",text:"Provider has NOT cleared patient for surgery"});
  // HOSPITAL / SITE
  if(t.includes("hospital setting")||t.includes("inpatient")||t.includes("not appropriate for asc")||t.includes("not asc candidate"))
    findings.push({sev:"critical",cat:"site",text:"Provider recommends hospital setting rather than ASC"});
  if(t.includes("overnight")&&(t.includes("monitor")||t.includes("observation")||t.includes("recommend")))
    findings.push({sev:"critical",cat:"site",text:"Overnight monitoring recommended post-operatively"});
  if(t.includes("home oxygen")||t.includes("home o2")||t.includes("supplemental oxygen"))
    findings.push({sev:"critical",cat:"site",text:"Home O2 use — may not be appropriate for ASC discharge"});
  // RISK
  if(t.includes("high risk")||t.includes("high surgical risk")||t.includes("significant risk"))
    findings.push({sev:"warning",cat:"risk",text:"Provider designates patient as HIGH surgical risk"});
  if(t.match(/asa\s*(class\s*)?(iv|4)/))
    findings.push({sev:"critical",cat:"risk",text:"ASA Class IV — consider postponing or hospital only"});
  if(t.match(/asa\s*(class\s*)?(iii|3)/))
    findings.push({sev:"warning",cat:"risk",text:"ASA Class III — moderate-high surgical risk"});
  // CARDIAC
  if(t.match(/ef\s*[<≤]\s*4[05]|ejection fraction.*?[<≤]\s*4[05]|ef\s*(of\s*)?[23]\d%/))
    findings.push({sev:"critical",cat:"concern",text:"Reduced ejection fraction (<40-45%)"});
  if(t.includes("recent mi")||t.includes("recent myocardial")||t.includes("heart attack"))
    findings.push({sev:"critical",cat:"concern",text:"Recent MI — evaluate timing relative to surgery"});
  if(t.includes("unstable angina"))
    findings.push({sev:"critical",cat:"deny",text:"Unstable angina — surgery should be deferred"});
  if(t.includes("aortic stenosis")||t.includes("severe as"))
    findings.push({sev:"critical",cat:"concern",text:"Aortic stenosis — may require valve eval before surgery"});
  if(t.includes("afib")||t.includes("atrial fibrillation")||t.includes("a-fib"))
    findings.push({sev:"warning",cat:"concern",text:"Atrial fibrillation — verify anticoagulation bridging plan"});
  if(t.includes("pacemaker")||t.includes("aicd")||t.includes("defibrillator"))
    findings.push({sev:"warning",cat:"anes",text:"Cardiac device — notify anesthesia, have magnet available"});
  if(t.includes("stent"))
    findings.push({sev:"warning",cat:"concern",text:"History of cardiac stent — verify dual antiplatelet status"});
  // PULMONARY
  if(t.includes("copd")||t.includes("emphysema"))
    findings.push({sev:"warning",cat:"concern",text:"COPD — post-op respiratory monitoring needed"});
  if(t.includes("sleep apnea")||t.includes("cpap")||t.includes("osa"))
    findings.push({sev:"warning",cat:"anes",text:"Sleep apnea/OSA — patient must bring CPAP, monitor post-sedation"});
  // BLEEDING
  if(t.includes("bleeding risk")||t.includes("coagulopathy")||t.includes("bleeding disorder"))
    findings.push({sev:"warning",cat:"concern",text:"Elevated bleeding risk — ensure type & screen, blood available"});
  if(t.includes("bridge")||t.includes("bridging"))
    findings.push({sev:"warning",cat:"med",text:"Anticoagulation bridging required — verify detailed protocol"});
  if(t.match(/hold\s*(warfarin|coumadin)/))
    findings.push({sev:"warning",cat:"med",text:"Hold warfarin pre-op — check INR morning of surgery"});
  if(t.match(/hold\s*(eliquis|xarelto|pradaxa)/))
    findings.push({sev:"warning",cat:"med",text:"Hold DOAC pre-op — verify timing per protocol"});
  if(t.includes("dvt")||t.includes("pulmonary embolism")||t.includes("deep vein"))
    findings.push({sev:"warning",cat:"concern",text:"History of DVT/PE — enhanced VTE prophylaxis may be needed"});
  // ENDOCRINE
  if(t.match(/a1c\s*[>≥]\s*8/)||t.includes("uncontrolled diabetes")||t.includes("poorly controlled"))
    findings.push({sev:"critical",cat:"concern",text:"Uncontrolled diabetes (A1c >8) — optimize before surgery"});
  if(t.includes("hold metformin")||t.includes("stop metformin"))
    findings.push({sev:"warning",cat:"med",text:"Hold metformin 48hrs pre-op, resume when eating normally"});
  if(t.includes("insulin")&&(t.includes("adjust")||t.includes("reduce")||t.includes("half")))
    findings.push({sev:"warning",cat:"med",text:"Insulin dose adjustment required peri-operatively"});
  // RENAL
  if(t.match(/gfr\s*[<≤]\s*30/)||t.includes("ckd stage 4")||t.includes("ckd stage 5")||t.includes("dialysis"))
    findings.push({sev:"critical",cat:"concern",text:"Advanced kidney disease — adjust meds, nephrology clearance"});
  if(t.match(/ckd|chronic kidney/)&&!t.includes("stage 4")&&!t.includes("stage 5"))
    findings.push({sev:"warning",cat:"concern",text:"CKD — adjust NSAID use post-op, monitor renal function"});
  // HEPATIC
  if(t.includes("cirrhosis")||t.includes("liver disease"))
    findings.push({sev:"critical",cat:"concern",text:"Liver disease — evaluate coagulation and bleeding risk"});
  // TESTING
  if(t.includes("recommend echo")||t.includes("echocardiogram")||t.includes("order echo"))
    findings.push({sev:"warning",cat:"test",text:"Echocardiogram recommended — obtain before proceeding"});
  if(t.includes("stress test")||t.includes("cardiac stress"))
    findings.push({sev:"warning",cat:"test",text:"Cardiac stress test recommended"});
  if(t.includes("pft")||t.includes("pulmonary function"))
    findings.push({sev:"warning",cat:"test",text:"PFTs recommended — verify pulmonary status"});
  // CONDITIONAL
  if(t.includes("conditional")||t.includes("contingent")||t.includes("cleared pending")||t.includes("cleared if"))
    findings.push({sev:"warning",cat:"cond",text:"Conditional clearance — review conditions before proceeding"});
  // ANESTHESIA
  if(t.includes("difficult airway")||t.includes("difficult intubation"))
    findings.push({sev:"critical",cat:"anes",text:"Difficult airway documented — alert anesthesia team"});
  if(t.includes("malignant hyperthermia"))
    findings.push({sev:"critical",cat:"anes",text:"Malignant hyperthermia history — dantrolene must be available"});
  if(t.includes("latex allergy"))
    findings.push({sev:"warning",cat:"anes",text:"Latex allergy — ensure latex-free OR setup"});
  // FALLBACK CLEAR
  if(!findings.length&&(t.includes("cleared")||t.includes("approved")||t.includes("no contraindication")))
    findings.push({sev:"info",cat:"clear",text:"Cleared for surgery — no significant concerns noted"});
  return findings;
}

function clrAlertLevel(p){
  let worst="none";
  Object.values(p.clrs).forEach(c=>{
    if(!c.findings)return;
    c.findings.forEach(f=>{
      if(f.sev==="critical")worst="critical";
      else if(f.sev==="warning"&&worst!=="critical")worst="warning";
    });
  });
  return worst;
}

function clrAlerts(p){
  const alerts=[];
  Object.entries(p.clrs).forEach(([k,c])=>{
    if(!c.findings)return;
    c.findings.filter(f=>f.sev==="critical"||f.sev==="warning").forEach(f=>{
      alerts.push({clr:CLR_N[k]||k,doc:c.doc||'',sev:f.sev,cat:f.cat,text:f.text});
    });
  });
  return alerts;
}

function renderFindings(findings){
  if(!findings||!findings.length)return'';
  let h='<div style="margin:4px 0 4px 28px;">';
  findings.forEach(f=>{
    const cls=f.sev==='critical'?'clr-find-crit':f.sev==='warning'?'clr-find-warn':'clr-find-info';
    const icon=f.sev==='critical'?'🔴':f.sev==='warning'?'🟡':'🟢';
    const cc=CLR_CAT_COLORS[f.cat]||{bg:'#f1f5f9',c:'#64748b'};
    h+=`<div class="clr-find ${cls}"><span class="clr-find-icon">${icon}</span><span class="clr-find-cat" style="background:${cc.bg};color:${cc.c};">${CLR_CAT_LABELS[f.cat]||f.cat}</span><span>${esc(f.text)}</span></div>`;
  });
  h+='</div>';
  return h;
}

  let h=`<div class="dp-t">Medications (${p.meds.length}) <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  h+=`<table class="mt"><thead><tr><th>Medication</th><th>Class</th><th>Action</th><th>Pre-Op</th><th>Hold Status</th><th>Restart</th><th></th></tr></thead><tbody>`;
