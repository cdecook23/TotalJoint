  sorted.forEach(med=>{
    const m=mInfo(med);
    const acMap={must_take:["ab-mt","MUST TAKE"],continue:["ab-c","CONTINUE"],hold:["ab-h","HOLD"],stop:["ab-s","STOP"],per_specialist:["ab-ps","PER SPEC"],review:["ab-rv","REVIEW"]};
    const[acC,acL]=acMap[m.ac]||["ab-rv","REVIEW"];
    const mh=p.medH[med];
    let hsH='<span style="color:var(--t4);font-size:8px;">—</span>';
    if(mh){
      if(!mh.sent) hsH=`<span class="hs hs-n">Not Sent</span>`;
      else if(!mh.ack) hsH=`<span class="hs hs-s">Sent</span>`;
      else hsH=`<span class="hs hs-a">✓ Ack</span>`;
      if(mh.sp===true) hsH+=` <span class="hs hs-a">✓ Bridge</span>`;
      else if(mh.sp===false) hsH+=` <span class="hs hs-n">Bridge TBD</span>`;
    }
    h+=`<tr>
      <td style="font-weight:600;">${esc(med)}</td>
      <td style="font-size:9px;color:var(--t3);">${esc(m.cls)}</td>
      <td><span class="${acC}" style="padding:1px 5px;border-radius:3px;font-size:8px;font-weight:700;">${acL}</span></td>
      <td style="font-size:9px;">${esc(m.pre)}</td>
      <td>${hsH}</td>
      <td style="font-size:9px;color:var(--t3);">${esc(m.restart||'—')}</td>
      <td style="text-align:right;"><button class="btn s" onclick="event.stopPropagation();editMed(${p.id},'${esc(med)}')" title="Edit">✏️</button><button class="btn rm" onclick="event.stopPropagation();removeMed(${p.id},'${esc(med)}')" title="Remove">✕</button></td>
    </tr>`;
  });
  h+=`</tbody></table>`;
  h+=`</tbody></table>`;

  // ── Hold Reminder Calendar ──
  const holds=calcHoldDates(p);
  if(holds.length){
    if(!p.holdRem)p.holdRem={};
    const today=new Date();today.setHours(0,0,0,0);
    const todayISO=today.toISOString().split('T')[0];

    h+=`<div class="hold-cal">`;
    h+=`<div class="hold-cal-title">📅 Medication Hold Calendar — Day-of SMS Reminders</div>`;

    holds.forEach(hld=>{
      const key=hld.med+'_'+hld.holdDateISO;
      const sent=p.holdRem[key]?.sent;
      const isToday=todayISO===hld.holdDateISO;
      const isPast=today>hld.holdDate;
      const rowCls=isToday?'hold-item-today':isPast?'hold-item-past':'hold-item-future';

      let smsHtml;
      if(sent){
        smsHtml=`<div class="hold-sms-sent">✓ SMS sent ${p.holdRem[key].date||''}</div>`;
      } else if(isToday||isPast){
        smsHtml=`<button class="hold-sms-btn" onclick="event.stopPropagation();sendHoldReminder(${p.id},'${esc(hld.med)}','${hld.holdDateISO}')">📱 Send Now</button>`;
      } else {
        const daysUntil=Math.round((hld.holdDate-today)/86400000);
        smsHtml=`<span style="font-size:8px;color:var(--t4);">Auto-sends in ${daysUntil}d</span>`;
      }

      h+=`<div class="hold-item ${rowCls}">
        <div class="hold-item-date">${isToday?'⚡ TODAY':hld.holdDateStr}</div>
        <div class="hold-item-med">${esc(hld.med)}</div>
        <div class="hold-item-instr">${esc(hld.instruction)}</div>
        <div class="hold-item-sms">${smsHtml}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();addMed(${p.id})">+ Add Medication</button>
    <button class="btn p" onclick="event.stopPropagation();sendMedInstr(${p.id})" style="margin-left:auto;">📱 Send Medication Instructions</button></div>`;
  return h;
}

function pnHP(p){
  let h=`<div class="dp-t">History & Physical <button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div>`;
  if(p.hp?.st==="signed"){
    h+=`<div class="ck"><div class="ci g">✓</div><div class="ct"><strong>H&P Signed — ${esc(p.hp.date||'')}</strong><span>Within 30 days of surgery ✓</span></div></div>`;
    h+=`<div class="dp-ft"><button class="btn" onclick="event.stopPropagation();startHP(${p.id})">📄 View / Edit</button></div>`;
  } else if(p.hp?.st==="draft"){
    h+=`<div class="ck"><div class="ci y">✏</div><div class="ct"><strong>Draft — not signed</strong></div></div>`;
    h+=`<div class="dp-ft"><button class="btn p" onclick="event.stopPropagation();startHP(${p.id})">✏ Continue H&P</button></div>`;
  } else {
    h+=`<div class="ck"><div class="ci r">✕</div><div class="ct"><strong>H&P not started</strong><span>Required within 30 days of surgery</span></div></div>`;
    h+=`<div class="dp-ft"><button class="btn p" onclick="event.stopPropagation();startHP(${p.id})">＋ Start H&P</button></div>`;
  }
  return h;
}


// ═══════ ORDERS PANEL (PP1265 Pre-Op / PP1264 Post-Op) ═══════
function pnOrders(p){
  const kg=wt_kg(p);
  const ancefDose=kg>=120?pv("abx","ancef_gt120")||3:pv("abx","ancef_lt120")||2;
  const vancoDose=kg>=85?pv("abx","vanco_gt85")||1.5:pv("abx","vanco_lt85")||1;
  const crVal=parseFloat((p.labs?.bmp?.vals||"").match(/Cr\s*([\d.]+)/)?.[1])||0;
  const toradolDose=crVal>=1.2?15:30;
  const pre=p.orders?.pre||{st:"none"};
  const post=p.orders?.post||{st:"none"};
  const mrsa=p.orders?.mrsa||false;
  const pcn=p.orders?.pcn_allergy||false;
  const preSigned=pre.st==="signed";
  const postSigned=post.st==="signed";
  const preId="ord_pre_"+p.id;
  const postId="ord_post_"+p.id;

  let h=`<div class="dp-t">Physician Orders
    <div style="display:flex;gap:6px;align-items:center;">`;
  if(preSigned&&postSigned){
    if(p.orders?.asc_sent) h+=`<span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--purpleL);color:var(--purple);">✓ Sent to ASC</span>`;
    else h+=`<button class="btn s" style="background:var(--purpleL);border-color:var(--purple);color:var(--purple);" onclick="event.stopPropagation();sendOrdersASC(${p.id})">🏥 Send to ASC</button>`;
  }
  h+=`<button class="dp-x" onclick="delete openPn[${p.id}];render()">✕</button></div></div>`;

  // ═══ PRE-OP ORDERS (PP1265) ═══
  h+=`<div class="ord-wrap">`;
  h+=`<div class="ord-form">`;
  h+=`<div class="ord-form-h"><div><div class="ord-form-t">Pre-Operative Orders</div><div class="ord-form-sub">PP1265 (TJS) · Rev. 02/15/2024</div></div>`;
  if(preSigned) h+=`<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--greenB);color:var(--green);">✓ Signed ${pre.date||''}</span>`;
  else if(pre.st==="draft") h+=`<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--yellowB);color:var(--yellow);">Draft</span>`;
  h+=`</div>`;
  h+=`<div class="ord-form-b">`;

  // 1. Antibiotic Prophylaxis
  h+=`<div class="ord-sec-h">1. Antibiotic Prophylaxis</div>`;
  h+=`<div class="orow"><label><input type="checkbox" id="${preId}_mrsa" ${mrsa?'checked':''} ${preSigned?'disabled':''} onchange="toggleMRSA(${p.id},this.checked)"> H/O MRSA if checked. Give both Ancef and Vancomycin.</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> Cefazolin (Ancef) ${ancefDose}g IV x 1. Begin infusion within 60 min prior to incision.</label></div>`;
  h+=`<div class="orow sub" style="margin-left:28px;font-size:9px;color:var(--t3);">Patient: ${p.wt_lb} lbs (${kg} kg) → ${kg>=120?'≥120kg: '+ancefDose+'g':'<120kg: '+ancefDose+'g'}</div>`;
  h+=`<div class="orow"><label><input type="checkbox" id="${preId}_pcn" ${pcn?'checked':''} ${preSigned?'disabled':''} onchange="togglePCN(${p.id},this.checked)"> <strong>PCN allergy</strong>: Give test dose first.</label>${pcn?'<span class="warn">⚠ PCN ALLERGY</span>':''}</div>`;
  h+=`<div class="orow sub" style="margin-left:28px;font-size:9px;">May add vancomycin to cefazolin (Ancef) for history of MRSA</div>`;
  h+=`<div class="orow sub" style="margin-left:28px;font-size:9px;color:var(--t4);">If severe allergy to Cephalosporins (anaphylaxis, pharyngeal swelling, hives), use vancomycin.</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> Vancomycin ${vancoDose}g (${kg>=85?'≥':'<'}85kg) IV over 90 min x 1 dose pre-op within 120 min prior</label></div>`;

  // 2. VTE Prophylaxis
  h+=`<div class="ord-sec-h">2. VTE Prophylaxis</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> TED Stockings</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> SCD</label></div>`;

  // 3. Surgical Skin Preparation
  h+=`<div class="ord-sec-h">3. Surgical Skin Preparation</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> Standard hip or knee hair removal by clippers</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> Full body cleanse with SAGE 2% CHG cloth AND intranasal Providone/Iodine</label></div>`;

  // 4. Anesthesia
  h+=`<div class="ord-sec-h">4. Anesthesia</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> Consult Anesthesia for Regional Nerve Block</label></div>`;

  // 5. TXA
  h+=`<div class="ord-sec-h">5. Tranexamic Acid</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${preSigned?'disabled':''}> TXA ${pv("intraop","txa_iv")||1}g IV x 1 dose</label></div>`;

  // Additional Orders
  h+=`<div class="ord-sec-h">Additional Orders</div>`;
  h+=`<div class="orow"><textarea style="width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:10px;font-family:inherit;resize:vertical;min-height:28px;" placeholder="Additional pre-op orders…" ${preSigned?'disabled':''}>${esc(p.orders?.addl||'')}</textarea></div>`;

  // Signature
  if(preSigned){
    h+=`<div class="ord-sig ord-sig-done" style="justify-content:space-between;">✓ Signed by ${esc(p.prov)} — ${esc(pre.date)}<button class="btn" onclick="event.stopPropagation();unsignOrder(${p.id},'pre')" style="font-size:9px;padding:2px 8px;border-color:var(--yellow);color:var(--yellow);background:#fff;">🔓 Unsign</button></div>`;
  } else {
    h+=`<div style="margin-top:10px;"><button class="btn p" onclick="event.stopPropagation();signSingleOrder(${p.id},'pre')" style="width:100%;">✍ Sign Pre-Op Orders</button></div>`;
  }
  h+=`</div></div>`;

  // ═══ POST-OP ORDERS (PP1264) ═══
  h+=`<div class="ord-form">`;
  h+=`<div class="ord-form-h"><div><div class="ord-form-t">Post-Operative Orders</div><div class="ord-form-sub">PP1264 (TJS) · Rev. 03/21/2024</div></div>`;
  if(postSigned) h+=`<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--greenB);color:var(--green);">✓ Signed ${post.date||''}</span>`;
  else if(post.st==="draft") h+=`<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--yellowB);color:var(--yellow);">Draft</span>`;
  h+=`</div>`;
  h+=`<div class="ord-form-b">`;

  // 1. Vital Signs
  h+=`<div class="ord-sec-h">1. Vital Signs</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Q5min x3 → Q15min x2 → Q30min x2 → Q1hr x2 → Q4hr until d/c</label></div>`;

  // 2. Dressing
  h+=`<div class="ord-sec-h">2. Dressing</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> AquaCel in place at discharge. DO NOT CHANGE UNLESS &gt;75% SATURATED.</label></div>`;

  // 3. Nutrition
  h+=`<div class="ord-sec-h">3. Nutrition</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Advance as tolerated</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Blood Glucose Monitoring: Per Protocol</label></div>`;

  // 4. IV Fluids
  h+=`<div class="ord-sec-h">4. IV Fluids</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Bolus NS 500cc over 30 min, then LR at 150cc/hr. After 4hr adjust to 75cc/hr.</label></div>`;

  // 5. Bladder
  h+=`<div class="ord-sec-h">5. Bladder</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> No Foley. Bladder Scan if unable to void in 2 hours, notify physician.</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Rapaflo 8mg PO qd</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Rapaflo 4mg PO qd if CrCl 30-50</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Urecholine 10 mg q1h until response</label></div>`;

  // 6. Ice
  h+=`<div class="ord-sec-h">6. Ice Therapy</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Ice Therapy (PRN)</label></div>`;

  // 7. PT
  h+=`<div class="ord-sec-h">7. Physical Therapy</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Total ${p.proc.includes("tka")?"Knee":"Hip"} Physical Therapy Evaluation & Treatment</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Exercises per PT</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> WBAT</label></div>`;

  // 8. Pain Management
  h+=`<div class="ord-sec-h">8. Pain Management</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Acetaminophen 1000 mg PO x 1 dose</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Patient is to receive no other acetaminophen containing products</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Oxycodone 5-10 mg PO Q4H prn pain. Or Tramadol 50-150 mg PO if allergic to oxycodone.</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Robaxin 750 mg POX 1 for mild pain</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Dilaudid 0.2 mg IV x 1 for severe pain</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Toradol ${toradolDose} mg IV x 1 dose ${crVal>=1.2?'(Cr '+crVal+' ≥ 1.2 → 15mg)':'(Cr '+(crVal||'?')+' < 1.2 → 30mg)'}</label>${crVal>=1.2?'<span class="warn">⚠ Renal</span>':''}</div>`;

  // 9. Nausea
  h+=`<div class="ord-sec-h">9. Medications / Nausea</div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Zofran 4 mg IV x 1 dose</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> May D/C patient when discharge criteria met</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Educate VTE prophylaxis as ordered</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" checked ${postSigned?'disabled':''}> Educate Bowel Regimen as ordered</label></div>`;

  // 10. Discharge Meds
  const ibuDose=pv("postop_rx","ibu_dose")||800;
  const lyricaDose=pv("postop_rx","lyrica_dose")||75;
  const dexDose=pv("postop_rx","dex_dose")||4;
  const omnicefDose=pv("postop_rx","omnicef_dose")||300;
  const oxyHip=pv("postop_rx","oxy_hip")||10;
  const oxyKnee=pv("postop_rx","oxy_knee")||30;
  const asaDose=pv("postop_rx","asa_dose")||81;
  const isKnee=p.proc.includes('tka');

  h+=`<div class="ord-sec-h">10. Medications AFTER Discharge (HC Rx)</div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Tylenol (acetaminophen) 1000 mg PO Q8H prn mild to moderate pain</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Ibuprofen ${ibuDose} mg PO Q8H prn mild to moderate pain</label>${crVal>=1.3?'<span class="alert">⚠ Cr ≥1.3 — consider Celecoxib</span>':''}</div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Lyrica ${lyricaDose} mg PO @ bedtime</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Oxycodone 5-10 mg prn pain (${isKnee?'Knee: '+oxyKnee+' tabs':'Hip: '+oxyHip+' tabs'})</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Protonix 40 mg daily</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Aspirin ${asaDose} mg PO twice for 6 weeks</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Decadron ${dexDose} mg PO start night of surgery then Q12H until done</label></div>`;
  h+=`<div class="orow"><label><input type="checkbox" ${postSigned?'disabled':''}> Cefdinir ${omnicefDose} mg BID x 7 days start night of surgery</label></div>`;

  // Signature
  if(postSigned){
    h+=`<div class="ord-sig ord-sig-done" style="justify-content:space-between;">✓ Signed by ${esc(p.prov)} — ${esc(post.date)}<button class="btn" onclick="event.stopPropagation();unsignOrder(${p.id},'post')" style="font-size:9px;padding:2px 8px;border-color:var(--yellow);color:var(--yellow);background:#fff;">🔓 Unsign</button></div>`;
  } else {
    h+=`<div style="margin-top:10px;"><button class="btn p" onclick="event.stopPropagation();signSingleOrder(${p.id},'post')" style="width:100%;">✍ Sign Post-Op Orders</button></div>`;
  }
  h+=`</div></div>`;
  h+=`</div>`; // close ord-wrap

  // Footer buttons
  h+=`<div class="dp-ft">`;
  if(!preSigned||!postSigned){
    if(pre.st!=="signed") h+=`<button class="btn" onclick="event.stopPropagation();saveOrders(${p.id},'pre','draft')">💾 Save Pre-Op Draft</button>`;
    if(post.st!=="signed") h+=`<button class="btn" onclick="event.stopPropagation();saveOrders(${p.id},'post','draft')">💾 Save Post-Op Draft</button>`;
  } else if(!p.orders?.asc_sent){
    h+=`<button class="btn" style="background:var(--purpleL);border-color:var(--purple);color:var(--purple);margin-left:auto;" onclick="event.stopPropagation();sendOrdersASC(${p.id})">🏥 Send to ASC</button>`;
  }
  h+=`</div>`;
  return h;
}

function unsignOrder(id,which){
  const p=findP(id);if(!p||!p.orders)return;
  p.orders[which]={st:"draft",date:null};
  if(p.orders.asc_sent) p.orders.asc_sent=false;
  render();
}
function signSingleOrder(id,which){
  const p=findP(id);if(!p||!p.orders)return;
  const label=which==='pre'?'Pre-Operative':'Post-Operative';
  showModal("Sign "+label+" Orders",`
    <p>Sign <strong>${label} Orders</strong> for <strong>${esc(p.f)} ${esc(p.l)}</strong>?</p>
    <p style="font-size:10px;color:var(--t3);">This will lock the order set. Changes require a new order.</p>
    <div style="margin-top:8px;"><div class="field"><label>Signing Physician</label><input value="Dr. ${esc(p.prov)}" id="ordSignDoc"></div></div>
  `,[{l:"Cancel"},{l:"✍ Sign Orders",p:true,action:`doSignSingle(${id},'${which}')`}]);
}
function doSignSingle(id,which){
  const p=findP(id);if(!p||!p.orders)return;
  const d=new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"});
  p.orders[which]={st:"signed",date:d};
  closeModal();render();
}

function editSurgeon(id){
  const p=findP(id);if(!p)return;
  const opts=SURGEONS.map(s=>{
    const last=s.split(' ').pop();
    return `<option value="${s}" ${p.prov===last||p.prov===s?'selected':''}>${s}</option>`;
  }).join('');
  showModal(`Change Surgeon — ${esc(p.f)} ${esc(p.l)}`,`
    <div class="field"><label>Surgeon</label>
      <select id="edSurg" style="font-size:13px;padding:8px;">${opts}</select>
    </div>
    <p style="font-size:10px;color:var(--t4);margin-top:8px;">This will update the surgeon for all consents, orders, and H&P for this patient.</p>
  `,[{l:"Cancel"},{l:"Save",p:true,action:`doEditSurgeon(${id})`}]);
}
function doEditSurgeon(id){
  const p=findP(id);if(!p)return;
  const full=document.getElementById("edSurg").value;
  // Store last name as prov (matching existing pattern), but also store full name
  p.provFull=full;
  p.prov=full.split(' ').pop();
  closeModal();render();
}

function editProcedure(id){
  const p=findP(id);if(!p)return;
  const sideOpts=SIDES.map(s=>`<option value="${s}" ${p.side===s?'selected':''}>${s}</option>`).join('');
  const procOpts=Object.entries(PROC_TYPES).map(([k,v])=>`<option value="${k}" ${p.proc===k?'selected':''}>${v.name} — ${v.full}</option>`).join('');
  showModal(`Change Procedure — ${esc(p.f)} ${esc(p.l)}`,`
    <div style="display:flex;gap:12px;">
      <div class="field" style="flex:1;"><label>Side</label>
        <select id="edSide" style="font-size:13px;padding:8px;">${sideOpts}</select>
      </div>
      <div class="field" style="flex:2;"><label>Procedure</label>
        <select id="edProc" style="font-size:13px;padding:8px;">${procOpts}</select>
      </div>
    </div>
    <p style="font-size:10px;color:var(--t4);margin-top:8px;">This will update the procedure across all consents, H&P, and instruction packets.</p>
  `,[{l:"Cancel"},{l:"Save",p:true,action:`doEditProcedure(${id})`}]);
}
function doEditProcedure(id){
  const p=findP(id);if(!p)return;
  p.side=document.getElementById("edSide").value;
  p.proc=document.getElementById("edProc").value;
  closeModal();render();
}

function editSurgSite(id){
  const p=findP(id);if(!p)return;
  const ss=p.surgSite||{type:"asc",loc:""};
  const ascOpts=SURG_SITES.asc.map(l=>`<option value="${l}" ${ss.type==='asc'&&ss.loc===l?'selected':''}>${l}</option>`).join('');
  const hospOpts=SURG_SITES.hosp.map(l=>`<option value="${l}" ${ss.type==='hosp'&&ss.loc===l?'selected':''}>${l}</option>`).join('');
  showModal(`Surgery Site — ${esc(p.f)} ${esc(p.l)}`,`
    <div class="field"><label>Facility Type</label>
      <select id="ssType" onchange="document.getElementById('ssLocAsc').style.display=this.value==='asc'?'block':'none';document.getElementById('ssLocHosp').style.display=this.value==='hosp'?'block':'none';">
        <option value="asc" ${ss.type==='asc'?'selected':''}>ASC (Ambulatory Surgery Center)</option>
        <option value="hosp" ${ss.type==='hosp'?'selected':''}>Hospital</option>
      </select>
    </div>
    <div class="field" id="ssLocAsc" style="display:${ss.type==='asc'?'block':'none'};"><label>ASC Location</label>
      <select id="ssLocAscSel">${ascOpts}</select>

function genLinkCode(pid,k){
  const key=pid+'_'+k;
  if(!CLR_LINKS[key]){
    const chars='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let code='';for(let i=0;i<8;i++)code+=chars[Math.floor(Math.random()*chars.length)];
    CLR_LINKS[key]={code:code,created:new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"}),sent:[]};
  }
  return CLR_LINKS[key];
}

function editMed(id,med){showModal(`Edit — ${med}`,`<div class="field"><label>Pre-Op Instruction</label><input value="${esc(mInfo(med).pre)}"></div><div class="field"><label>Action</label><select><option>Continue</option><option>Hold</option><option>Must Take</option><option>Stop</option><option>Per Specialist</option></select></div>`,[{l:"Cancel"},{l:"Save",p:true}]);}
function removeMed(id,med){const p=findP(id);if(!p)return;p.meds=p.meds.filter(m=>m!==med);delete p.medH[med];render();}
function addMed(id){showModal("Add Medication",`<div class="field"><label>Medication Name</label><input placeholder="e.g. Lisinopril 20mg"></div>`,[{l:"Cancel"},{l:"Add",p:true}]);}
function sendMedInstr(id){const p=findP(id);if(!p)return;showModal("Send Medication Instructions",`<p>Send medication instructions to <strong>${esc(p.f)} ${esc(p.l)}</strong>.</p><div style="margin:8px 0;padding:8px;background:#f8fafc;border-radius:6px;border:1px solid var(--border);max-height:160px;overflow-y:auto;">${p.meds.map(m=>{const i=mInfo(m);return`<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;"><span>${esc(m)}</span><span style="color:var(--t4);">${esc(i.pre)}</span></div>`;}).join('')}</div>`,[{l:"Cancel"},{l:"📱 Send Instructions",p:true}]);}

function sendReminder(id){const p=findP(id);if(!p)return;const items=[];["cbc","bmp","ptinr","ua","ts"].forEach(k=>{if(!p.labs[k]?.done)items.push(`Lab: ${LAB_N[k]}`);});if(!p.ekg?.done)items.push("EKG");Object.entries(p.clrs).forEach(([k,c])=>{if(c.need&&!c.done)items.push(`Clearance: ${CLR_N[k]}`);});Object.entries(p.cons).forEach(([k,c])=>{if(!c.signed)items.push(`Consent: ${CON_N[k]}`);});if(p.cls?.st!=="done")items.push("Pre-Op Class");if(!p.instr?.sent)items.push("Surgery Instructions (PP1254)");if(p.orders?.pre?.st!=="signed"||p.orders?.post?.st!=="signed")items.push("Physician Orders (PP1265/PP1264)");showModal("Send Reminder",`<p>Remind <strong>${esc(p.f)} ${esc(p.l)}</strong> (${esc(p.phone)}):</p><div style="margin:8px 0;padding:8px;background:#f8fafc;border-radius:6px;border:1px solid var(--border);max-height:160px;overflow-y:auto;">${items.length?items.map(i=>`<div style="font-size:11px;padding:2px 0;display:flex;gap:4px;"><span style="color:var(--red);">✕</span>${esc(i)}</div>`).join(''):'<div style="color:var(--green);font-size:11px;">✓ All complete</div>'}</div>`,[{l:"Cancel"},{l:"📱 Send",p:true}]);}

function showMsg(id){const p=findP(id);if(!p)return;showModal("Message Patient",`<p>To <strong>${esc(p.phone)}</strong>:</p><div class="field"><textarea id="mt" rows="3" placeholder="Message…"></textarea></div><div style="display:flex;gap:4px;flex-wrap:wrap;"><button class="btn s" onclick="document.getElementById('mt').value='Hi ${esc(p.f)}, this is Total Joint Specialists. We still need some items before your surgery. Please call (770) 555-1000.'">Missing Items</button><button class="btn s" onclick="document.getElementById('mt').value='Hi ${esc(p.f)}, reminder: nothing to eat/drink after midnight before surgery.'">NPO</button><button class="btn s" onclick="document.getElementById('mt').value='Hi ${esc(p.f)}, please confirm your caregiver for surgery day. Reply YES to confirm.'">Caregiver</button></div>`,[{l:"Cancel"},{l:"Send",p:true}]);}

// ═══════ H&P NOTE ═══════
function startHP(id){
  const p=findP(id);if(!p)return;
  const b=bmi(p);
  const signed=p.hp?.st==="signed";
  const ro=signed?'readonly':'';
  const procInfo=PROC_TYPES[p.proc]||PROC_TYPES.other;
  const joint=p.proc.includes('tka')?'knee':'hip';
  const isKnee=p.proc.includes('tka');

  // ── Auto-populate ──
  const cc=p.cc||`${p.side} ${joint} pain`;
  const hpi=p.hpData?.hpi||`This is a ${p.age}-year-old presenting for pre-operative evaluation complaining of ${p.side.toLowerCase()} ${joint} pain that started gradually. Pain is an aching located in the ${joint==='hip'?'groin and radiating to the leg':'medial compartment, worsening with stairs'}. Daily activities impacted include walking, bending, transitioning positions, climbing stairs and sleeping. Patient denies previous ${p.side.toLowerCase()} ${joint} surgery.\nPrevious treatments for ${p.side.toLowerCase()} ${joint} pain include activity modifications and over-the-counter medications relief from pain.\n\nThe patient was seen and examined by Dr. ${p.prov} and decision was made for ${p.side.toLowerCase()} ${procInfo.full.toLowerCase()}. Patient presents today for pre-operative evaluation. A 14 point review of systems was conducted with patient, no new systemic complaints/concerns.\n\nBMI is ${b}${b>=BMI_GATE?' (exceeds threshold)':''}. ${p.a1c?'HgA1C is '+p.a1c.val+'%'+(p.a1c.val>=A1C_GATE?' (exceeds threshold)':' (within limits)')+'.':''}`;

  const pmhList=p.meds.map(m=>{const i=mInfo(m);return i.cls!=='\u2014'?i.cls:null;}).filter(Boolean);
  const pmhUniq=[...new Set(pmhList)];
  const pmhText=p.hpData?.pmh||pmhUniq.join('\n')||'None reported';
  const pshText=p.hpData?.psh||(p.psh||[]).join('\n')||'None reported';
  const medList=p.meds.map(m=>`${m} \u2014 ${mInfo(m).pre}`).join('\n');
  const allergyText=p.hpData?.allergies||(p.allergies||[]).map(a=>`${a.drug} (${a.reaction||'Unknown'})`).join('\n')||'NKDA';
  const fhxText=p.hpData?.fhx||p.fhx||'Non-contributory';
  const shxObj=p.shx||{};
  const shxText=p.hpData?.shx||`Alcohol: ${shxObj.alcohol||'None reported'}\nTobacco: ${shxObj.tobacco||'None reported'}\nHome/Environment: ${shxObj.home||'Not documented'}\nSubstance Abuse: ${shxObj.substance||'Never'}\nPsychosocial: ${shxObj.psychosocial||'No concerns'}`;
  const rosText=p.hpData?.ros||Object.entries(ROS_DEFAULTS).map(([k,v])=>`${k.toUpperCase()}: ${v}`).join('\n');
  const mskExam=`MSK: Focused attention to ${p.side.toLowerCase()} ${joint} exam reveals:\n  Inspection/Palpation: no tenderness to palpation, No incisions, No swelling\n  Leg lengths appear Equal\n\n  ROM: ${isKnee?'limited flexion/extension with pain':'severely limited range of motion with pain'}\n\n  Tests and signs: ${isKnee?'no pain with log roll, no joint instability':'no pain with log roll, Trendelenburg sign absent'}\n  Strength: Flexion ${isKnee?'5/5, Extension 5/5':'5/5, Abduction 5/5'}  Stability: no joint instability`;
  const peText=p.hpData?.pe||`Gen.: ${PE_DEFAULTS.gen}\nPsychiatric: ${PE_DEFAULTS.psych}\nHEENT: ${PE_DEFAULTS.heent}\nCardiovascular: ${PE_DEFAULTS.cv}\nRespiratory: ${PE_DEFAULTS.resp}\nAbdomen: ${PE_DEFAULTS.abd}\nGU: ${PE_DEFAULTS.gu}\n${mskExam}\nSkin: ${PE_DEFAULTS.skin}\nSensation: ${PE_DEFAULTS.sensation}\nReflexes: ${PE_DEFAULTS.reflexes}\nLymphatic: ${PE_DEFAULTS.lymphatic}\nVascular: ${PE_DEFAULTS.vascular}`;
  const vitalsText=p.hpData?.vitals||`Body Mass Index Measured: ${b} kg/m2\nHeight/Length: ${p.ht_in?Math.round(p.ht_in*2.54)+' cm':''}\nWeight Measured: ${p.wt_lb?Math.round(p.wt_lb*0.4536)+' kg':''}`;
  const imagingText=p.hpData?.imaging||p.imaging||'Not yet obtained';
  const labArr=["cbc","bmp","ptinr","ua","ts"].map(k=>{const l=p.labs[k];return l?.done?`${LAB_N[k]}: ${l.vals||'Normal'}`:null;}).filter(Boolean);
  if(p.a1c) labArr.push(`HgA1C: ${p.a1c.val}% drawn ${p.a1c.date}`);
  if(p.ekg?.done) labArr.push(`EKG (${p.ekg.date}): ${p.ekg.note||'Normal sinus rhythm'}`);
  const labSummary=p.hpData?.labs||labArr.join('\n');
  const clrComplete=Object.values(p.clrs).filter(c=>c.need&&!c.done).length===0;
  const impressionText=p.hpData?.impression||`Osteoarthritis ${p.side} ${joint.charAt(0).toUpperCase()+joint.slice(1)}\n1. Pre-op exam \u2014 ${p.surgDate}\n\n${pmhUniq.join('\n')}`;
  const planText=p.hpData?.plan||`${p.side} ${procInfo.full} by Dr. ${p.prov} at ${p.surgSite?.loc||'TBD'} on ${p.surgDate}.\nToday, I reviewed with the patient the nature of the procedure, preoperative planning and paperwork, postoperative recuperation anticipated, as well as the risks, benefits, and alternatives to surgical plan. The patient conferred understanding and informed consent was obtained. Preoperative medical clearance through TJS preoperative clinic.\n\nPostoperative plan:\n1. Disposition: Home the same day of surgery in the care of ${p.cg?p.cg.name+' ('+p.cg.rel+')':'caregiver \u2014 PENDING'}.\n2. Deep venous thrombosis prophylaxis: Aspirin 81 mg twice daily for 6 weeks starting postop day 1.\n3. Pain prophylaxis: Supplement with over-the-counter acetaminophen and oxycodone, ibuprofen, Decadron, Protonix and ${p.orders?.pcn_allergy?'doxycycline':'cephalexin'} to be dispensed by home care pharmacy.\n4. Physical therapy: Force\n5. The patient will be seen in 6 weeks for post-operative evaluation.\n6. Functional Capacity Goal for Patient: To walk without pain\n7. Pre-op Education of Patient and Care Partner completed prior to surgery: ${p.cls?.st==='done'?'Yes':'Pending'}`;

  // ── Build ──
  let signedBanner='';
  if(signed) signedBanner=`<div style="margin-bottom:12px;padding:8px 12px;background:var(--greenL);border:1px solid var(--green);border-radius:6px;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:11px;font-weight:700;color:var(--green);">\u2713 H&P Signed \u2014 ${esc(p.hp.date||'')}</span><button class="btn" onclick="unsignHP(${id})" style="font-size:10px;border-color:var(--yellow);color:var(--yellow);">\ud83d\udd13 Unsign to Edit</button></div>`;

  let body=signedBanner;
  body+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);">
    <div><div style="font-size:14px;font-weight:700;">${esc(p.l)}, ${esc(p.f)}</div>
    <div style="font-size:10px;color:var(--t4);">${esc(p.mrn)} \u00b7 DOB: ${p.dob||''} \u00b7 ${p.age}yo \u00b7 ${p.side} ${procInfo.name} \u00b7 Surgery: ${p.surgDate}</div></div>
    <div style="text-align:right;font-size:10px;color:var(--t3);">
      <div><strong>Provider:</strong> PA/NP</div>
      <div><strong>Surgeon:</strong> Dr. ${esc(p.prov)}</div>
      <div><strong>Location:</strong> ${esc(p.surgSite?.loc||p.loc||'')}</div>
    </div>
  </div>`;

  const sMap={
    cc:()=>`<div class="hp-section"><h4>Chief Complaint</h4><div class="hp-field"><textarea rows="1" id="hp_cc" ${ro}>${esc(cc)}</textarea></div></div>`,
    hpi:()=>`<div class="hp-section"><h4>HPI</h4><div class="hp-field"><textarea rows="8" id="hp_hpi" ${ro}>${esc(hpi)}</textarea></div></div>`,
    narc:()=>`<div class="hp-section"><h4>Chronic Narcotics Attestation</h4><div style="font-size:11px;padding:6px 10px;background:#f8fafc;border-radius:6px;border:1px solid var(--border);">Patient has been on chronic narcotics for greater than 90 days prior to surgery: <strong>${p.chronicNarc?'Yes':'No'}</strong></div></div>`,
    pmh:()=>`<div class="hp-section"><h4>Past Medical History</h4><div class="hp-field"><textarea rows="${Math.max(3,pmhUniq.length+1)}" id="hp_pmh" ${ro}>${esc(pmhText)}</textarea></div></div>`,
    psh:()=>`<div class="hp-section"><h4>Past Surgical History</h4><div class="hp-field"><textarea rows="${Math.max(3,(p.psh||[]).length+1)}" id="hp_psh" ${ro}>${esc(pshText)}</textarea></div></div>`,
    meds:()=>`<div class="hp-section"><h4>Medications</h4><div style="font-size:9px;color:var(--t4);margin-bottom:4px;">Auto-populated from Medication Reconciliation</div><div class="hp-field"><textarea rows="${Math.max(4,p.meds.length)}" id="hp_meds" ${ro}>${esc(medList)}</textarea></div></div>`,
    allergies:()=>`<div class="hp-section"><h4>Allergies</h4><div class="hp-field"><textarea rows="2" id="hp_allg" ${ro}>${esc(allergyText)}</textarea></div></div>`,
    fhx:()=>`<div class="hp-section"><h4>Family Medical History</h4><div class="hp-field"><textarea rows="3" id="hp_fhx" ${ro}>${esc(fhxText)}</textarea></div></div>`,
    shx:()=>`<div class="hp-section"><h4>Social History</h4><div class="hp-field"><textarea rows="5" id="hp_shx" ${ro}>${esc(shxText)}</textarea></div></div>`,
    ros:()=>`<div class="hp-section"><h4>Review of Systems</h4><div style="font-size:9px;color:var(--t4);margin-bottom:4px;">14-point ROS \u2014 charting by exception, all systems normal unless edited</div><div class="hp-field"><textarea rows="10" id="hp_ros" ${ro}>${esc(rosText)}</textarea></div></div>`,
    pe:()=>`<div class="hp-section"><h4>Physical Examination</h4><div style="font-size:9px;color:var(--t4);margin-bottom:4px;">Charting by exception \u2014 normal defaults with focused MSK exam</div><div class="hp-field"><textarea rows="14" id="hp_pe" ${ro}>${esc(peText)}</textarea></div></div>`,
    vitals:()=>`<div class="hp-section"><h4>Vitals</h4><div class="hp-field"><textarea rows="3" id="hp_vitals" ${ro}>${esc(vitalsText)}</textarea></div></div>`,
    imaging:()=>`<div class="hp-section"><h4>Diagnostic Imaging Studies</h4><div class="hp-field"><textarea rows="2" id="hp_img" ${ro}>${esc(imagingText)}</textarea></div></div>`,
    labs:()=>`<div class="hp-section"><h4>Laboratory Data</h4><div style="font-size:9px;color:var(--t4);margin-bottom:4px;">Auto-populated from Labs &amp; EKG</div><div class="hp-field"><textarea rows="5" id="hp_labs" ${ro}>${esc(labSummary)}</textarea></div></div>`,
    impression:()=>`<div class="hp-section"><h4>Impression</h4><div class="hp-field"><textarea rows="4" id="hp_imp" ${ro}>${esc(impressionText)}</textarea></div></div>`,
    plan:()=>`<div class="hp-section"><h4>Plan</h4><div class="hp-field"><textarea rows="12" id="hp_plan" ${ro}>${esc(planText)}</textarea></div></div>`
  };
  ACTIVE_HP_SECTIONS.forEach(k=>{if(sMap[k])body+=sMap[k]();});

  let buttons;
  if(signed) buttons=[{l:"Close",action:`closeModal();document.getElementById('modal').className='md';`}];
  else buttons=[{l:"Cancel",action:`closeModal();document.getElementById('modal').className='md';`},{l:"Save Draft",action:`doSaveHP(${id},'draft')`},{l:"\u270d Sign H&P",p:true,action:`doSaveHP(${id},'signed')`}];
  document.getElementById("modal").className="md hp-modal";
  showModal(`History & Physical \u2014 ${esc(p.f)} ${esc(p.l)}`, body, buttons);
}
function unsignHP(id){
  const p=findP(id);if(!p)return;
  p.hp={st:"draft",date:p.hp?.date||null};
  closeModal();document.getElementById("modal").className="md";
  render();
  setTimeout(()=>startHP(id),100);
}

function doSaveHP(id,st){
  const p=findP(id);if(!p)return;
  const g=i=>document.getElementById(i)?.value||'';
  p.hpData={hpi:g('hp_hpi'),pmh:g('hp_pmh'),psh:g('hp_psh'),allergies:g('hp_allg'),fhx:g('hp_fhx'),shx:g('hp_shx'),ros:g('hp_ros'),pe:g('hp_pe'),vitals:g('hp_vitals'),imaging:g('hp_img'),labs:g('hp_labs'),impression:g('hp_imp'),plan:g('hp_plan')};
  if(g('hp_cc')) p.cc=g('hp_cc');
  p.hp={st:st,date:new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"})};
  closeModal();document.getElementById("modal").className="md";render();
}

const HP_SECTIONS={cc:{name:"Chief Complaint",auto:true},hpi:{name:"HPI",auto:true},narc:{name:"Chronic Narcotics Attestation",auto:true},pmh:{name:"Past Medical History",auto:true},psh:{name:"Past Surgical History",auto:false},meds:{name:"Medications",auto:true},allergies:{name:"Allergies",auto:false},fhx:{name:"Family Medical History",auto:false},shx:{name:"Social History",auto:false},ros:{name:"Review of Systems",auto:true},pe:{name:"Physical Examination",auto:true},vitals:{name:"Vitals",auto:true},imaging:{name:"Diagnostic Imaging Studies",auto:false},labs:{name:"Laboratory Data",auto:true},impression:{name:"Impression",auto:true},plan:{name:"Plan",auto:true}};
let ACTIVE_HP_SECTIONS=["cc","hpi","narc","pmh","psh","meds","allergies","fhx","shx","ros","pe","vitals","imaging","labs","impression","plan"];

const ROS_DEFAULTS={constitutional:"No weight loss, fever, chills, weakness or fatigue.",heent:"No visual loss, blurred vision, double vision or yellow sclerae. No hearing loss, sneezing, congestion, runny nose or sore throat.",skin:"No rash or itching.",cardiovascular:"No chest pain, chest pressure or chest discomfort. No palpitations or edema.",respiratory:"No shortness of breath, cough or sputum.",gi:"No anorexia, nausea, vomiting or diarrhea. No abdominal pain or blood.",gu:"No dysuria, frequency or urgency.",neuro:"No headache, dizziness, syncope, paralysis, ataxia, numbness or tingling in the extremities. No change in bowel or bladder control.",msk:"No muscle, back pain, joint pain or stiffness.",heme:"No anemia, bleeding or bruising.",lymphatic:"No enlarged nodes. No history of splenectomy.",psych:"No history of depression or anxiety.",endocrine:"No reports of sweating, cold or heat intolerance. No polyuria or polydipsia.",allergic:"No history of asthma, hives, eczema or rhinitis."};

const PE_DEFAULTS={gen:"Awake and alert in no acute distress. Able to answer and follow commands.",psych:"Mood/affect appropriate.",heent:"Normocephalic atraumatic, pupils equal round and reactive to light and accommodation. Neck supple and soft.",cv:"Regular rate and rhythm, no murmurs, rebounds, gallops or clicks.",resp:"Clear to auscultation bilaterally.",abd:"Soft, nontender, nondistended.",gu:"Not performed.",skin:"No erythema present, no ecchymosis.",sensation:"Sensation intact to light touch.",reflexes:"Patellar tendon reflex 2+, ankle reflex 2+.",lymphatic:"No lymphadenopathy present.",vascular:"Extremity well perfused, no edema, with no calf pain, no varicosities."};

function openHPSettings(){renderHPSettings();document.getElementById("hpTplOv").classList.add("open");}
function closeHPSettings(){document.getElementById("hpTplOv").classList.remove("open");}
function renderHPSettings(){
  const md=document.getElementById("hpTplMd");
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;">
    <h2 style="font-size:15px;font-weight:800;margin:0;">🩺 H&P Template Configuration</h2>
    <button class="md-x" onclick="closeHPSettings()">✕</button>
  </div><div style="padding:20px;overflow-y:auto;">
    <p style="font-size:11px;color:var(--t3);margin-bottom:14px;">Configure which sections appear in the History & Physical. Sections marked <strong>AUTO</strong> are pre-populated from patient data. All sections are editable.</p>
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Active Sections (${ACTIVE_HP_SECTIONS.length})</div>`;
  ACTIVE_HP_SECTIONS.forEach(k=>{const s=HP_SECTIONS[k];if(!s)return;
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;">
      <div style="cursor:grab;color:var(--t4);font-size:14px;">☰</div>
      <div style="flex:1;"><span style="font-size:11px;font-weight:600;">${esc(s.name)}</span>${s.auto?'<span style="font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;background:#dcfce7;color:#16a34a;margin-left:6px;">AUTO</span>':''}</div>
      <button class="btn rm" onclick="removeHPSection('${k}')" style="color:var(--red);">✕</button>
    </div>`;
  });
  const inactive=Object.keys(HP_SECTIONS).filter(k=>!ACTIVE_HP_SECTIONS.includes(k));
  if(inactive.length){
    h+=`<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;">Available to Add</div>`;
    inactive.forEach(k=>{const s=HP_SECTIONS[k];
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px dashed var(--border);border-radius:8px;margin-bottom:4px;opacity:0.7;">
        <div style="flex:1;font-size:11px;font-weight:600;">${esc(s.name)}</div>
        <button class="btn p" onclick="addHPSection('${k}')" style="font-size:10px;">+ Add</button>
      </div>`;
    });
  }
  h+=`</div>`;md.innerHTML=h;
}
function removeHPSection(k){ACTIVE_HP_SECTIONS=ACTIVE_HP_SECTIONS.filter(x=>x!==k);renderHPSettings();}
function addHPSection(k){if(!ACTIVE_HP_SECTIONS.includes(k))ACTIVE_HP_SECTIONS.push(k);renderHPSettings();}

// ═══════════════════════════════════════════════════════════════════════════════

const AGENT_CFG={
  // Per-tier schedule (weeks before surgery)
  tier1_start:6,   // Initiation begins
  tier1_hard:4,    // Initiation hard deadline
  tier2_start:4,   // Chase begins
  tier2_hard:2,    // Chase hard deadline
  tier3_start:2,   // Close Out begins
  tier3_hard:1,    // Close Out hard deadline
  tier4_start:1,   // Final Verification begins
  tier4_hard_hrs:48, // Final Verification hard stop (hours)
  // SMS settings
  reminderDaysPatient:3,
  reminderDaysProv:5,
  maxReminders:5,
  businessStart:8,
  businessEnd:20,
  // Autonomous mode
  autoRun:true,
};

// Global activity log
const AGENT_LOG=[];
function agentLogEntry(type,pid,key,msg,to){
  AGENT_LOG.unshift({
    ts:new Date().toISOString(),
    type:type,   // sms_patient, sms_prov, auto_action, escalation, init
    pid:pid,
    key:key,
    msg:msg,
    to:to||'',
    pt:findP(pid)? `${findP(pid).l}, ${findP(pid).f}`:''
  });
  // Cap log at 500
  if(AGENT_LOG.length>500)AGENT_LOG.length=500;
}

// Item definitions: targetFn/hardFn compute from AGENT_CFG
function tierTarget(t){return t===1?-AGENT_CFG.tier1_start*7:t===2?-AGENT_CFG.tier2_start*7:t===3?-AGENT_CFG.tier3_start*7:-AGENT_CFG.tier4_start*7;}
function tierHard(t){return t===4?-Math.ceil(AGENT_CFG.tier4_hard_hrs/24):t===1?-AGENT_CFG.tier1_hard*7:t===2?-AGENT_CFG.tier2_hard*7:-AGENT_CFG.tier3_hard*7;}

const AGENT_ITEMS={
  // Tier 1 — Initiation
  clr_request:{tier:1,label:"Request Clearances",cat:"prov",check:p=>{const need=Object.values(p.clrs).filter(c=>c.need);return need.length===0||need.some(c=>c.done||c.requested);},detail:p=>{const need=Object.values(p.clrs).filter(c=>c.need&&!c.done);return need.length?`${need.length} clearance(s) not yet requested`:'All requested';}},
  cons_send:{tier:1,label:"Send Consent Packets",cat:"patient",check:p=>Object.values(p.cons).some(c=>c.signed)||p.cons._sent,detail:p=>{const un=Object.values(p.cons).filter(c=>!c.signed).length;return un?`${un} unsigned consent(s)`:'Sent';}},
  labs_order:{tier:1,label:"Order Labs",cat:"internal",check:p=>["cbc","bmp","ptinr","ua","ts"].some(k=>p.labs[k]?.done),detail:p=>{const d=["cbc","bmp","ptinr","ua","ts"].filter(k=>p.labs[k]?.done).length;return `${d}/5 labs completed`;}},
  ekg_order:{tier:1,label:"Order EKG",cat:"internal",check:p=>p.ekg?.done,detail:p=>p.ekg?.done?`Done ${p.ekg.date}`:'EKG not ordered/completed'},
  instr_send:{tier:1,label:"Send Instructions",cat:"patient",check:p=>p.instr?.sent,detail:p=>p.instr?.sent?`Sent ${p.instr.sentDate}`:'Instructions not sent'},
  class_sched:{tier:1,label:"Schedule Pre-op Class",cat:"patient",check:p=>p.cls?.st==="done"||p.cls?.st==="scheduled",detail:p=>p.cls?.st==="done"?'Completed':p.cls?.st==="scheduled"?`Scheduled ${p.cls.date}`:'Not scheduled'},

  // Tier 2 — Chase
  clr_recv:{tier:2,label:"All Clearances Received",cat:"prov",check:p=>{const need=Object.values(p.clrs).filter(c=>c.need);return need.length===0||need.every(c=>c.done);},detail:p=>{const need=Object.values(p.clrs).filter(c=>c.need);const pend=need.filter(c=>!c.done);if(!pend.length)return'All received';return pend.map(c=>CLR_N[Object.keys(p.clrs).find(k=>p.clrs[k]===c)]||'?').join(', ')+' pending';}},
  cons_signed:{tier:2,label:"All Consents Signed",cat:"patient",check:p=>Object.values(p.cons).every(c=>c.signed),detail:p=>{const un=Object.values(p.cons).filter(c=>!c.signed).length;return un?`${un} still unsigned`:'All signed';}},
  labs_done:{tier:2,label:"All Labs Completed",cat:"internal",check:p=>["cbc","bmp","ptinr","ua","ts"].every(k=>p.labs[k]?.done),detail:p=>{const miss=["cbc","bmp","ptinr","ua","ts"].filter(k=>!p.labs[k]?.done);return miss.length?miss.map(k=>LAB_N[k]).join(', ')+' missing':'All complete';}},
  ekg_interp:{tier:2,label:"EKG Interpreted",cat:"prov",check:p=>p.ekg?.done&&(p.ekg.interp?.length>0||!p.ekg.abn||(p.ekg.abn&&p.ekg.cardiacClr!==null)),detail:p=>{if(!p.ekg?.done)return'EKG not done';if(p.ekg.abn&&p.ekg.cardiacClr===null)return'Abnormal — needs cardiac clearance decision';return p.ekg.interp?p.ekg.interp[0]:'Interpreted';}},
  med_holds:{tier:2,label:"Med Hold Instructions Sent",cat:"patient",check:p=>{const holds=Object.entries(p.medH);return holds.length===0||holds.every(([k,v])=>v.sent);},detail:p=>{const unsent=Object.entries(p.medH).filter(([k,v])=>!v.sent).length;return unsent?`${unsent} med hold(s) not sent`:'All sent';}},

  // Tier 3 — Close Out
  clr_review:{tier:3,label:"Clearance Findings Reviewed",cat:"internal",check:p=>{const al=typeof clrAlertLevel==='function'?clrAlertLevel(p):'none';return al==='none'||al==='info'||(p.clrReviewed===true);},detail:p=>{const al=typeof clrAlertLevel==='function'?clrAlertLevel(p):'none';if(al==='critical')return'CRITICAL findings need review';if(al==='warning')return'Warnings need review';return'No critical findings';}},
  site_confirm:{tier:3,label:"Surgery Site Confirmed",cat:"internal",check:p=>p.surgSite?.loc&&p.siteConfirmed!==false,detail:p=>p.surgSite?.loc?`${p.surgSite.type==='asc'?'ASC':'Hospital'}: ${p.surgSite.loc}`:'Not assigned'},
  hp_sign:{tier:3,label:"H&P Signed",cat:"internal",check:p=>p.hp?.st==="signed",detail:p=>p.hp?.st==="signed"?`Signed ${p.hp.date}`:p.hp?.st==="draft"?'Draft — needs signature':'Not started'},
  orders_sign:{tier:3,label:"Orders Signed",cat:"internal",check:p=>p.orders?.pre?.st==="signed"&&p.orders?.post?.st==="signed",detail:p=>{const pre=p.orders?.pre?.st==="signed";const post=p.orders?.post?.st==="signed";if(pre&&post)return'Both signed';if(!pre&&!post)return'Neither signed';return pre?'Post-op not signed':'Pre-op not signed';}},
  class_done:{tier:3,label:"Pre-op Class Completed",cat:"patient",check:p=>p.cls?.st==="done",detail:p=>p.cls?.st==="done"?`Completed ${p.cls.date}`:p.cls?.st==="scheduled"?'Scheduled but not completed':'Not scheduled'},

  // Tier 3 — Cerner Transmission (hospital only)
  cerner_send:{tier:3,label:"Cerner Documents Sent",cat:"internal",check:p=>{if(!isHospPt(p))return true;if(!p.cerner)return false;return Object.keys(CERNER_DOCS).every(k=>p.cerner[k]?.sent);},detail:p=>{if(!isHospPt(p))return'ASC — not required';if(!p.cerner)return'0/6 sent to Cerner';const sent=Object.keys(CERNER_DOCS).filter(k=>p.cerner?.[k]?.sent).length;return sent===6?'All sent':''+sent+'/6 sent to Cerner';}},

  // Tier 3 — Hold reminders
  hold_reminders:{tier:3,label:"Hold Reminders Sent on Schedule",cat:"patient",check:p=>{const holds=typeof calcHoldDates==='function'?calcHoldDates(p):[];if(!holds.length)return true;if(!p.holdRem)return true;const today=new Date();today.setHours(0,0,0,0);const due=holds.filter(h=>h.holdDate<=today);return due.every(h=>p.holdRem[h.med+'_'+h.holdDateISO]?.sent);},detail:p=>{const holds=typeof calcHoldDates==='function'?calcHoldDates(p):[];if(!holds.length)return'No hold medications';const today=new Date();today.setHours(0,0,0,0);const due=holds.filter(h=>h.holdDate<=today);const sent=due.filter(h=>p.holdRem?.[h.med+'_'+h.holdDateISO]?.sent).length;if(!due.length){const next=holds[0];return'Next hold: '+next.med+' on '+next.holdDateStr;}return sent+'/'+due.length+' due reminders sent';}},

  // Tier 4 — Final Verification
  cg_confirm:{tier:4,label:"Caregiver Confirmed",cat:"patient",check:p=>p.cg?.conf,detail:p=>p.cg?.name?p.cg.conf?`Confirmed: ${p.cg.name} (${p.cg.rel})`:`${p.cg.name} — NOT confirmed`:'No caregiver assigned'},
  npo_confirm:{tier:4,label:"NPO Instructions Confirmed",cat:"patient",check:p=>p.npo?.conf,detail:p=>p.npo?.conf?'Confirmed':p.npo?.sent?'Sent but not confirmed':'Not sent'},
  med_ack:{tier:4,label:"All Med Holds Acknowledged",cat:"patient",check:p=>{const holds=Object.entries(p.medH);return holds.length===0||holds.every(([k,v])=>v.ack);},detail:p=>{const unack=Object.entries(p.medH).filter(([k,v])=>!v.ack).length;return unack?`${unack} med hold(s) not acknowledged`:'All acknowledged';}},
};

const TIER_LABELS={1:"Initiation",2:"Chase",3:"Close Out",4:"Final Verification"};
const TIER_COLORS={1:"#8b5cf6",2:"#f59e0b",3:"#3b82f6",4:"#ef4444"};

// Evaluate a single item for a patient
function agentEvalItem(p,key){
  const item=AGENT_ITEMS[key];if(!item)return null;
  const now=new Date();
  const surgDate=new Date(p.surgDate+'T06:00:00');
  const daysToSurg=Math.round((surgDate-now)/(86400000));
  const tgt=tierTarget(item.tier);
  const hrd=tierHard(item.tier);
  const targetDate=new Date(surgDate.getTime()+tgt*86400000);
  const hardDate=new Date(surgDate.getTime()+hrd*86400000);
  const daysToTarget=Math.round((targetDate-now)/86400000);
  const daysToHard=Math.round((hardDate-now)/86400000);
  const complete=item.check(p);
  const detail=item.detail(p);

  // Init reminder log
  if(!p._agLog) p._agLog={};
  if(!p._agLog[key]) p._agLog[key]={count:0,lastDate:null,escalated:false};
  const log=p._agLog[key];

  let priority,status;
  if(complete){
    priority=0;status="complete";
  } else if(daysToSurg<=3){
    priority=5;status="critical"; // Surgery imminent, item not done
  } else if(daysToHard<=0){
    priority=4;status="critical"; // Past hard deadline
  } else if(daysToTarget<=0){
    priority=3;status="overdue"; // Past target, before hard deadline
  } else if(daysToTarget<=5){
    priority=2;status="approaching"; // Within 5 days of target
  } else if(daysToSurg<=(AGENT_CFG.initWeeks*7)){
    priority=1;status="on_track"; // In workflow window, not yet approaching
  } else {
    priority=0;status="future"; // Not yet in workflow window
  }

  // Should we auto-send a reminder?
  let canAutoSend=false;
  if(!complete&&(status==="overdue"||status==="critical")){
    const interval=item.cat==="prov"?AGENT_CFG.reminderDaysProv:AGENT_CFG.reminderDaysPatient;
    const daysSinceLast=log.lastDate?Math.round((now-new Date(log.lastDate))/86400000):999;
    canAutoSend=log.count<AGENT_CFG.maxReminders&&daysSinceLast>=interval;
  }
  const needsEscalation=!complete&&log.count>=AGENT_CFG.maxReminders&&(status==="overdue"||status==="critical");

  return{key,item,complete,status,priority,daysToSurg,daysToTarget,daysToHard,detail,log,canAutoSend,needsEscalation,cat:item.cat,tier:item.tier};
}

// Evaluate all items for all patients
function agentRunAll(){
  const results=[];
  P.forEach(p=>{
    Object.keys(AGENT_ITEMS).forEach(key=>{
      const r=agentEvalItem(p,key);
      if(r&&r.status!=="complete"&&r.status!=="future")
        results.push({...r,p});
    });
  });
  // Sort: priority desc, then days to surgery asc
  results.sort((a,b)=>b.priority-a.priority||(a.daysToSurg-b.daysToSurg));
  return results;
}

// Get summary counts
function agentSummary(results){
  return{
    critical:results.filter(r=>r.status==="critical").length,
    overdue:results.filter(r=>r.status==="overdue").length,
    approaching:results.filter(r=>r.status==="approaching").length,
    onTrack:results.filter(r=>r.status==="on_track").length,
    escalated:results.filter(r=>r.needsEscalation).length,
    total:results.length
  };
}

// Send SMS action (autonomous — no human needed)
function agentSendSMS(pid,key,target,auto){
  const p=findP(pid);if(!p)return;
  if(!p._agLog) p._agLog={};
  if(!p._agLog[key]) p._agLog[key]={count:0,lastDate:null,escalated:false};
  p._agLog[key].count++;
  p._agLog[key].lastDate=new Date().toISOString();
  const item=AGENT_ITEMS[key];
  const toLabel=target==='patient'?p.phone:'Provider'+(Object.values(p.clrs).find(c=>c.doc)?' ('+Object.values(p.clrs).find(c=>c.doc).doc+')':'');
  const logType=target==='patient'?'sms_patient':'sms_prov';
  agentLogEntry(logType,pid,key,`${item?.label} — Reminder #${p._agLog[key].count}`,toLabel);
  if(!auto) renderAgentWorklist();
}

// Autonomous run — agent processes everything it can on its own
function agentAutoRun(){
  if(!AGENT_CFG.autoRun) return;
  const results=agentRunAll();
  let sent=0,escalated=0;

  results.forEach(r=>{
    // Auto-send eligible SMS
    if(r.canAutoSend){
      agentSendSMS(r.p.id,r.key,r.cat==='patient'?'patient':'prov',true);
      sent++;
    }
    // Auto-escalate items past max reminders
    if(r.needsEscalation&&!r.log.escalated){
      r.log.escalated=true;
      agentLogEntry('escalation',r.p.id,r.key,`${r.item.label} — ESCALATED after ${r.log.count} reminders with no resolution`,'PAC Lead');
      escalated++;
    }
  });

  let holdsSent=0;
  try{holdsSent=checkHoldReminders();}catch(e){}

  if(sent||escalated||holdsSent){
    agentLogEntry('auto_action',0,'',`Autonomous run complete: ${sent} SMS sent, ${escalated} escalations, ${holdsSent} hold reminders`,'System');
  }
  // Update badge
  try{
    const ar=agentRunAll();const as=agentSummary(ar);
    const critCount=as.critical+as.escalated;
    const bl=document.getElementById("agentBtnLabel");
    if(bl)bl.textContent=critCount?`Agent (${critCount})`:'Agent';
  }catch(e){}
}

// Manual send all
function agentSendAll(){
  const results=agentRunAll();
  let sent=0;
  results.forEach(r=>{
    if(r.canAutoSend){
      agentSendSMS(r.p.id,r.key,r.cat==='patient'?'patient':'prov',true);
      sent++;
    }
  });
  if(sent) agentLogEntry('auto_action',0,'',`Manual batch: ${sent} SMS sent`,'Coordinator');
  renderAgentWorklist();
}

  h+=`<div class="ag-tabs">
    <div class="ag-tab ${agentTab==='worklist'?'active':''}" onclick="setAgentTab('worklist')">Worklist <span class="ag-tab-badge" style="background:#fef2f2;color:#ef4444;">${sum.critical+sum.overdue}</span></div>
    <div class="ag-tab ${agentTab==='log'?'active':''}" onclick="setAgentTab('log')">Activity Log <span class="ag-tab-badge" style="background:#dbeafe;color:#2563eb;">${AGENT_LOG.length}</span></div>

    <div class="ag-stat" style="border-color:#f59e0b;"><div class="ag-stat-n" style="color:#f59e0b;">${sum.overdue}</div><div class="ag-stat-l">Overdue</div></div>

    <div class="ag-stat" style="border-color:#22c55e;"><div class="ag-stat-n" style="color:#22c55e;">${sum.onTrack}</div><div class="ag-stat-l">On Track</div></div>
    <div class="ag-stat" style="border-color:#dc2626;"><div class="ag-stat-n" style="color:#dc2626;">${sum.escalated}</div><div class="ag-stat-l">Escalated</div></div>
  </div>`;

  h+=`<div style="padding:0 0 20px;overflow-y:auto;">`;

  // Group by status
  const groups=[
    {key:"critical",label:"Critical — Needs Action Now",color:"#ef4444",bgColor:"#fef2f2",cls:"ag-item-crit"},
    {key:"overdue",label:"Overdue — Past Target Date",color:"#f59e0b",bgColor:"#fffbeb",cls:"ag-item-over"},
    {key:"approaching",label:"Approaching Deadline",color:"#3b82f6",bgColor:"#eff6ff",cls:"ag-item-appr"},
    {key:"on_track",label:"On Track — Monitoring",color:"#22c55e",bgColor:"#f0fdf4",cls:"ag-item-ok"}

  groups.forEach(g=>{

    h+=`<div class="ag-grp"><div class="ag-grp-hd">

    items.forEach(r=>{

      const escalateTag=r.needsEscalation?'<span style="font-size:8px;font-weight:800;padding:1px 6px;border-radius:10px;background:#fecaca;color:#991b1b;margin-left:6px;">ESCALATE</span>':'';

        actionBtn=r.canAutoSend
          ?`<button class="ag-sms-btn ag-sms-prov" onclick="event.stopPropagation();agentSendSMS(${r.p.id},'${r.key}','prov')">📱 Text Provider</button>`
          :`<button class="ag-sms-btn ag-sms-done" disabled>📱 Sent (${r.log.count})</button>`;
      } else if(r.cat==='internal'&&!r.complete){
        actionBtn=`<span style="font-size:9px;font-weight:600;color:var(--t3);">Staff action</span>`;
      }

      h+=`<div class="ag-item ${g.cls}" onclick="closeAgent();setTimeout(()=>{const el=document.querySelector('[data-pid=\\'${r.p.id}\\']');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});togglePn(${r.p.id},'${({'clr':'clrs','cons':'cons','labs':'labs','ekg':'ekg','med':'meds','hp':'hp','orders':'orders','instr':'instr','class':'class','cg':'bmi','npo':'bmi','site':'clrs','cerner':'cerner'}[r.key.split('_')[0]]||'')}');},200)">
        <div class="ag-days"><div class="ag-days-n" style="color:${dCol};">${r.daysToSurg}</div><div class="ag-days-l">days</div></div>
        <div class="ag-pt"><div class="ag-pt-name">${esc(r.p.l)}, ${esc(r.p.f)}</div><div class="ag-pt-sub">${r.p.side} ${procInfo.name} · Dr. ${esc(r.p.prov)} · ${r.p.surgDate}</div></div>

        </div>

        <div class="ag-actions">${actionBtn}</div>

    });
    h+=`</div>`;
  });

  if(!results.length){
    h+=`<div class="ag-empty">✅ All patients are on track. No action items today.</div>`;
  }

  h+=`</div>`;
  md.innerHTML=h;
}

// ── Agent Activity Log tab ──

  let h=headerHtml;
  h+=`<div style="padding:12px 20px;">`;
  if(!AGENT_LOG.length){
    h+=`<div class="ag-empty">No agent activity yet. The agent will log all actions here as it works.</div>`;
  } else {
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:10px;color:var(--t4);">${AGENT_LOG.length} entries</span>
      <button class="btn" onclick="AGENT_LOG.length=0;renderAgentWorklist();" style="font-size:9px;">Clear Log</button>
    </div>`;
    AGENT_LOG.forEach(e=>{
      const ts=new Date(e.ts);
      const timeStr=ts.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+ts.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

      const typeLabel=e.type==='sms_patient'?'SMS → Patient':e.type==='sms_prov'?'SMS → Provider':e.type==='escalation'?'Escalation':e.type==='auto_action'?'Auto Run':'Action';
      h+=`<div class="ag-log-item">
        <div class="ag-log-time">${esc(timeStr)}</div>
        <div class="ag-log-icon ${iconCls}">${icon}</div>
        <div class="ag-log-body">
          ${e.pt?`<div class="ag-log-pt">${esc(e.pt)}</div>`:''}

          ${e.to?`<div class="ag-log-to">To: ${esc(e.to)}</div>`:''}

function removeInstrPage(k){
  ACTIVE_INSTR=ACTIVE_INSTR.filter(x=>x!==k);

}

function addInstrPage(k){
  if(!ACTIVE_INSTR.includes(k))ACTIVE_INSTR.push(k);
  renderInstrSettings();
}

function addCustomInstrPage(){
  showModal("Add Custom Instruction Page",`
    <div class="field"><label>Key (unique, lowercase, no spaces)</label><input id="ciKey" placeholder="e.g. fall_prevention"></div>

  `,[{l:"Cancel"},{l:"Add",p:true,action:"doAddCustomInstrPage()"}]);
}

function doAddCustomInstrPage(){
  const k=document.getElementById("ciKey").value.trim().replace(/\s/g,'_').toLowerCase();
  const name=document.getElementById("ciName").value.trim();
  const desc=document.getElementById("ciDesc").value.trim();
  const cat=document.getElementById("ciCat").value;
  if(!k||!name){alert("Key and title are required.");return;}
  if(INSTR_ALL[k]){alert("A page with that key already exists.");return;}
  INSTR_ALL[k]={name:name,cat:cat,desc:desc};
  ACTIVE_INSTR.push(k);
  closeModal();
  renderInstrSettings();
}

function uploadInstrFile(k){
  showModal(`Upload — ${esc(INSTR_ALL[k]?.name||k)}`,`
    <p style="margin-bottom:10px;font-size:11px;">Upload the instruction page PDF or image for <strong>${esc(INSTR_ALL[k]?.name||k)}</strong>.</p>
    <div id="instrFUpArea" style="padding:24px;border:2px dashed var(--border);border-radius:10px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .15s;" onclick="document.getElementById('instrFInput').click()" ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='var(--blueL)';" ondragleave="this.style.borderColor='var(--border)';this.style.background='#fafbfc';" ondrop="event.preventDefault();this.style.borderColor='var(--border)';document.getElementById('instrFInput').files=event.dataTransfer.files;handleInstrFUp('${k}');">
      <div style="font-size:32px;margin-bottom:8px;">📄</div>
      <div style="font-size:12px;font-weight:600;color:var(--t1);">Select PDF or image</div>

      <input type="file" id="instrFInput" accept=".pdf,image/*" style="display:none;" onchange="handleInstrFUp('${k}')">
    </div>
    <div id="instrFPreview" style="display:none;margin-top:10px;text-align:center;"></div>
  `,[{l:"Cancel"},{l:"Save",p:true,action:`saveInstrFile('${k}')`}]);
}

function handleInstrFUp(k){
  const f=document.getElementById("instrFInput").files[0];
  if(!f)return;
  const prev=document.getElementById("instrFPreview");
  const area=document.getElementById("instrFUpArea");
  const r=new FileReader();
  r.onload=e=>{
    area.style.display="none";
    prev.style.display="block";
    if(f.type.startsWith("image/")){
      prev.innerHTML=`<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);"><div style="font-size:10px;color:var(--t3);margin-top:6px;">${esc(f.name)} · ${(f.size/1024).toFixed(0)} KB</div>`;
    } else {
      prev.innerHTML=`<div style="padding:16px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);"><div style="font-size:24px;">📄</div><div style="font-size:11px;font-weight:600;margin-top:4px;">${esc(f.name)}</div><div style="font-size:10px;color:var(--t4);">${(f.size/1024).toFixed(0)} KB</div></div>`;
    }
    prev.dataset.name=f.name;
    prev.dataset.size=f.size;
    prev.dataset.url=e.target.result;
  };
  r.readAsDataURL(f);
}

function saveInstrFile(k){
  const prev=document.getElementById("instrFPreview");
  if(prev?.dataset?.url){
    INSTR_FILES[k]={name:prev.dataset.name,size:parseInt(prev.dataset.size),dataUrl:prev.dataset.url};
  }
  closeModal();
  renderInstrSettings();
}
