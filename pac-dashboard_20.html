    sage_mrsa:`<div style="font-size:10px;color:var(--t2);line-height:1.6;"><p><strong>Sage Wipes:</strong> Night before surgery — shower, wait 1 hour, apply Sage wipes per instructions. Sleep in clean pajamas on clean sheets.</p><p style="margin-top:6px;"><strong>MRSA Protocol (if positive):</strong> Hibiclens Scrub whole body (except face) for 5 nights before surgery. Mupirocin ointment — pea size in each nostril, 5 days before surgery.</p></div>`,
    equip_list:`<div style="font-size:10px;color:var(--t2);line-height:1.6;"><p>Required equipment for home recovery:</p><ul style="margin:4px 0 0 16px;padding:0;"><li>Rolling walker (required)</li><li>Cane (for later recovery)</li><li>Raised toilet seat (recommended)</li><li>Shower chair or bench (recommended)</li><li>Ice machine or ice packs</li><li>Reacher/grabber tool</li><li>Long-handled shoehorn</li></ul></div>`,
    pt_exercise:`<div style="font-size:10px;color:var(--t2);line-height:1.6;"><p>Pre-operative and post-operative exercise program specific to ${isKnee?'knee':'hip'} replacement.</p><p style="margin-top:6px;">Includes: ankle pumps, quad sets, straight leg raises, heel slides${isKnee?', knee flexion/extension':''}, and progressive ambulation schedule.</p></div>`
  };

  document.getElementById("modal").className="md hp-modal";
  showModal(`${esc(pg.name)}`,previews[k]||`<p style="font-size:11px;color:var(--t3);">Preview content for <strong>${esc(pg.name)}</strong>. Upload a PDF for the full document.</p>`,[{l:"Close",action:`closeModal();document.getElementById('modal').className='md';`}]);
}

// ═══════════════════════════════════════════════════════════════════════════════
// CONSENT SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════════════════════

function openConsentSettings(){
  renderConsentSettings();
  document.getElementById("consOv").classList.add("open");
}
function closeConsentSettings(){
  document.getElementById("consOv").classList.remove("open");
}
function renderConsentSettings(){
  const md=document.getElementById("consMd");
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;">
    <h2 style="font-size:15px;font-weight:800;margin:0;display:flex;align-items:center;gap:8px;">📋 Consent Configuration</h2>
    <button class="md-x" onclick="closeConsentSettings()">✕</button>
  </div>
  <div style="padding:20px;overflow-y:auto;">
    <p style="font-size:11px;color:var(--t3);margin-bottom:14px;">Active consents auto-populate to every new patient. Upload the blank form PDF, preview content, or remove.</p>
    <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Active Consents (${ACTIVE_CONS.length})</div>`;

  ACTIVE_CONS.forEach((k,i)=>{
    const c=CONSENT_ALL[k];
    if(!c)return;
    const catColor=c.cat==='TJS'?'#059669':c.cat==='ACJS'?'#0891b2':c.cat==='Hospital'?'#7c3aed':'#6b7280';
    const hasFile=CON_FILES[k];
    h+=`<div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;">
        <div style="cursor:grab;color:var(--t4);font-size:14px;">☰</div>
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:600;">${esc(c.name)}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
            <span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:${catColor}15;color:${catColor};">${esc(c.cat)}</span>
            ${hasFile?`<span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--greenL);color:var(--green);">📎 ${esc(hasFile.name)}</span>`:`<span style="font-size:8px;color:var(--t4);">No file uploaded</span>`}
          </div>
        </div>
        <button class="btn s" onclick="event.stopPropagation();uploadConFile('${k}')" title="Upload PDF">${hasFile?'🔄':'📤'}</button>
        <button class="btn s" onclick="event.stopPropagation();previewConsent('${k}')" title="Preview">👁</button>
        <button class="btn rm" onclick="event.stopPropagation();removeActiveConsent('${k}')" title="Remove" style="color:var(--red);">✕</button>
      </div>
    </div>`;
  });

  const inactive=Object.keys(CONSENT_ALL).filter(k=>!ACTIVE_CONS.includes(k));
  if(inactive.length){
    h+=`<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;">Available to Add</div>`;
    inactive.forEach(k=>{
      const c=CONSENT_ALL[k];
      const catColor=c.cat==='TJS'?'#059669':c.cat==='ACJS'?'#0891b2':c.cat==='Hospital'?'#7c3aed':'#6b7280';
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px dashed var(--border);border-radius:8px;margin-bottom:6px;opacity:0.7;">
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:600;">${esc(c.name)}</div>
          <span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:${catColor}15;color:${catColor};">${esc(c.cat)}</span>
        </div>
        <button class="btn p" onclick="event.stopPropagation();addActiveConsent('${k}')" style="font-size:10px;">+ Add</button>
      </div>`;
    });
  }

  h+=`<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
    <button class="btn" onclick="addCustomConsent()" style="width:100%;justify-content:center;">+ Add Custom Consent Form</button>
  </div>`;

  h+=`</div>`;
  md.innerHTML=h;
}

function uploadConFile(k){
  showModal(`Upload Form — ${esc(CONSENT_ALL[k]?.name||k)}`,`
    <p style="margin-bottom:10px;font-size:11px;">Upload the blank consent form PDF or image for <strong>${esc(CONSENT_ALL[k]?.name||k)}</strong>. This is the template form, not a signed copy.</p>
    <div id="conFUpArea" style="padding:24px;border:2px dashed var(--border);border-radius:10px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .15s;" onclick="document.getElementById('conFInput').click()" ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='var(--blueL)';" ondragleave="this.style.borderColor='var(--border)';this.style.background='#fafbfc';" ondrop="event.preventDefault();this.style.borderColor='var(--border)';document.getElementById('conFInput').files=event.dataTransfer.files;handleConFUp('${k}');">
      <div style="font-size:32px;margin-bottom:8px;">📄</div>
      <div style="font-size:12px;font-weight:600;color:var(--t1);">Select PDF or image</div>
      <div style="font-size:10px;color:var(--t4);margin-top:4px;">PDF, JPG, PNG · Drag & drop supported</div>
      <input type="file" id="conFInput" accept=".pdf,image/*" style="display:none;" onchange="handleConFUp('${k}')">
    </div>
    <div id="conFPreview" style="display:none;margin-top:10px;text-align:center;"></div>
  `,[{l:"Cancel"},{l:"Save",p:true,action:`saveConFile('${k}')`}]);
}

function handleConFUp(k){
  const f=document.getElementById("conFInput").files[0];
  if(!f)return;
  const prev=document.getElementById("conFPreview");
  const area=document.getElementById("conFUpArea");
  const r=new FileReader();
  r.onload=e=>{
    area.style.display="none";
    prev.style.display="block";
    if(f.type.startsWith("image/")){
      prev.innerHTML=`<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);"><div style="font-size:10px;color:var(--t3);margin-top:6px;">${esc(f.name)} · ${(f.size/1024).toFixed(0)} KB</div>`;
    } else {
      prev.innerHTML=`<div style="padding:16px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);"><div style="font-size:24px;">📄</div><div style="font-size:11px;font-weight:600;margin-top:4px;">${esc(f.name)}</div><div style="font-size:10px;color:var(--t4);">${(f.size/1024).toFixed(0)} KB</div></div>`;
    }
    prev.dataset.name=f.name;
    prev.dataset.size=f.size;
    prev.dataset.url=e.target.result;
  };
  r.readAsDataURL(f);
}

function saveConFile(k){
  const prev=document.getElementById("conFPreview");
  if(prev?.dataset?.url){
    CON_FILES[k]={name:prev.dataset.name,size:parseInt(prev.dataset.size),dataUrl:prev.dataset.url};
  }
  closeModal();
  renderConsentSettings();
}

function removeActiveConsent(k){
  ACTIVE_CONS=ACTIVE_CONS.filter(x=>x!==k);
  CON_N=buildConN();
  // Remove from all patients
  P.forEach(p=>{delete p.cons[k];});
  renderConsentSettings();
  render();
}

function addActiveConsent(k){
  if(!ACTIVE_CONS.includes(k))ACTIVE_CONS.push(k);
  CON_N=buildConN();
  // Add to all patients as unsigned
  P.forEach(p=>{if(!p.cons[k])p.cons[k]={signed:false};});
  renderConsentSettings();
  render();
}

function addCustomConsent(){
  closeConsentSettings();
  showModal("Add Custom Consent",`
    <div class="field"><label>Consent Key (unique, lowercase, no spaces)</label><input id="ccKey" placeholder="e.g. hipaa_auth"></div>
    <div class="field"><label>Display Name</label><input id="ccName" placeholder="e.g. HIPAA Authorization"></div>
    <div class="field"><label>Category</label><select id="ccCat"><option value="ACJS">ACJS</option><option value="TJS">TJS</option><option value="Hospital">Hospital</option><option value="Other">Other</option></select></div>
  `,[{l:"Cancel",action:"closeModal();openConsentSettings();"},{l:"Add",p:true,action:"doAddCustomConsent()"}]);
}

function doAddCustomConsent(){
  const k=document.getElementById("ccKey").value.trim().replace(/\s/g,'_').toLowerCase();
  const name=document.getElementById("ccName").value.trim();
  const cat=document.getElementById("ccCat").value;
  if(!k||!name){alert("Key and name are required.");return;}
  if(CONSENT_ALL[k]){alert("A consent with that key already exists.");return;}
  CONSENT_ALL[k]={name:name,cat:cat};
  ACTIVE_CONS.push(k);
  CON_N=buildConN();
  P.forEach(p=>{p.cons[k]={signed:false};});
  closeModal();
  openConsentSettings();
  render();
}

function previewConsent(k){
  const p=P[0];
  if(p) viewConsent(p.id,k);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PROTOCOL SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════════════════════
let protoCat = null; // active category key
let protoDraft = null; // working copy during editing

function openProtoSettings(){
  protoDraft = JSON.parse(JSON.stringify(PROTO));
  protoCat = Object.keys(protoDraft.cats)[0];
  renderProtoSettings();
  document.getElementById("protoOv").classList.add("open");
}
function closeProto(){
  document.getElementById("protoOv").classList.remove("open");
  protoDraft = null;
}

function protoChanges(){
  // Returns array of {catId, ruleId, label, oldVal, newVal}
  if(!protoDraft)return[];
  const changes=[];
  Object.entries(protoDraft.cats).forEach(([catId,cat])=>{
    cat.rules.forEach(rule=>{
      const orig=PROTO.cats[catId]?.rules.find(r=>r.id===rule.id);
      if(orig && String(rule.val)!==String(orig.val)){
        changes.push({catId,ruleId:rule.id,label:rule.label,oldVal:orig.val,newVal:rule.val});
      }
    });
  });
  return changes;
}

function catHasChanges(catId){
  if(!protoDraft)return false;
  return protoDraft.cats[catId]?.rules.some(rule=>{
    const orig=PROTO.cats[catId]?.rules.find(r=>r.id===rule.id);
    return orig && String(rule.val)!==String(orig.val);
  });
}

function renderProtoSettings(){
  const el=document.getElementById("protoMd");
  const changes=protoChanges();
  const cats=Object.entries(protoDraft.cats);

  let sidebar='';
  cats.forEach(([k,cat])=>{
    const active=protoCat===k;
    const changed=catHasChanges(k);
    sidebar+=`<button class="proto-side-btn ${active?'active':''} ${changed?'changed':''}" onclick="protoCat='${k}';renderProtoSettings()">
      <span style="font-size:13px;">${cat.icon||'📌'}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cat.label)}</span>
      <span class="dot"></span>
    </button>`;
  });

  const activeCat=protoDraft.cats[protoCat];
  let rules='';
  if(activeCat){
    activeCat.rules.forEach(rule=>{
      const orig=PROTO.cats[protoCat]?.rules.find(r=>r.id===rule.id);
      const changed=orig && String(rule.val)!==String(orig.val);
      rules+=`<div class="proto-rule ${changed?'changed':''}">
        <div class="proto-rule-top">
          <div>
            <div class="proto-rule-label">${esc(rule.label)}</div>
            ${rule.note?`<div class="proto-rule-note">${esc(rule.note)}</div>`:''}
          </div>
          <div class="proto-rule-input">
            ${rule.comp?`<span class="comp">${esc(rule.comp)}</span>`:''}
            ${rule.type==='num'
              ?`<input type="number" step="any" value="${rule.val}" onchange="updateProtoRule('${protoCat}','${rule.id}',this.value,'num')">`
              :`<input type="text" value="${esc(String(rule.val))}" onchange="updateProtoRule('${protoCat}','${rule.id}',this.value,'txt')">`
            }
            ${rule.unit?`<span class="unit">${esc(rule.unit)}</span>`:''}
          </div>
        </div>
        ${changed?`<div class="proto-rule-diff"><span class="old">${esc(String(orig.val))}</span><span class="arrow">→</span><span class="new">${esc(String(rule.val))}</span></div>`:''}
      </div>`;
    });
  }

  el.innerHTML=`
    <div class="proto-hd">
      <div>
        <h2>⚙ Protocol Configuration</h2>
        <div class="proto-hd-sub">Version: ${esc(protoDraft.version)} · ${protoDraft.modifiedBy?'Last modified by '+esc(protoDraft.modifiedBy):''} · ${Object.values(protoDraft.cats).reduce((a,c)=>a+c.rules.length,0)} rules across ${cats.length} categories</div>
      </div>
      <button class="md-x" onclick="closeProto()">✕</button>
    </div>
    <div class="proto-body">
      <div class="proto-side">${sidebar}</div>
      <div class="proto-rules">${rules}</div>
    </div>
    <div class="proto-ft">
      <div class="proto-ft-l">${changes.length?changes.length+' unsaved change'+(changes.length>1?'s':''):''}</div>
      <div class="proto-ft-r">
        <button class="btn" onclick="protoDraft=JSON.parse(JSON.stringify(PROTO));renderProtoSettings();" style="font-size:10px;">↺ Reset</button>
        <button class="btn" onclick="closeProto()">Cancel</button>
        <button class="btn p" onclick="protoConfirmSave()" ${changes.length===0?'disabled style="opacity:.4;cursor:not-allowed;font-size:10px;"':'style="font-size:10px;"'}>${changes.length?'Review & Save '+changes.length+' Change'+(changes.length>1?'s':''):'No Changes'}</button>
      </div>
    </div>
  `;
}

function updateProtoRule(catId,ruleId,val,type){
  const cat=protoDraft.cats[catId];if(!cat)return;
  const rule=cat.rules.find(r=>r.id===ruleId);if(!rule)return;
  rule.val = type==='num' ? (parseFloat(val)||0) : val;
  renderProtoSettings();
}

let protoConfirmMode=false;
function protoConfirmSave(){
  const changes=protoChanges();
  if(!changes.length)return;
  
  const el=document.getElementById("protoMd");
  // Replace the rules area with confirmation
  const rulesArea=el.querySelector('.proto-rules');
  rulesArea.innerHTML=`
    <div class="proto-confirm">
      <h4>⚠ Confirm ${changes.length} Protocol Change${changes.length>1?'s':''}</h4>
      ${changes.map(c=>`<div class="proto-confirm-item"><span class="lbl">${esc(c.label)}:</span> <span style="color:var(--red);text-decoration:line-through;">${esc(String(c.oldVal))}</span> → <span style="color:var(--green);font-weight:700;">${esc(String(c.newVal))}</span></div>`).join('')}
    </div>
    <div class="proto-confirm-name">
      <input type="text" id="protoSaveBy" placeholder="Your name (required to save)">
      <button class="btn p" onclick="doProtoSave()" style="font-size:10px;">✓ Confirm & Save</button>
      <button class="btn" onclick="renderProtoSettings()" style="font-size:10px;">← Back</button>
    </div>
    <p style="font-size:9px;color:var(--t4);margin-top:8px;">Changes take effect immediately across all patient evaluations. A record will be saved to the change history.</p>
  `;
}

function doProtoSave(){
  const nameEl=document.getElementById("protoSaveBy");
  const name=nameEl?nameEl.value.trim():'';
  if(!name){nameEl.style.borderColor='var(--red)';nameEl.focus();return;}
  
  const changes=protoChanges();
  
  // Record history
  PROTO_HISTORY.unshift({
    timestamp:new Date().toISOString(),
    modifiedBy:name,
    changes:changes.map(c=>({label:c.label,oldVal:c.oldVal,newVal:c.newVal}))
  });
  
  // Apply
  protoDraft.lastModified=new Date().toISOString();
  protoDraft.modifiedBy=name;
  PROTO=JSON.parse(JSON.stringify(protoDraft));
  document.getElementById("protoVer").textContent=PROTO.version;
  
  saveProto();
  closeProto();
  render(); // re-evaluate all patients with new thresholds
}

// ═══════ CHANGE HISTORY ═══════
function openProtoHistory(){
  const el=document.getElementById("histMd");
  let items='';
  if(PROTO_HISTORY.length===0){
    items=`<div style="text-align:center;padding:40px 0;color:var(--t4);font-size:12px;">No protocol changes recorded yet</div>`;
  } else {
    PROTO_HISTORY.forEach(entry=>{
      items+=`<div class="hist-entry">
        <div class="hist-entry-hd">
          <div class="hist-entry-who">${esc(entry.modifiedBy)}</div>
          <div class="hist-entry-when">${new Date(entry.timestamp).toLocaleString()}</div>
        </div>
        ${entry.changes.map(c=>`<div class="hist-entry-item">
          <span class="lbl">${esc(c.label)}</span>
          <span style="color:var(--red);text-decoration:line-through;font-family:monospace;font-size:10px;">${esc(String(c.oldVal))}</span>
          <span style="color:var(--t4);">→</span>
          <span style="color:var(--green);font-family:monospace;font-weight:700;font-size:10px;">${esc(String(c.newVal))}</span>
        </div>`).join('')}
      </div>`;
    });
  }
  
  el.innerHTML=`
    <div class="proto-hd">
      <div>
        <h2>📋 Protocol Change History</h2>
        <div class="proto-hd-sub">${PROTO_HISTORY.length} recorded change${PROTO_HISTORY.length!==1?'s':''}</div>
      </div>
      <button class="md-x" onclick="closeHist()">✕</button>
    </div>
    <div style="padding:16px;overflow-y:auto;flex:1;">${items}</div>
    <div class="proto-ft">
      <div class="proto-ft-l"></div>
      <div class="proto-ft-r">
        ${PROTO_HISTORY.length?`<button class="btn ro" onclick="if(confirm('Reset protocol to Q4 2025 defaults and clear history?')){PROTO=JSON.parse(JSON.stringify(PROTO_DEFAULT));PROTO_HISTORY=[];saveProto();closeHist();render();}" style="font-size:10px;">↺ Reset to Q4 2025 Defaults</button>`:''}
        <button class="btn" onclick="closeHist()">Close</button>
      </div>
    </div>
  `;
  document.getElementById("histOv").classList.add("open");
}
function closeHist(){document.getElementById("histOv").classList.remove("open");}

render();
// Integration: auto-refresh Cerner on page load
setTimeout(()=>{cernerRefreshAll();INTEGRATIONS.jointops.lastSync=new Date().toISOString();INTEGRATIONS.tjv.lastSync=new Date().toISOString();},300);
// Agent autonomous run on page load
setTimeout(()=>{agentAutoRun();},800);
</script>
